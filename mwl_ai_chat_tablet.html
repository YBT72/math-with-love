<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MWL — AI Chat Tablet</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0a1120; min-height: 100vh; }

/* ── Simulator bar ── */
.sim-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 16px; border-bottom: 1px solid #1e293b;
  background: #06090f;
}
.sim-label { font-size: 11px; color: #475569; margin-right: 2px; }
.sim-btn {
  padding: 4px 11px; border-radius: 6px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid; font-family: sans-serif; background: transparent;
}
.sim-divider { width: 1px; height: 20px; background: #1e293b; margin: 0 2px; }
.tog { padding: 5px 14px; font-size: 11px; font-weight: 500; cursor: pointer; font-family: sans-serif; }
.tog:first-child { border-radius: 6px 0 0 6px; }
.tog:last-child  { border-radius: 0 6px 6px 0; }
.mode-indicator {
  margin-left: auto; font-size: 10px; font-weight: 500;
  padding: 3px 10px; border-radius: 4px;
  background: #1e293b; color: #475569; border: 1px solid #334155;
}

/* ── Viewport wrapper — simulates tablet canvas ── */
.viewport {
  position: relative;
  width: 100%;
  min-height: calc(100vh - 48px);
  overflow: hidden;
  transition: background 0.2s;
}
.viewport.dark  { background: #0f172a; }
.viewport.light { background: #f1f5f9; }

/* ── Stub header ── */
.stub-header {
  height: 48px; display: flex; align-items: center;
  padding: 0 16px; gap: 10px; border-bottom: 1px solid;
}
.dark .stub-header  { background: #1e293b; border-color: #334155; }
.light .stub-header { background: #ffffff; border-color: #e2e8f0; }
.stub-logo {
  width: 26px; height: 26px; border-radius: 50%;
  background: #22D3EE; display: flex; align-items: center;
  justify-content: center; font-size: 12px; color: #0f172a; font-weight: 700;
  flex-shrink: 0;
}
.stub-name { font-size: 13px; font-weight: 600; }
.dark .stub-name  { color: #f1f5f9; }
.light .stub-name { color: #0f172a; }
.stub-spacer { flex: 1; }
.stub-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: #22D3EE; display: flex; align-items: center;
  justify-content: center; font-size: 10px; font-weight: 700; color: #0f172a;
}

/* ── Stub lesson content ── */
.stub-content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.stub-breadcrumb { font-size: 10px; display: flex; align-items: center; gap: 5px; }
.dark .stub-breadcrumb  { color: #475569; }
.light .stub-breadcrumb { color: #94a3b8; }
.stub-breadcrumb span { color: #22D3EE; }
.stub-chip {
  display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px;
}
.dark .stub-chip  { background: #22D3EE18; border: 1px solid #22D3EE44; color: #22D3EE; }
.light .stub-chip { background: #e0f2f8; border: 1px solid #0891b244; color: #0891b2; }
.stub-h1 { font-size: 15px; font-weight: 500; line-height: 1.4; }
.dark .stub-h1  { color: #f1f5f9; }
.light .stub-h1 { color: #0f172a; }
.stub-text { font-size: 12px; line-height: 1.75; }
.dark .stub-text  { color: #64748b; }
.light .stub-text { color: #64748b; }
.stub-formula {
  display: inline-block; font-family: monospace; font-size: 12px;
  padding: 2px 7px; border-radius: 4px; margin: 0 2px;
}
.dark .stub-formula  { background: #22D3EE14; color: #22D3EE; }
.light .stub-formula { background: #e0f4fa; color: #0891b2; }
.stub-task-box {
  border-radius: 8px; padding: 12px 14px;
  font-size: 12px; line-height: 1.75;
}
.dark .stub-task-box  { background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
.light .stub-task-box { background: #ffffff; border: 1px solid #e2e8f0; color: #475569; }

/* ── Trigger button: circle icon ── */
.yosi-trigger {
  position: absolute; bottom: 20px;
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid #FBBF2477; background: #FBBF2418;
  box-shadow: 0 0 0 4px #FBBF2420;
  overflow: hidden; padding: 0; cursor: pointer;
  transition: box-shadow 0.2s, opacity 0.2s;
  inset-inline-end: 16px;
  z-index: 10;
}
.yosi-trigger img { width: 100%; height: 100%; object-fit: cover; display: block; }
.yosi-trigger:hover { box-shadow: 0 0 0 6px #FBBF2030; opacity: 0.9; }
.yosi-trigger.hidden { display: none; }

/* ── Overlay (portrait/mobile only) ── */
.yosi-overlay {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,0); pointer-events: none;
  transition: background 300ms ease;
}
.yosi-overlay.active {
  background: rgba(0,0,0,0.55); pointer-events: all;
}

/* ── Floating card (landscape: ≥768px) ── */
.yosi-card {
  position: fixed; z-index: 100;
  display: flex; flex-direction: column;
  border: 1px solid;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  transform: translateY(20px) scale(0.97);
  opacity: 0; pointer-events: none;
  transition: transform 350ms cubic-bezier(0.32,0.72,0,1),
              opacity   350ms cubic-bezier(0.32,0.72,0,1),
              height    350ms cubic-bezier(0.32,0.72,0,1),
              width     350ms cubic-bezier(0.32,0.72,0,1),
              bottom    350ms cubic-bezier(0.32,0.72,0,1),
              border-radius 200ms ease;
}
.yosi-card.open {
  transform: translateY(0) scale(1);
  opacity: 1; pointer-events: all;
}

/* Landscape mode card */
.yosi-card.landscape {
  width: 340px; height: 460px;
  border-radius: 16px;
  bottom: 76px; inset-inline-end: 16px;
}

/* Portrait mode card (bottom sheet) */
.yosi-card.portrait {
  width: 100%; left: 0; right: 0; bottom: 0;
  height: 75vh;
  border-radius: 16px 16px 0 0;
  border-bottom: none;
  transform: translateY(100%);
}
.yosi-card.portrait.open {
  transform: translateY(0);
}

.dark .yosi-card  { background: #0f1e2e; border-color: #1e3040; }
.light .yosi-card { background: #ffffff; border-color: #e2e8f0; }

/* ── Handle (portrait only) ── */
.card-handle {
  display: none; justify-content: center;
  padding: 10px 0 4px; flex-shrink: 0;
}
.yosi-card.portrait .card-handle { display: flex; }
.handle-bar {
  width: 36px; height: 4px; border-radius: 2px;
}
.dark .handle-bar  { background: #334a5a; }
.light .handle-bar { background: #e2e8f0; }

/* ── Card header ── */
.card-header {
  display: flex; align-items: center;
  padding: 10px 13px 9px; border-bottom: 1px solid;
  flex-shrink: 0; gap: 9px;
}
.dark .card-header  { border-color: #1e3040; }
.light .card-header { border-color: #e2e8f0; }
.yosi-avatar {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid #FBBF2444; background: #FBBF2418;
  overflow: hidden;
}
.yosi-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-header-info { flex: 1; min-width: 0; }
.card-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dark .card-name  { color: #d0dde8; }
.light .card-name { color: #0f172a; }
.card-status { font-size: 11px; margin-top: 1px; }
.dark .card-status  { color: #475569; }
.light .card-status { color: #94a3b8; }
.card-status.thinking { color: #FBBF24; }
.card-close {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; border: 1px solid;
  background: transparent; font-family: sans-serif; flex-shrink: 0;
}
.dark .card-close  { border-color: #334155; color: #475569; }
.light .card-close { border-color: #e2e8f0; color: #94a3b8; }
.card-close:hover { opacity: 0.75; }

/* ── Messages area ── */
.card-messages {
  flex: 1; overflow-y: auto; padding: 10px 13px;
  display: flex; flex-direction: column; gap: 9px;
  scroll-behavior: smooth;
}
.card-messages::-webkit-scrollbar { width: 3px; }
.dark .card-messages::-webkit-scrollbar-thumb  { background: #334155; border-radius: 2px; }
.light .card-messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

/* ── Message rows ── */
.msg-row { display: flex; align-items: flex-end; gap: 7px; }
.msg-row.yosi    { justify-content: flex-start; }
.msg-row.student { justify-content: flex-end; }
.msg-av {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  border: 1px solid #FBBF2433; background: #FBBF2418; overflow: hidden;
}
.msg-av img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── Bubbles ── */
.bubble {
  max-width: 80%; padding: 8px 11px; font-size: 12.5px;
  line-height: 1.65; border: 1px solid;
}
.bubble.yosi-bubble    { border-radius: 3px 10px 10px 10px; }
.bubble.student-bubble { border-radius: 10px 3px 10px 10px; }
.dark .bubble.yosi-bubble    { background: #2a1e0a; border-color: #FBBF2433; color: #e8d5a0; }
.light .bubble.yosi-bubble   { background: #fffbeb; border-color: #FBBF2466; color: #78350f; }
.dark .bubble.student-bubble  { background: #1e3040; border-color: #334a5a; color: #94a3b8; }
.light .bubble.student-bubble { background: #f0f4f8; border-color: #c0ccd8; color: #475569; }

/* ── Typing indicator ── */
.typing-indicator {
  display: flex; align-items: center; gap: 4px;
  padding: 9px 13px; border-radius: 3px 10px 10px 10px; border: 1px solid;
}
.dark .typing-indicator  { background: #2a1e0a; border-color: #FBBF2433; }
.light .typing-indicator { background: #fffbeb; border-color: #FBBF2466; }
.dot {
  width: 5px; height: 5px; border-radius: 50%; background: #FBBF24;
  animation: bounce 1.2s infinite ease-in-out;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30%           { transform: translateY(-5px); opacity: 1; }
}

/* ── Input area ── */
.card-input {
  border-top: 1px solid; padding: 9px 11px; flex-shrink: 0;
}
.dark .card-input  { border-color: #1e3040; }
.light .card-input { border-color: #e2e8f0; }
/* safe-area padding for portrait on real devices */
.yosi-card.portrait .card-input {
  padding-bottom: calc(9px + env(safe-area-inset-bottom));
}
.input-row { display: flex; align-items: flex-end; gap: 7px; }
.msg-textarea {
  flex: 1; resize: none; border-radius: 10px; padding: 8px 11px;
  font-size: 14px; font-family: sans-serif; line-height: 1.5;
  border: 1px solid; outline: none; min-height: 36px; max-height: 96px;
  overflow-y: auto;
}
.dark .msg-textarea {
  background: #0f1e2e; border-color: #334155; color: #d0dde8;
}
.dark .msg-textarea::placeholder { color: #334155; }
.dark .msg-textarea:focus { border-color: #FBBF2466; }
.light .msg-textarea {
  background: #f8fafc; border-color: #e2e8f0; color: #0f172a;
}
.light .msg-textarea::placeholder { color: #cbd5e1; }
.light .msg-textarea:focus { border-color: #FBBF2488; }
.send-btn {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; background: #FBBF24; color: #0f172a;
  transition: opacity 0.15s;
}
.send-btn:hover    { opacity: 0.85; }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.char-counter {
  text-align: end; font-size: 10px; margin-top: 3px; display: none;
}
.dark .char-counter  { color: #475569; }
.light .char-counter { color: #94a3b8; }
.char-counter.warning { color: #f87171 !important; display: block !important; }
.char-counter.visible { display: block; }

/* ── RTL overrides ── */
[dir="rtl"] .bubble.yosi-bubble      { border-radius: 10px 3px 10px 10px; }
[dir="rtl"] .bubble.student-bubble   { border-radius: 3px 10px 10px 10px; }
[dir="rtl"] .typing-indicator        { border-radius: 10px 3px 10px 10px; }
[dir="rtl"] .msg-row.yosi            { flex-direction: row-reverse; justify-content: flex-end; }
[dir="rtl"] .msg-row.student         { flex-direction: row-reverse; justify-content: flex-start; }
[dir="rtl"] .msg-textarea            { direction: rtl; text-align: right; }
</style>
</head>

// ── Layout detection via ResizeObserver ──
var ro = new ResizeObserver(function(entries) {
  var w = entries[0].contentRect.width;
  var wasPortrait = isPortrait;
  isPortrait = w < 768;

  var card = document.getElementById('yosi-card');
  var ind  = document.getElementById('mode-indicator');

  if (isPortrait !== wasPortrait) {
    // Switch layout mode — close card first to avoid broken states
    if (isOpen) closeCard();
    card.classList.toggle('landscape', !isPortrait);
    card.classList.toggle('portrait',   isPortrait);
  }

  ind.textContent = isPortrait ? '📱 Portrait' : '⬜ Landscape';
  ind.style.color = isPortrait ? '#22D3EE' : '#475569';
});
ro.observe(document.getElementById('viewport'));

// ── Open card ──
function openCard() {
  isOpen = true;
  var card    = document.getElementById('yosi-card');
  var overlay = document.getElementById('yosi-overlay');
  var trigger = document.getElementById('yosi-trigger');

  card.classList.add('open');
  trigger.classList.add('hidden');
  if (isPortrait) overlay.classList.add('active');

  setStatus('online');
  setPng('icon');
  var msgs = document.getElementById('card-messages');
  msgs.innerHTML = '';
  addYosiMsg(STR[currentLang].greeting);
}

// ── Close card ──
function closeCard() {
  isOpen = false;
  document.getElementById('yosi-card').classList.remove('open');
  document.getElementById('yosi-overlay').classList.remove('active');
  document.getElementById('yosi-trigger').classList.remove('hidden');
}

// ── Set PNG ──
function setPng(state) {
  document.getElementById('yosi-png').src = IMGS[state] || IMGS.icon;
}

// ── Set status ──
function setStatus(state) {
  var el = document.getElementById('card-status');
  var s  = STR[currentLang];
  el.classList.remove('thinking');
  if      (state === 'online')   { el.textContent = s.statusOnline; }
  else if (state === 'thinking') { el.textContent = s.statusThink;  el.classList.add('thinking'); }
  else if (state === 'replying') { el.textContent = s.statusReply;  el.classList.add('thinking'); }
}

// ── Add Yosi bubble ──
function addYosiMsg(text) {
  var msgs = document.getElementById('card-messages');
  var row  = document.createElement('div');
  row.className = 'msg-row yosi';
  row.innerHTML =
    '<div class="msg-av"><img src="' + IMGS.icon + '" alt="Й"></div>' +
    '<div class="bubble yosi-bubble">' + text + '</div>';
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Add student bubble ──
function addStudentMsg(text) {
  var msgs = document.getElementById('card-messages');
  var row  = document.createElement('div');
  row.className = 'msg-row student';
  row.innerHTML = '<div class="bubble student-bubble">' + text + '</div>';
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Add typing indicator ──
function addTyping() {
  var msgs = document.getElementById('card-messages');
  var row  = document.createElement('div');
  row.className = 'msg-row yosi'; row.id = 'typing-row';
  row.innerHTML =
    '<div class="msg-av"><img src="' + IMGS.thinking + '" alt="Й"></div>' +
    '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Remove typing indicator ──
function removeTyping() {
  var row = document.getElementById('typing-row');
  if (row) row.parentNode.removeChild(row);
}

// ── Send message ──
function sendMsg() {
  var input = document.getElementById('msg-input');
  var text  = input.value.trim();
  if (!text || isThinking) return;
  addStudentMsg(text);
  input.value = ''; input.style.height = '';
  updateCharCounter('');
  document.getElementById('send-btn').disabled = true;
  isThinking = true;
  setStatus('thinking'); setPng('thinking'); addTyping();
  setTimeout(function() {
    removeTyping(); setStatus('replying'); setPng('present');
    addYosiMsg('Хороший вопрос! Давайте разберём это по шагам. Начните с подстановки значений в формулу дискриминанта.');
    setTimeout(function() { setStatus('online'); setPng('icon'); isThinking = false; }, 800);
  }, 1500);
}

// ── Textarea input ──
function onInput(e) {
  var ta = e.target;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 96) + 'px';
  updateCharCounter(ta.value);
  document.getElementById('send-btn').disabled = !ta.value.trim() || isThinking;
}

// ── Char counter ──
function updateCharCounter(val) {
  var remaining = CHAR_LIMIT - val.length;
  var el = document.getElementById('char-counter');
  el.textContent = remaining;
  el.classList.remove('visible', 'warning');
  if      (remaining < 0)   { el.classList.add('warning'); }
  else if (remaining <= 100){ el.classList.add('visible'); if (remaining <= 20) el.classList.add('warning'); }
}

// ── Ctrl/Cmd+Enter sends ──
function onKeyDown(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); sendMsg(); }
}

// ── Simulators ──
function simOpen() { openCard(); }

function simThinking() {
  if (!isOpen) openCard();
  removeTyping(); setStatus('thinking'); setPng('thinking'); addTyping();
}

function simDialog() {
  dialogTimers.forEach(function(id) { clearTimeout(id); });
  dialogTimers = []; isThinking = false;
  if (!isOpen) openCard();
  var s = STR[currentLang];
  var msgs = document.getElementById('card-messages');
  msgs.innerHTML = ''; removeTyping();
  addYosiMsg(s.greeting);
  dialogTimers.push(setTimeout(function() { addStudentMsg(s.student1); }, 300));
  dialogTimers.push(setTimeout(function() { addTyping(); setStatus('thinking'); setPng('thinking'); }, 700));
  dialogTimers.push(setTimeout(function() { removeTyping(); setPng('present'); setStatus('replying'); addYosiMsg(s.yosi1); }, 1800));
  dialogTimers.push(setTimeout(function() { addStudentMsg(s.student2); }, 2200));
  dialogTimers.push(setTimeout(function() { addTyping(); setStatus('thinking'); setPng('thinking'); }, 2600));
  dialogTimers.push(setTimeout(function() { removeTyping(); setPng('happy'); setStatus('replying'); addYosiMsg(s.yosi2); }, 3800));
  dialogTimers.push(setTimeout(function() { setStatus('online'); setPng('icon'); }, 4600));
}

function simReset() {
  dialogTimers.forEach(function(id) { clearTimeout(id); });
  dialogTimers = []; isThinking = false;
  closeCard(); removeTyping();
  document.getElementById('msg-input').value = '';
  updateCharCounter('');
  document.getElementById('send-btn').disabled = true;
}

// ── Set theme ──
function setTheme(t) {
  currentTheme = t;
  document.getElementById('viewport').className = 'viewport ' + t;
  var bd = document.getElementById('btn-dark');
  var bl = document.getElementById('btn-light');
  var base = 'font-size:11px;font-weight:500;cursor:pointer;font-family:sans-serif;padding:5px 14px;';
  if (t === 'dark') {
    bd.style.cssText = base + 'background:#22D3EE;border:1px solid #22D3EE;color:#0a3540;border-radius:6px 0 0 6px;';
    bl.style.cssText = base + 'background:#1a3a4e;border:1px solid #2a5a70;border-left:none;color:#7a9ab0;border-radius:0 6px 6px 0;';
  } else {
    bl.style.cssText = base + 'background:#0891b2;border:1px solid #0891b2;color:#ffffff;border-radius:0 6px 6px 0;';
    bd.style.cssText = base + 'background:#e8f4f8;border:1px solid #b0cdd8;color:#445566;border-radius:6px 0 0 6px;';
  }
}

// ── Set language ──
function setLang(l) {
  currentLang = l;
  var dir = l === 'he' ? 'rtl' : 'ltr';
  document.getElementById('viewport').setAttribute('dir', dir);
  document.getElementById('yosi-card').setAttribute('dir', dir);
  document.getElementById('msg-input').setAttribute('dir', dir);
  document.getElementById('card-name').textContent = STR[l].cardName;
  document.getElementById('msg-input').setAttribute('placeholder', STR[l].placeholder);
  if (isOpen) setStatus(isThinking ? 'thinking' : 'online');
  var br = document.getElementById('btn-ru');
  var bh = document.getElementById('btn-he');
  var base = 'font-size:11px;font-weight:500;cursor:pointer;font-family:sans-serif;padding:5px 14px;';
  if (l === 'ru') {
    br.style.cssText = base + 'background:#22D3EE;border:1px solid #22D3EE;color:#0a3540;border-radius:6px 0 0 6px;';
    bh.style.cssText = base + 'background:#1a3a4e;border:1px solid #2a5a70;border-left:none;color:#7a9ab0;border-radius:0 6px 6px 0;';
  } else {
    bh.style.cssText = base + 'background:#22D3EE;border:1px solid #22D3EE;color:#0a3540;border-radius:6px 0 0 6px;';
    br.style.cssText = base + 'background:#1a3a4e;border:1px solid #2a5a70;border-left:none;color:#7a9ab0;border-radius:0 6px 6px 0;';
  }
}
</script>
