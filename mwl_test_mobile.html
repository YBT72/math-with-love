
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0a0f1a; padding: 8px; display:flex;flex-direction:column;align-items:center; }
.ctrls { display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;width:100%; }
.ctrl { padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;font-family:sans-serif; }
.phone { width:375px;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px #00000066; }
.mtag { font-family:monospace;font-size:11px;padding:1px 4px;border-radius:3px; }
.dot { width:5px;height:5px;border-radius:50%;background:#FBBF24;animation:bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-5px);opacity:1;}}
</style>

<div class="ctrls">
  <button class="ctrl" id="bd" onclick="setTh('dark')"  style="background:#22D3EE;border:1px solid #22D3EE;color:#0a3540;box-shadow:0 0 0 2px #22D3EE33;">🌙 Тёмная</button>
  <button class="ctrl" id="bl" onclick="setTh('light')" style="background:#e8f4f8;border:1px solid #b0cdd8;color:#445566;">☀️ Светлая</button>
  <div style="width:1px;background:#223;margin:0 1px;"></div>
  <button class="ctrl" id="bn" onclick="setQt('numeric')" style="background:#22D3EE;border:1px solid #22D3EE;color:#0a3540;">🔢</button>
  <button class="ctrl" id="bc" onclick="setQt('choice')"  style="background:#1a3a4e;border:1px solid #2a5a70;color:#7a9ab0;">☑</button>
  <button class="ctrl" id="bt" onclick="setQt('text')"    style="background:#1a3a4e;border:1px solid #2a5a70;color:#7a9ab0;">✍</button>
  <div style="width:1px;background:#223;margin:0 1px;"></div>
  <button class="ctrl" id="btmr" onclick="togTimer()" style="background:#1a3a4e;border:1px solid #2a5a70;color:#7a9ab0;">⏱</button>
  <button class="ctrl" onclick="simT(90)"  style="background:#FBBF2418;border:1px solid #FBBF2444;color:#FBBF24;">⚡</button>
  <button class="ctrl" onclick="simT(25)"  style="background:#f8717118;border:1px solid #f8717144;color:#f87171;">🔴</button>
</div>

<div class="phone" id="sh">

  <!-- TOPBAR: чип | кружки | таймер | выйти -->
  <div id="tb" style="display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:40px;gap:6px;">
    <span id="chip" style="font-size:10px;border-radius:20px;padding:2px 7px;flex-shrink:0;">Векторы</span>
    <div style="display:flex;align-items:center;gap:3px;flex:1;justify-content:center;overflow:hidden;" id="qnums"></div>
    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
      <div id="twrap" style="display:none;border-radius:20px;padding:3px 9px;transition:all 0.4s;">
        <span id="tval" style="font-size:13px;font-weight:700;font-family:monospace;letter-spacing:0.05em;">05:00</span>
      </div>
      <div id="xbtn" style="font-size:10px;cursor:pointer;padding:3px 6px;border-radius:5px;background:transparent;">✕</div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div id="pr" style="padding:4px 10px 6px;">
    <div style="height:3px;border-radius:2px;" id="ptk">
      <div id="pfl" style="height:100%;border-radius:2px;width:42%;transition:background 0.4s,width 0.3s;"></div>
    </div>
  </div>

  <!-- STATS — горизонтальная полоска, очень компактная -->
  <div id="sb" style="display:flex;padding:5px 10px;border-top:1px solid;border-bottom:1px solid;gap:0;">
    <div style="display:flex;align-items:center;gap:3px;flex:1;">
      <div style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:#4ade8018;border:1px solid #4ade8044;color:#4ade80;flex-shrink:0;">✓</div>
      <div><div id="sok" style="font-size:12px;font-weight:700;">2</div><div id="sokl" style="font-size:8px;line-height:1;">верно</div></div>
    </div>
    <div id="ss1" style="width:1px;margin:0 3px;"></div>
    <div style="display:flex;align-items:center;gap:3px;flex:1;">
      <div style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:#FBBF2418;border:1px solid #FBBF2444;color:#FBBF24;flex-shrink:0;">~</div>
      <div><div id="spart" style="font-size:12px;font-weight:700;">1</div><div id="spartl" style="font-size:8px;line-height:1;">часть</div></div>
    </div>
    <div id="ss2" style="width:1px;margin:0 3px;"></div>
    <div style="display:flex;align-items:center;gap:3px;flex:1;">
      <div style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;background:#f8717118;border:1px solid #f8717144;color:#f87171;flex-shrink:0;">✗</div>
      <div><div id="serr" style="font-size:12px;font-weight:700;">0</div><div id="serrl" style="font-size:8px;line-height:1;">ошибок</div></div>
    </div>
    <div id="ss3" style="width:1px;margin:0 3px;"></div>
    <div style="display:flex;align-items:center;gap:3px;flex:1;">
      <div style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;background:#33445518;border:1px solid #33445544;color:#556677;flex-shrink:0;">→</div>
      <div><div id="ssk" style="font-size:12px;font-weight:700;">1</div><div id="sskl" style="font-size:8px;line-height:1;">пропущ.</div></div>
    </div>
    <div id="ss4" style="width:1px;margin:0 3px;"></div>
    <div style="display:flex;align-items:center;gap:3px;flex:1;">
      <div style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;background:#FBBF2418;border:1px solid #FBBF2444;color:#FBBF24;flex-shrink:0;">★</div>
      <div><div id="sxp" style="font-size:12px;font-weight:700;color:#FBBF24;">20</div><div id="sxpl" style="font-size:8px;line-height:1;">очков</div></div>
    </div>
  </div>

  <!-- ZONE 1: на мобайле — одна колонка: текст вопроса, потом визуализация -->

  <!-- 1А: текст вопроса -->
  <div id="z-question" style="padding:11px 12px 8px;">
    <div id="qlbl" style="font-size:9px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;"></div>
    <div id="qtxt" style="font-size:12px;line-height:1.7;">
      Даны <span class="mtag" id="mt1">a⃗=(3,−1,2)</span> и <span class="mtag" id="mt2">b⃗=(−1,4,0)</span>.<br>
      Найдите <span class="mtag" id="mt3">a⃗+b⃗</span>.
    </div>
  </div>

  <!-- 1Б: визуализация — компактная, переключаемая -->
  <div id="z-viz">
    <div id="vzb" style="display:flex;align-items:center;justify-content:space-between;padding:4px 10px;">
      <span id="vzlbl" style="font-size:9px;">Three.js · визуализация</span>
      <div style="display:flex;gap:3px;">
        <button id="vb1" style="font-size:9px;padding:2px 6px;border-radius:4px;cursor:pointer;background:transparent;font-family:sans-serif;">3D</button>
        <button id="vb2" style="font-size:9px;padding:2px 6px;border-radius:4px;cursor:pointer;background:transparent;font-family:sans-serif;">2D</button>
      </div>
    </div>
    <div style="display:flex;justify-content:center;padding:4px 0 3px;">
      <svg width="200" height="150" viewBox="0 0 220 180">
        <defs>
          <marker id="ma" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto"><path id="map" d="M0,0 L5,2.5 L0,5 Z" fill="#22D3EE"/></marker>
          <marker id="mb" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto"><path id="mbp" d="M0,0 L5,2.5 L0,5 Z" fill="#a78bfa"/></marker>
          <marker id="mc" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto"><path id="mcp" d="M0,0 L5,2.5 L0,5 Z" fill="#4ade80"/></marker>
        </defs>
        <line id="gx" x1="20" y1="90" x2="200" y2="90" stroke="#334a5a" stroke-width="0.5"/>
        <line id="gy" x1="110" y1="10" x2="110" y2="170" stroke="#334a5a" stroke-width="0.5"/>
        <line id="va" x1="110" y1="90" x2="175" y2="70" stroke="#22D3EE" stroke-width="2" marker-end="url(#ma)"/>
        <line id="vb" x1="110" y1="90" x2="90" y2="10" stroke="#a78bfa" stroke-width="2" marker-end="url(#mb)"/>
        <line id="vc" x1="110" y1="90" x2="150" y2="50" stroke="#4ade80" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#mc)"/>
        <text id="la" x="178" y="68" font-size="11" font-family="Arial" fill="#22D3EE">a⃗</text>
        <text id="lb" x="74" y="14" font-size="11" font-family="Arial" fill="#a78bfa">b⃗</text>
        <text id="lc" x="153" y="48" font-size="11" font-family="Arial" fill="#4ade80">a⃗+b⃗</text>
        <circle cx="110" cy="90" r="3" id="orig" fill="#8899aa"/>
        <text id="lo" x="113" y="103" font-size="9" font-family="Arial" fill="#8899aa">O</text>
      </svg>
    </div>
    <div id="vzcp" style="font-size:9px;text-align:center;padding:2px 0 5px;">Перетащите · Three.js</div>
  </div>

  <div id="dv1" style="height:1px;margin:0 10px;"></div>

  <!-- ZONE 2: ответ -->
  <div id="az" style="padding:10px 12px;display:flex;flex-direction:column;gap:9px;">

    <!-- NUMERIC: строго в одну строку -->
    <div id="anum" style="flex-direction:column;gap:7px;">
      <div id="albl" style="font-size:9px;text-transform:uppercase;letter-spacing:0.06em;">Ваш ответ</div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:nowrap;">
        <span id="ptl" style="font-size:12px;font-weight:600;white-space:nowrap;min-width:40px;">a⃗+b⃗=</span>
        <span id="ax1" style="font-size:10px;font-family:monospace;">x</span>
        <input id="nx" type="number" placeholder="?" oninput="clrRes()" style="width:56px;height:32px;border-radius:6px;font-size:13px;text-align:center;font-family:monospace;outline:none;">
        <span id="ax2" style="font-size:10px;font-family:monospace;">y</span>
        <input id="ny" type="number" placeholder="?" oninput="clrRes()" style="width:56px;height:32px;border-radius:6px;font-size:13px;text-align:center;font-family:monospace;outline:none;">
        <span id="ax3" style="font-size:10px;font-family:monospace;">z</span>
        <input id="nz" type="number" placeholder="?" oninput="clrRes()" style="width:56px;height:32px;border-radius:6px;font-size:13px;text-align:center;font-family:monospace;outline:none;">
      </div>
    </div>

    <!-- CHOICE: 2×2 -->
    <div id="ach" style="display:none;flex-direction:column;gap:6px;">
      <div id="chlbl" style="font-size:9px;text-transform:uppercase;letter-spacing:0.06em;">Выберите ответ</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
        <button id="ca" onclick="pick('A')" style="padding:9px 10px;border-radius:7px;font-size:12px;cursor:pointer;text-align:left;font-family:sans-serif;"><span style="font-weight:700;margin-right:6px;">A</span>(2,3,2)</button>
        <button id="cb" onclick="pick('B')" style="padding:9px 10px;border-radius:7px;font-size:12px;cursor:pointer;text-align:left;font-family:sans-serif;"><span style="font-weight:700;margin-right:6px;">B</span>(2,3,−2)</button>
        <button id="cc" onclick="pick('C')" style="padding:9px 10px;border-radius:7px;font-size:12px;cursor:pointer;text-align:left;font-family:sans-serif;"><span style="font-weight:700;margin-right:6px;">C</span>(4,−5,2)</button>
        <button id="cd" onclick="pick('D')" style="padding:9px 10px;border-radius:7px;font-size:12px;cursor:pointer;text-align:left;font-family:sans-serif;"><span style="font-weight:700;margin-right:6px;">D</span>(−4,5,2)</button>
      </div>
    </div>

    <!-- TEXT -->
    <div id="atxt" style="display:none;flex-direction:column;gap:6px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div id="txtlbl" style="font-size:9px;text-transform:uppercase;letter-spacing:0.06em;">Развёрнутый ответ</div>
        <div id="ai-badge" style="font-size:9px;padding:2px 6px;border-radius:10px;">🤖 AI</div>
      </div>
      <textarea id="txtans" rows="3" oninput="clrRes();updateTxtCount();"
        placeholder="Запишите ваш ответ..."
        style="width:100%;border-radius:7px;padding:8px 10px;font-size:12px;font-family:sans-serif;outline:none;resize:vertical;line-height:1.6;min-height:72px;"></textarea>
      <div id="txtcount" style="font-size:9px;text-align:right;"></div>
    </div>

    <!-- AI checking -->
    <div id="ai-checking" style="display:none;align-items:center;gap:6px;padding:7px 10px;border-radius:6px;">
      <span>🤖</span><span id="ai-chk-txt" style="font-size:12px;">AI проверяет...</span>
      <div style="display:flex;gap:3px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>

    <!-- Result -->
    <div id="res" style="font-size:12px;padding:7px 11px;border-radius:7px;display:none;line-height:1.6;"></div>

    <!-- AI feedback -->
    <div id="ai-feedback" style="display:none;border-radius:7px;padding:9px 11px;">
      <div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;">
        <span style="font-size:13px;">🤖</span>
        <span id="ai-fb-title" style="font-size:11px;font-weight:600;">Разбор AI</span>
        <span id="ai-score-badge" style="font-size:10px;padding:2px 6px;border-radius:10px;margin-left:auto;font-weight:600;"></span>
      </div>
      <div id="ai-fb-text" style="font-size:12px;line-height:1.6;"></div>
    </div>

    <!-- Кнопки: Skip слева, Check+Next справа -->
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <button id="bskip" onclick="skip()" style="padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:sans-serif;background:transparent;">Пропустить →</button>
      <div style="display:flex;gap:6px;">
        <button id="bchk" onclick="chk()" style="padding:8px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:sans-serif;">Проверить</button>
        <button id="bnxt" onclick="nxtQ()" style="padding:8px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:sans-serif;display:none;border:none;">След →</button>
      </div>
    </div>
  </div>
</div>

<script>
var th='dark',qt='numeric',tmrOn=false,iv=null,sec=300,pulse=false,chosen=null;
var cq=3,tq=7,nOk=2,nPart=1,nErr=0,nSk=1,xp=20;
var qStatus=[1,2,0,0,4,0,0];

function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function renderTimer(){
  var w=document.getElementById('twrap'),v=document.getElementById('tval'),p=document.getElementById('pfl');
  v.textContent=fmt(sec);
  if(sec>120){w.style.border='1.5px solid #4ade80';w.style.background='#4ade8022';v.style.color='#4ade80';if(tmrOn)p.style.background='#4ade80';}
  else if(sec>30){w.style.border='1.5px solid #FBBF24';w.style.background='#FBBF2422';v.style.color='#FBBF24';if(tmrOn)p.style.background='#FBBF24';}
  else{pulse=!pulse;w.style.border='1.5px solid #f87171';w.style.background=pulse?'#f8717133':'#f8717118';v.style.color='#f87171';if(tmrOn)p.style.background='#f87171';}
  if(sec>0)sec--;else stopTmr();
}
function simT(s){if(!tmrOn)return;stopTmr();sec=s;renderTimer();iv=setInterval(renderTimer,1000);}
function stopTmr(){if(iv){clearInterval(iv);iv=null;}}
function togTimer(){
  tmrOn=!tmrOn;var btn=document.getElementById('btmr'),w=document.getElementById('twrap'),d=th==='dark';
  if(tmrOn){w.style.display='block';sec=300;renderTimer();iv=setInterval(renderTimer,1000);btn.style.cssText='background:#4ade8022;border:1px solid #4ade8055;color:#4ade80;padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;font-family:sans-serif;';}
  else{w.style.display='none';stopTmr();btn.style.cssText='background:#1a3a4e;border:1px solid #2a5a70;color:#7a9ab0;padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;border-radius:6px;font-family:sans-serif;';document.getElementById('pfl').style.background=th==='dark'?'#22D3EE':'#0891b2';}
}

function qBtnStyle(st,isActive,d){
  var base='width:24px;height:24px;border-radius:50%;font-size:10px;cursor:pointer;font-family:sans-serif;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;border:none;';
  if(isActive)return base+'font-weight:700;background:'+(d?'#22D3EE22':'#e0f4fa')+';border:2px solid '+(d?'#22D3EE':'#0891b2')+';color:'+(d?'#22D3EE':'#0891b2')+';';
  if(st===1)return base+'background:#4ade8022;border:1.5px solid #4ade8066;color:#4ade80;';
  if(st===2)return base+'background:#FBBF2422;border:1.5px solid #FBBF2466;color:#FBBF24;';
  if(st===3)return base+'background:#f8717122;border:1.5px solid #f8717166;color:#f87171;';
  if(st===4)return base+'background:'+(d?'#1a3a4e22':'#eef2f6')+';border:1px solid '+(d?'#334a5a':'#c0ccd8')+';color:'+(d?'#556677':'#8899aa')+';';
  return base+'background:transparent;border:1px solid '+(d?'#334a5a':'#c0ccd8')+';color:'+(d?'#556677':'#99aabb')+';';
}
function renderQNums(){
  var d=th==='dark',cont=document.getElementById('qnums');cont.innerHTML='';
  for(var i=0;i<tq;i++){
    var btn=document.createElement('button');btn.textContent=String(i+1);btn.style.cssText=qBtnStyle(qStatus[i],i+1===cq,d);
    (function(idx){btn.onclick=function(){goToQ(idx+1);};})(i);
    cont.appendChild(btn);
    if(i<tq-1){var sep=document.createElement('div');sep.style.cssText='width:4px;height:1px;background:'+(d?'#1e3040':'#d0dde8')+';flex-shrink:0;';cont.appendChild(sep);}
  }
}
function goToQ(n){
  cq=n;document.getElementById('qlbl').textContent='Вопрос '+n;clrRes();chosen=null;applyChoice();
  ['nx','ny','nz'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('txtans').value='';updateTxtCount();renderQNums();
  if(!tmrOn)document.getElementById('pfl').style.width=Math.round(cq/tq*100)+'%';
}
function applyChoice(){
  var d=th==='dark';
  ['A','B','C','D'].forEach(function(x){
    var el=document.getElementById('c'+x.toLowerCase());
    if(chosen===x){el.style.background=d?'#22D3EE22':'#e0f4fa';el.style.border='1.5px solid '+(d?'#22D3EE':'#0891b2');el.style.color=d?'#22D3EE':'#0891b2';}
    else{el.style.background=d?'#0f1e2e':'#f5f7fa';el.style.border='1px solid '+(d?'#1e3040':'#d0dde8');el.style.color=d?'#d0dde8':'#1a2533';}
  });
}
function pick(x){chosen=x;applyChoice();clrRes();}
function updateTxtCount(){
  var v=document.getElementById('txtans').value.length,el=document.getElementById('txtcount'),d=th==='dark';
  el.textContent=v>0?v+' симв.':'';el.style.color=d?'#445566':'#99aabb';
}
function clrRes(){
  document.getElementById('res').style.display='none';document.getElementById('bnxt').style.display='none';
  document.getElementById('ai-feedback').style.display='none';document.getElementById('ai-checking').style.display='none';
}
function chk(){
  var d=th==='dark',el=document.getElementById('res');
  if(qt==='text'){
    var txt=document.getElementById('txtans').value.trim();
    if(!txt){el.style.display='block';el.style.background=d?'#1a3040':'#f5f7fa';el.style.color=d?'#7a9ab0':'#556677';el.style.border='none';el.textContent='Введите ответ.';return;}
    document.getElementById('ai-checking').style.display='flex';
    document.getElementById('bchk').style.opacity='0.5';document.getElementById('bchk').style.pointerEvents='none';
    setTimeout(function(){simulateAI(txt,d);},1800+Math.random()*700);return;
  }
  el.style.display='block';document.getElementById('bnxt').style.display='block';
  var ok=false,partial=false;
  if(qt==='numeric'){var x=parseFloat(document.getElementById('nx').value),y=parseFloat(document.getElementById('ny').value),z=parseFloat(document.getElementById('nz').value);ok=(x===2&&y===3&&z===2);partial=(!ok&&(x===2||y===3||z===2));}
  else{ok=chosen==='A';}
  if(ok){qStatus[cq-1]=1;nOk++;xp+=10;el.style.background=d?'#08251a':'#ecfdf5';el.style.color=d?'#4ade80':'#16a34a';el.style.border='1px solid '+(d?'#4ade8044':'#16a34a44');el.textContent='✓ Верно! +10 очков';}
  else if(partial){qStatus[cq-1]=2;nPart++;el.style.background=d?'#2a1f00':'#fffbeb';el.style.color=d?'#FBBF24':'#92400e';el.style.border='1px solid '+(d?'#FBBF2444':'#FBBF2466');el.textContent='~ Частично верно.';}
  else{qStatus[cq-1]=3;nErr++;el.style.background=d?'#250808':'#fef2f2';el.style.color=d?'#f87171':'#dc2626';el.style.border='1px solid '+(d?'#f8717133':'#dc262633');el.textContent='✗ Неверно. Ответ: A (2,3,2).';}
  updateStats();renderQNums();
}
function simulateAI(txt,d){

  var score=hasCoords&&hasExp?10:hasCoords||hasExp?6:2,verdict=score===10?'correct':score===6?'partial':'wrong';
  var res=document.getElementById('res'),fb=document.getElementById('ai-feedback');
  res.style.display='block';document.getElementById('bnxt').style.display='block';
  if(verdict==='correct'){qStatus[cq-1]=1;nOk++;xp+=10;res.style.background=d?'#08251a':'#ecfdf5';res.style.color=d?'#4ade80':'#16a34a';res.style.border='1px solid '+(d?'#4ade8044':'#16a34a44');res.textContent='✓ AI: верно.';fb.style.background=d?'#0a2010':'#f0fdf4';fb.style.border='1px solid '+(d?'#4ade8033':'#4ade8066');document.getElementById('ai-fb-title').style.color=d?'#4ade80':'#16a34a';document.getElementById('ai-score-badge').style.cssText='font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600;background:#4ade8022;color:#4ade80;margin-left:auto;';document.getElementById('ai-score-badge').textContent='10/10';document.getElementById('ai-fb-text').style.color=d?'#86efac':'#166534';document.getElementById('ai-fb-text').textContent='Координаты верные, объяснение полное.';}

  else{qStatus[cq-1]=3;nErr++;res.style.background=d?'#250808':'#fef2f2';res.style.color=d?'#f87171':'#dc2626';res.style.border='1px solid '+(d?'#f8717133':'#dc262633');res.textContent='✗ AI: неверно.';fb.style.background=d?'#200808':'#fef2f2';fb.style.border='1px solid '+(d?'#f8717133':'#f8717166');document.getElementById('ai-fb-title').style.color=d?'#f87171':'#dc2626';document.getElementById('ai-score-badge').style.cssText='font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600;background:#f8717122;color:#f87171;margin-left:auto;';document.getElementById('ai-score-badge').textContent='2/10';document.getElementById('ai-fb-text').style.color=d?'#fca5a5':'#991b1b';document.getElementById('ai-fb-text').textContent='x=2, y=3, z=2.';}
  fb.style.display='block';updateStats();renderQNums();
}
