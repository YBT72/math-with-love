<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MWL — Векторы (уровень 2, Tablet)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif}

.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.d{background:#0f172a}.l{background:#f8fafc}
.d .t1{color:#f1f5f9}.l .t1{color:#0f172a}
.d .t2{color:#94a3b8}.l .t2{color:#64748b}
.d .t3{color:#475569}.l .t3{color:#94a3b8}
.d .p1{background:#1e293b;border-color:#334155}.l .p1{background:#ffffff;border-color:#e2e8f0}
.d .p2{background:#334155;border-color:#334155}.l .p2{background:#f1f5f9;border-color:#e2e8f0}
.d .bd{border-color:#334155!important}.l .bd{border-color:#e2e8f0!important}

/* ── Header — tablet ── */
.hdr{height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 12px;border-bottom:1px solid;flex-shrink:0;position:relative}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-center{display:flex;align-items:center;justify-content:center}
.hdr-right{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.logo{width:26px;height:26px;border-radius:50%;background:#22D3EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand{font-size:13px;font-weight:500}.brand b{color:#22D3EE;font-weight:500}
.hico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid}

/* ── Globe-dropdown ── */
.lg-wrap{position:relative;flex-shrink:0}
.lg-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:80px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease}
.lg-dropdown.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .lg-dropdown{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.l .lg-dropdown{background:#ffffff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.lg-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;min-height:44px}
.d .lg-item{color:#94a3b8}.l .lg-item{color:#64748b}
.lg-item.on{color:#22D3EE}
.d .lg-item:hover{background:#334155}.l .lg-item:hover{background:#f1f5f9}
.lg-check{width:12px;height:12px;flex-shrink:0;opacity:0}
.lg-item.on .lg-check{opacity:1}
.lg-overlay{position:fixed;inset:0;z-index:99;display:none}
.lg-overlay.open{display:block}
[dir="rtl"] .lg-dropdown{right:auto;left:0}

/* ── Avatar-dropdown ── */
.hav-wrap{position:relative;flex-shrink:0}
.hav{width:28px;height:28px;min-width:28px;min-height:28px;border-radius:50%;background:#22D3EE;color:#0f172a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:2px solid #22D3EE;flex-shrink:0;overflow:hidden}
.av-drop{position:absolute;top:calc(100% + 8px);inset-inline-end:0;width:160px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease}
.av-drop.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .av-drop{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.l .av-drop{background:#ffffff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.av-drop-user{padding:10px 14px 8px}
.av-drop-name{font-size:12px;font-weight:600}
.d .av-drop-name{color:#f1f5f9}.l .av-drop-name{color:#0f172a}
.av-drop-email{font-size:11px;margin-top:1px}
.d .av-drop-email{color:#64748b}.l .av-drop-email{color:#94a3b8}
.av-drop-divider{height:1px;margin:2px 0}
.d .av-drop-divider{background:#334155}.l .av-drop-divider{background:#e2e8f0}
.av-drop-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;width:100%;border:0;background:transparent;font-family:inherit;text-align:start;min-height:44px}
.d .av-drop-item{color:#e2e8f0}.l .av-drop-item{color:#0f172a}
.d .av-drop-item:hover{background:#334155}.l .av-drop-item:hover{background:#f1f5f9}
.av-drop-item svg{flex-shrink:0;opacity:0.7}
.d .av-drop-item svg{stroke:#94a3b8}.l .av-drop-item svg{stroke:#64748b}
.av-drop-item.danger{color:#f87171}
.av-drop-item.danger svg{stroke:#f87171;opacity:1}
.overlay{position:fixed;inset:0;z-index:99;display:none}
.overlay.open{display:block}
/* Search overlay */
.srch-overlay{display:none;position:absolute;top:0;left:0;right:0;height:48px;align-items:center;padding:0 12px;gap:8px;z-index:10;grid-column:1/-1}
.d .srch-overlay{background:#1e293b}.l .srch-overlay{background:#ffffff}
.srch-overlay.open{display:flex}
.srch-overlay input{flex:1;border-radius:8px;padding:6px 10px;font-size:12px;outline:none;font-family:inherit;border:1px solid}
.d .srch-overlay input{background:#334155;border-color:#475569;color:#f1f5f9}
.l .srch-overlay input{background:#f1f5f9;border-color:#e2e8f0;color:#0f172a}
.srch-close{font-size:18px;cursor:pointer;line-height:1;padding:4px 6px;opacity:0.6}

/* ── Dev toolbar ── */
.ctrl{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid;align-items:center;flex-wrap:wrap;flex-shrink:0}
.tcb{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid}
.tcb.on{background:#22D3EE!important;color:#0f172a!important;border-color:#22D3EE!important}
.div1{width:1px;height:16px;margin:0 2px}
.d .div1{background:#334155}.l .div1{background:#e2e8f0}

/* ── Body ── */
.body{display:flex;flex:1;min-height:0}

/* ── Sidebar ── */
.sb{width:46px;display:flex;flex-direction:column;padding:8px 0;border-inline-end:1px solid;transition:width 0.2s ease;overflow:hidden;flex-shrink:0}
.sb.open{width:164px}
.sbt{display:flex;align-items:center;justify-content:center;width:46px;height:38px;margin:0 0 8px 0;border-radius:8px;cursor:pointer;border:0;background:transparent;flex-shrink:0}
.sbt svg{flex-shrink:0}
.d .sbt svg{stroke:#475569}.l .sbt svg{stroke:#94a3b8}
.sbt:hover svg{stroke:#94a3b8!important}
.sg,.sbm,.sbb{display:flex;flex-direction:column;gap:2px}
.sbm{margin:auto 0}
.ni{display:flex;align-items:center;width:46px;height:38px;border-radius:8px;cursor:pointer;white-space:nowrap;overflow:hidden;border:0;background:transparent;flex-shrink:0}
.sb.open .ni{width:100%;border-radius:6px}
.ni:hover svg{stroke:#94a3b8!important}
.ni:hover .nl{color:#94a3b8!important}
.ni .icon-wrap{width:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni svg{flex-shrink:0;transition:stroke 0.15s;display:block}
.d .ni svg{stroke:#475569}.l .ni svg{stroke:#64748b}
.ni.on svg{stroke:#22D3EE!important}
.nl{font-size:12px;font-weight:500;opacity:0;transition:opacity 0.15s,color 0.15s;white-space:nowrap;margin-inline-start:8px}
.d .nl{color:#475569}.l .nl{color:#64748b}
.ni.on .nl{color:#22D3EE!important}
.sb.open .nl{opacity:1}

/* ── Main ── */
.main{flex:1;overflow-y:auto;min-width:0}

/* ── Breadcrumbs ── */
.breadcrumbs{display:flex;align-items:center;gap:6px;padding:8px 14px 0;flex-shrink:0}
.bc-item{font-size:11px;cursor:pointer;transition:color 0.15s}
.d .bc-item{color:#64748b}.l .bc-item{color:#94a3b8}
.d .bc-item:hover{color:#94a3b8}.l .bc-item:hover{color:#64748b}
.bc-sep{display:flex;align-items:center;flex-shrink:0}
.d .bc-sep svg{stroke:#475569}.l .bc-sep svg{stroke:#cbd5e1}
.bc-current{font-size:11px;font-weight:500}
.d .bc-current{color:#f1f5f9}.l .bc-current{color:#0f172a}

/* ── Page header ── */
.pg-wrap{padding:8px 14px 12px}
.pg-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.pg-title-row{display:flex;align-items:center;gap:8px}
.pg-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(34,211,238,0.1);color:#22D3EE}
.pg-title{font-size:17px;font-weight:500}
.pg-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(34,211,238,0.12);color:#22D3EE;border:1px solid rgba(34,211,238,0.25)}
.pg-stats{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pg-stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.pg-stat-val{font-size:14px;font-weight:600}
.pg-stat-val .done{color:#4ade80}
.pg-stat-val .total{color:#22D3EE}
.pg-stat-val .sep{color:#475569;margin:0 2px}
.pg-stat-label{font-size:10px}
.pg-divider{width:1px;height:24px;flex-shrink:0}
.d .pg-divider{background:#334155}.l .pg-divider{background:#e2e8f0}

/* Overall progress bar */
.pg-prog{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.pg-prog-bar{height:3px;border-radius:2px;overflow:hidden}
.d .pg-prog-bar{background:#334155}.l .pg-prog-bar{background:#e2e8f0}
.pg-prog-fill{height:100%;border-radius:2px;background:#22D3EE}

/* ── Module grid — tablet: 2 cols, tighter ── */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 16px}
.mod-grid.portrait{grid-template-columns:1fr}

/* ── Module card — tablet ── */
.mod-card{border-radius:10px;border:1px solid;padding:12px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;position:relative}
.d .mod-card:hover{border-color:#22D3EE44;box-shadow:0 0 0 1px #22D3EE22}
.l .mod-card:hover{border-color:#22D3EE66;box-shadow:0 0 0 1px #22D3EE22}
.mod-card.locked{cursor:default;opacity:0.5}
.d .mod-card.locked:hover{border-color:#334155;box-shadow:none}
.l .mod-card.locked:hover{border-color:#e2e8f0;box-shadow:none}

/* Card head */
.mod-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mod-head-left{display:flex;align-items:center;gap:10px}
.mod-num-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.d .mod-num-badge{background:rgba(34,211,238,0.1);color:#22D3EE;border:1px solid rgba(34,211,238,0.2)}
.l .mod-num-badge{background:rgba(14,116,144,0.08);color:#0e7490;border:1px solid rgba(14,116,144,0.2)}
.mod-num-badge.locked-badge{background:transparent}
.d .mod-num-badge.locked-badge{color:#475569;border-color:#334155}
.l .mod-num-badge.locked-badge{color:#94a3b8;border-color:#e2e8f0}
.mod-name{font-size:13px;font-weight:600;line-height:1.3}

/* Score badge */
.mod-score{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0}
.d .mod-score{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:#FBBF24}
.l .mod-score{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);color:#d97706}
.mod-score.zero{opacity:0.4}

/* Lock icon */
.mod-lock{display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.4}

/* Progress bar */
.mod-prog{display:flex;flex-direction:column;gap:4px}
.mod-prog-row{display:flex;justify-content:space-between;align-items:center}
.mod-prog-label{font-size:10px}
.mod-prog-val{font-size:10px;font-weight:500}
.mod-prog-val .done{color:#4ade80}
.mod-prog-val .total{color:#22D3EE}
.mod-prog-bar{height:3px;border-radius:2px;overflow:hidden}
.d .mod-prog-bar{background:#334155}.l .mod-prog-bar{background:#e2e8f0}
.mod-prog-fill{height:100%;border-radius:2px;background:#22D3EE}
.mod-prog-fill.complete{background:#4ade80}

/* Divider */
.mod-div{height:1px;margin:0 -12px}
.d .mod-div{background:#334155}.l .mod-div{background:#e2e8f0}

/* Subtopic list */
.mod-topics{display:flex;flex-direction:column;gap:6px}
.mod-topic{display:flex;align-items:flex-start;gap:8px}
.mod-topic-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.d .mod-topic-dot{background:#334155}.l .mod-topic-dot{background:#cbd5e1}
.mod-topic-dot.done{background:#4ade80}
.mod-topic-dot.active{background:#22D3EE}
.mod-topic-body{flex:1;min-width:0}
.mod-topic-name{font-size:11.5px;line-height:1.4}
.mod-topic-desc{font-size:10.5px;line-height:1.5;margin-top:2px}

/* Card footer */
.mod-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mod-atoms{font-size:10.5px}
.mod-atoms .done{color:#4ade80;font-weight:600}
.mod-atoms .total{color:#22D3EE;font-weight:500}
.mod-atoms .sep{color:#475569;margin:0 2px}
.mod-arrow{display:flex;align-items:center;flex-shrink:0;opacity:0.4;transition:opacity 0.15s}
.mod-card:not(.locked):hover .mod-arrow{opacity:1}

/* KT card — special styling */
.mod-card.kt-card{border-style:dashed}
.d .mod-card.kt-card{border-color:#FBBF2466}
.l .mod-card.kt-card{border-color:#FBBF2466}
.d .mod-card.kt-card:hover{border-color:#FBBF24;box-shadow:0 0 0 1px #FBBF2422}
.l .mod-card.kt-card:hover{border-color:#FBBF24;box-shadow:0 0 0 1px #FBBF2422}
.mod-num-badge.kt-badge{background:rgba(251,191,36,0.1);color:#FBBF24;border:1px solid rgba(251,191,36,0.3)}
</style>
</head>
<body>
<div class="shell d" id="shell">

  <!-- Header -->
  <div class="hdr p1 bd">
    <div class="hdr-left">
      <div class="logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 4.5v9L12 21l-9-4.5v-9z"/><path d="M12 3v18"/><path d="M3 7.5l9 4.5 9-4.5"/></svg>
      </div>
      <span class="brand t1"><b>Math</b> With Love</span>
    </div>
    <div class="hdr-center">
      <div class="hico p1 bd t2" onclick="toggleSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </div>
    <div class="hdr-right">
            <!-- Globe-dropdown -->
      <div class="lg-wrap">
        <div class="hico bd t2" id="lgBtn" onclick="toggleLangDD()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <div class="lg-dropdown p1 bd" id="lgDropdown">
          <div class="lg-item on" id="lgItemRu" onclick="setLang('ru');closeLangDD()">
            <span>RU</span>
            <svg class="lg-check" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="lg-item" id="lgItemHe" onclick="setLang('he');closeLangDD()">
            <span>HE</span>
            <svg class="lg-check" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
      </div>
      <div class="lg-overlay" id="lgOverlay" onclick="closeLangDD()"></div>
      <!-- Bell -->
      <div class="hico bd t2">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5a2 2 0 0 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3h-16a4 4 0 0 0 2-3v-3a7 7 0 0 1 4-6"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/></svg>
      </div>
      <!-- Avatar with dropdown -->
      <div class="hav-wrap">
        <div class="hav" id="havBtn" onclick="toggleDrop()">ИА</div>
        <div class="av-drop p1 bd" id="avDrop">
          <div class="av-drop-user">
            <div class="av-drop-name">Игаль</div>
            <div class="av-drop-email">user@example.com</div>
          </div>
          <div class="av-drop-divider"></div>
          <button class="av-drop-item" onclick="closeDrop()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
            <span data-i18n="dropProfile">Профиль</span>
          </button>
          <button class="av-drop-item" onclick="closeDrop()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span data-i18n="dropSettings">Настройки</span>
          </button>
          <div class="av-drop-divider"></div>
          <button class="av-drop-item danger" onclick="closeDrop()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span data-i18n="dropLogout">Выйти</span>
          </button>
        </div>
      </div>
      <div class="overlay" id="overlay" onclick="closeDrop()"></div>
    </div>
    <div class="srch-overlay p1 bd" id="srchOverlay">
      <input type="text" id="srchInput" placeholder="Поиск по курсам…">
      <span class="srch-close t2" onclick="toggleSearch()">×</span>
    </div>
  </div>

  <div class="body">

    <!-- Sidebar -->
    <div class="sb p1 bd" id="sb">
      <button class="sbt" onclick="toggleSb()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
      </button>
      <div class="sg">
        <!-- Home -->
        <div class="ni" id="niDashboard">
          <span class="icon-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9-9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/><path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6"/></svg></span>
          <span class="nl" data-i18n="navHome">Главная</span>
        </div>

      html += '<div class="mod-topic-body">';
      html += '<div class="mod-topic-name t1' + (isLocked?' t3':'') + '">' + (tp.name[LANG]||tp.name.ru) + '</div>';
      html += '<div class="mod-topic-desc t2' + (isLocked?' t3':'') + '">' + (tp.desc[LANG]||tp.desc.ru) + '</div>';
      html += '</div></div>';
    });
    html += '</div>';

    // Footer: total atoms + arrow
    html += '<div class="mod-foot">';
    if(mod.hasKT){
      html += '<span style="font-size:10px;color:#FBBF24;display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3l8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>' + (LANG==='he'?'בוחן ביניים':'Есть КТ') + '</span>';
    } else {
      html += '<span></span>';
    }
    if(!isLocked){
      html += '<span class="mod-arrow t2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>';
    }
    html += '</div>';

    html += '</div>'; // .mod-card
  });

  grid.innerHTML = html;
}

// ── Search ──
function toggleSearch(){
  var o = document.getElementById('srchOverlay');
  var open = o.classList.toggle('open');
  if(open) document.getElementById('srchInput').focus();
}

// ── Orientation ──
// ── Orientation via ResizeObserver ──
function applyOrientation(){
  var isPortrait = window.innerWidth < 768;
  var grid = document.getElementById('modGrid');
  if(grid) grid.className = 'mod-grid' + (isPortrait ? ' portrait' : '');
}

var _roTimer;
new ResizeObserver(function(){
  clearTimeout(_roTimer);
  _roTimer = setTimeout(applyOrientation, 50);
}).observe(document.documentElement);

// ── Sidebar ──
function toggleSb(){
  sbOpen = !sbOpen;
  document.getElementById('sb').className = 'sb p1 bd' + (sbOpen ? ' open' : '');
}


// ── Language ──
// ── Globe-dropdown ──
// Avatar-dropdown — mutual exclusion with lang DD
function openDrop(){
  document.getElementById('avDrop').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeDrop(){
  document.getElementById('avDrop').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function toggleDrop(){
  var d = document.getElementById('avDrop');
  closeLangDD();
  d.classList.contains('open') ? closeDrop() : openDrop();
}
function toggleLangDD(){
  var dd = document.getElementById('lgDropdown');
  var ov = document.getElementById('lgOverlay');
  var isOpen = dd.classList.contains('open');
  if(isOpen){ closeLangDD(); } else { dd.classList.add('open'); ov.classList.add('open'); }
}
function closeLangDD(){
  document.getElementById('lgDropdown').classList.remove('open');
  document.getElementById('lgOverlay').classList.remove('open');
}

// ── Language ──
function setLang(lang){
  LANG = lang;
  document.getElementById('lgItemRu').classList.toggle('on', lang === 'ru');
  document.getElementById('lgItemHe').classList.toggle('on', lang === 'he');
  renderAll();
applyOrientation();
}

// ── Avatar-dropdown ──



renderAll();
applyOrientation();
</script>
