<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif}

.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.d{background:#0f172a}.l{background:#f8fafc}
.d .t1{color:#f1f5f9}.l .t1{color:#0f172a}
.d .t2{color:#94a3b8}.l .t2{color:#64748b}
.d .t3{color:#475569}.l .t3{color:#94a3b8}
.d .p1{background:#1e293b;border-color:#334155}.l .p1{background:#ffffff;border-color:#e2e8f0}
.d .p2{background:#334155;border-color:#334155}.l .p2{background:#f1f5f9;border-color:#e2e8f0}
.d .bd{border-color:#334155!important}.l .bd{border-color:#e2e8f0!important}

/* ── Header — tablet ── */
.hdr{height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 12px;border-bottom:1px solid;flex-shrink:0;position:relative}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-center{display:flex;align-items:center;justify-content:center}
.hdr-right{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.logo{width:26px;height:26px;border-radius:50%;background:#22D3EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand{font-size:13px;font-weight:500}.brand b{color:#22D3EE;font-weight:500}
.lang-btn{width:30px;height:30px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;background:transparent;font-family:inherit;letter-spacing:0.04em;display:flex;align-items:center;justify-content:center;transition:color 0.15s,border-color 0.15s}
.d .lang-btn{color:#22D3EE;border-color:#22D3EE55}.l .lang-btn{color:#0e7490;border-color:#22D3EE66}
.d .lang-btn:hover{border-color:#22D3EE}.l .lang-btn:hover{border-color:#0e7490}
.hico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid}
/* Search overlay */
.srch-overlay{display:none;position:absolute;top:0;left:0;right:0;height:48px;align-items:center;padding:0 12px;gap:8px;z-index:10}
.d .srch-overlay{background:#1e293b}.l .srch-overlay{background:#ffffff}
.srch-overlay.open{display:flex}
.srch-overlay input{flex:1;border-radius:8px;padding:6px 10px;font-size:12px;outline:none;font-family:inherit;border:1px solid}
.d .srch-overlay input{background:#334155;border-color:#475569;color:#f1f5f9}
.l .srch-overlay input{background:#f1f5f9;border-color:#e2e8f0;color:#0f172a}
.srch-close{font-size:18px;cursor:pointer;line-height:1;padding:4px 6px;opacity:0.6}

/* ── Dev toolbar ── */
.ctrl{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid;align-items:center;flex-wrap:wrap;flex-shrink:0}
.tcb{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid}
.tcb.on{background:#22D3EE!important;color:#0f172a!important;border-color:#22D3EE!important}
.div1{width:1px;height:16px;margin:0 2px}
.d .div1{background:#334155}.l .div1{background:#e2e8f0}

/* ── Body ── */
.body{display:flex;flex:1;min-height:0}

/* ── Body ── */
.body{display:flex;flex:1;min-height:0}

/* ── Main — no sidebar, bottom nav offset ── */
.main{flex:1;overflow-y:auto;min-width:0;padding-bottom:calc(64px + env(safe-area-inset-bottom))}

/* ── Breadcrumbs ── */
.breadcrumbs{display:flex;align-items:center;gap:5px;padding:8px 12px 0;flex-shrink:0}
.bc-item{font-size:11px;cursor:pointer;transition:color 0.15s}
.d .bc-item{color:#64748b}.l .bc-item{color:#94a3b8}
.bc-sep{display:flex;align-items:center;flex-shrink:0}
.d .bc-sep svg{stroke:#475569}.l .bc-sep svg{stroke:#cbd5e1}
.bc-current{font-size:11px;font-weight:500}
.d .bc-current{color:#f1f5f9}.l .bc-current{color:#0f172a}

/* ── Page header ── */
.pg-wrap{padding:6px 12px 12px}
.pg-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.pg-title-row{display:flex;align-items:center;gap:7px}
.pg-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(34,211,238,0.1);color:#22D3EE}
.pg-title{font-size:15px;font-weight:500}
.pg-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;background:rgba(34,211,238,0.12);color:#22D3EE;border:1px solid rgba(34,211,238,0.25)}
.pg-stats{display:flex;align-items:center;gap:7px;flex-shrink:0}
.pg-stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.pg-stat-val{font-size:13px;font-weight:600}
.pg-stat-val .done{color:#4ade80}
.pg-stat-val .total{color:#22D3EE}
.pg-stat-val .sep{color:#475569;margin:0 1px}
.pg-stat-label{font-size:9px}
.pg-divider{width:1px;height:20px;flex-shrink:0}
.d .pg-divider{background:#334155}.l .pg-divider{background:#e2e8f0}
.pg-prog{margin-top:5px}
.pg-prog-bar{height:3px;border-radius:2px;overflow:hidden}
.d .pg-prog-bar{background:#334155}.l .pg-prog-bar{background:#e2e8f0}
.pg-prog-fill{height:100%;border-radius:2px;background:#22D3EE}

/* ── Module grid — mobile: single column ── */
.mod-grid{display:flex;flex-direction:column;gap:9px;padding:0 12px 12px}

/* ── Module card ── */
.mod-card{border-radius:10px;border:1px solid;padding:12px;display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:border-color 0.15s;position:relative}
.d .mod-card:hover{border-color:#22D3EE44}
.l .mod-card:hover{border-color:#22D3EE66}
.mod-card.locked{cursor:default;opacity:0.5}
.d .mod-card.locked:hover{border-color:#334155}
.l .mod-card.locked:hover{border-color:#e2e8f0}

.mod-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mod-head-left{display:flex;align-items:center;gap:7px}
.mod-num-badge{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.d .mod-num-badge{background:rgba(34,211,238,0.1);color:#22D3EE;border:1px solid rgba(34,211,238,0.2)}
.l .mod-num-badge{background:rgba(14,116,144,0.08);color:#0e7490;border:1px solid rgba(14,116,144,0.2)}
.mod-num-badge.locked-badge{background:transparent}
.d .mod-num-badge.locked-badge{color:#475569;border-color:#334155}
.l .mod-num-badge.locked-badge{color:#94a3b8;border-color:#e2e8f0}
.mod-name{font-size:12px;font-weight:600;line-height:1.3}

.mod-score{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:7px;font-size:10px;font-weight:500;white-space:nowrap;flex-shrink:0}
.d .mod-score{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:#FBBF24}
.l .mod-score{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);color:#d97706}
.mod-score.zero{opacity:0.4}
.mod-lock{display:flex;align-items:center;flex-shrink:0;opacity:0.4}

.mod-prog{display:flex;flex-direction:column;gap:3px}
.mod-prog-row{display:flex;justify-content:space-between;align-items:center}
.mod-prog-label{font-size:9.5px}
.mod-prog-val{font-size:9.5px;font-weight:500}
.mod-prog-val .done{color:#4ade80}
.mod-prog-val .total{color:#22D3EE}
.mod-prog-bar{height:3px;border-radius:2px;overflow:hidden}
.d .mod-prog-bar{background:#334155}.l .mod-prog-bar{background:#e2e8f0}
.mod-prog-fill{height:100%;border-radius:2px;background:#22D3EE}
.mod-prog-fill.complete{background:#4ade80}

.mod-div{height:1px;margin:0 -12px}
.d .mod-div{background:#334155}.l .mod-div{background:#e2e8f0}

.mod-topics{display:flex;flex-direction:column;gap:5px}
.mod-topic{display:flex;align-items:flex-start;gap:7px}
.mod-topic-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.d .mod-topic-dot{background:#334155}.l .mod-topic-dot{background:#cbd5e1}
.mod-topic-dot.done{background:#4ade80}
.mod-topic-dot.active{background:#22D3EE}
.mod-topic-body{flex:1;min-width:0}
.mod-topic-name{font-size:11px;line-height:1.4}
.mod-topic-desc{font-size:10px;line-height:1.5;margin-top:1px}

.mod-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mod-arrow{display:flex;align-items:center;flex-shrink:0;opacity:0.4;transition:opacity 0.15s}
.mod-card:not(.locked):hover .mod-arrow{opacity:1}

.mod-card.kt-card{border-style:dashed}
.d .mod-card.kt-card{border-color:#FBBF2466}
.l .mod-card.kt-card{border-color:#FBBF2466}
.d .mod-card.kt-card:hover{border-color:#FBBF24}
.l .mod-card.kt-card:hover{border-color:#FBBF24}
.mod-num-badge.kt-badge{background:rgba(251,191,36,0.1);color:#FBBF24;border:1px solid rgba(251,191,36,0.3)}

/* ── Bottom nav ── */
.bnav{position:fixed;left:0;right:0;bottom:0;display:flex;direction:ltr;border-top:1px solid;padding:5px 4px calc(5px + env(safe-area-inset-bottom));z-index:10}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 2px;border-radius:8px;cursor:pointer;min-height:44px}
.bni svg{flex-shrink:0}
.d .bni svg{stroke:#475569}.l .bni svg{stroke:#94a3b8}
.bni.on svg{stroke:#22D3EE!important}
.bnl{font-size:9.5px;font-weight:500}
.d .bnl{color:#475569}.l .bnl{color:#64748b}
.bni.on .bnl{color:#22D3EE!important}
</style>
</head>

// ── i18n ──
var TR = {
  ru:{ navDashboard:'Дашборд', navCourses:'Курсы', navAchievements:'Достижения', navFormulas:'Формулы', navLab:'Лаборатория', navHelp:'Помощь', navSettings:'Настройки', statModules:'модулей', statPoints:'баллов', modAtoms:'атомов', modComplete:'Завершён', modInProgress:'В процессе', modLocked:'Заблокирован', modKT:'Контрольная', pts:'балл.' },
  he:{ navDashboard:'לוח מחוונים', navCourses:'קורסים', navAchievements:'הישגים', navFormulas:'נוסחאות', navLab:'מעבדה', navHelp:'עזרה', navSettings:'הגדרות', statModules:'מודולים', statPoints:'נקודות', modAtoms:'אטומים', modComplete:'הושלם', modInProgress:'בתהליך', modLocked:'נעול', modKT:'בוחן', pts:'נק.' }
};
function t(k){ return (TR[LANG]&&TR[LANG][k])||TR.ru[k]||k; }

function renderAll(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){ el.textContent = t(el.getAttribute('data-i18n')); });
  var isRTL = LANG === 'he';
  document.getElementById('shell').setAttribute('dir', isRTL ? 'rtl' : 'ltr');
  document.getElementById('pgTitle').textContent = THEME.name[LANG] || THEME.name.ru;
  document.getElementById('pgBadge').textContent = THEME.exam[LANG] || THEME.exam.ru;
  document.getElementById('bcTheme').textContent = THEME.name[LANG] || THEME.name.ru;
  renderModules();
}

function renderModules(){
  var grid = document.getElementById('modGrid');
  var html = '';

  THEME.modules.forEach(function(mod){
    var isLocked  = mod.status === 'locked';
    var isDone    = mod.status === 'done';
    var isCurrent = mod.status === 'current';
    var isKT      = mod.isKT === true;

    var cardClass = 'mod-card p1 bd' + (isLocked ? ' locked' : '') + (isKT ? ' kt-card' : '');
    var badgeClass = 'mod-num-badge' + (isLocked ? ' locked-badge' : isKT ? ' kt-badge' : '');
    var badgeText  = isKT ? (LANG==='he'?'בוחן':'КТ') : (LANG==='he'?'מודול ':'Модуль ') + mod.id;

    var pct = mod.totalAtoms > 0 ? Math.round(mod.doneAtoms / mod.totalAtoms * 100) : 0;
    var fillClass = 'mod-prog-fill' + (isDone ? ' complete' : '');

    // Status label
    var statusLabel = isDone ? t('modComplete') : isCurrent ? t('modInProgress') : t('modLocked');
    var statusColor = isDone ? '#4ade80' : isCurrent ? '#22D3EE' : '#475569';

    html += '<div class="' + cardClass + '">';

    // Head
    html += '<div class="mod-head">';
    html += '<div class="mod-head-left">';
    html += '<span class="' + badgeClass + '">' + badgeText + '</span>';
    html += '</div>';
    if(!isLocked && !isKT){
      html += '<span class="mod-score' + (mod.earnedPts===0?' zero':'') + '"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.5 5.5l6 .8l-4.3 4.2l1 6l-5.2-2.9l-5.2 2.9l1-6l-4.3-4.2l6-.8z"/></svg>' + mod.earnedPts + ' / ' + mod.maxPts + ' ' + t('pts') + '</span>';
    } else if(isKT && !isLocked){
      html += '<span class="mod-score' + (mod.earnedPts===0?' zero':'') + '"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.5 5.5l6 .8l-4.3 4.2l1 6l-5.2-2.9l-5.2 2.9l1-6l-4.3-4.2l6-.8z"/></svg>' + mod.earnedPts + ' / ' + mod.maxPts + ' ' + t('pts') + '</span>';
    } else if(isLocked){
      html += '<span class="mod-lock"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>';
    }
    html += '</div>';

    // Module name
    html += '<div class="mod-name t1">' + (mod.name[LANG] || mod.name.ru) + '</div>';

    // Progress bar (not for KT)
    if(!isKT){
      html += '<div class="mod-prog">';
      html += '<div class="mod-prog-row"><span class="mod-prog-label t3" style="font-size:10px;color:' + statusColor + '">' + statusLabel + '</span><span class="mod-prog-val"><span class="done">' + mod.doneAtoms + '</span><span class="sep">/</span><span class="total">' + mod.totalAtoms + '</span> <span class="t3">' + t('modAtoms') + '</span></span></div>';
      html += '<div class="mod-prog-bar"><div class="' + fillClass + '" style="width:' + pct + '%"></div></div>';
      html += '</div>';
    }

    // Divider
    html += '<div class="mod-div"></div>';

    // Topics
    html += '<div class="mod-topics">';
    mod.topics.forEach(function(tp){
      var dotClass = 'mod-topic-dot' + (tp.status==='done'?' done':tp.status==='active'?' active':'');
      html += '<div class="mod-topic">';
      html += '<div class="' + dotClass + '"></div>';
      html += '<div class="mod-topic-body">';
      html += '<div class="mod-topic-name t1' + (isLocked?' t3':'') + '">' + (tp.name[LANG]||tp.name.ru) + '</div>';
      html += '<div class="mod-topic-desc t2' + (isLocked?' t3':'') + '">' + (tp.desc[LANG]||tp.desc.ru) + '</div>';
      html += '</div></div>';
    });
    html += '</div>';

    // Footer: total atoms + arrow
    html += '<div class="mod-foot">';
    if(mod.hasKT){
      html += '<span style="font-size:10px;color:#FBBF24;display:flex;align-items:center;gap:3px"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3l8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>' + (LANG==='he'?'בוחן ביניים':'Есть КТ') + '</span>';
    } else {
      html += '<span></span>';
    }
    if(!isLocked){
      html += '<span class="mod-arrow t2"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>';
    }
    html += '</div>';

    html += '</div>'; // .mod-card
  });

  grid.innerHTML = html;
}

// ── Search ──
function toggleSearch(){
  var o = document.getElementById('srchOverlay');
  var open = o.classList.toggle('open');
  if(open) document.getElementById('srchInput').focus();
}

// ── Bottom nav ──
var tabIds = ['bniHome','bniCourses','bniAchievements','bniLab','bniSettings'];
function setActiveTab(id){
  tabIds.forEach(function(tid){ var el=document.getElementById(tid); if(el) el.classList.remove('on'); });
  var a = document.getElementById(id); if(a) a.classList.add('on');
}

// ── Theme mode ──
function setMode(m){
  CM = m;
  document.getElementById('shell').className = 'shell ' + m;
  document.getElementById('bd').className = 'tcb' + (m==='d'?' on':'');
  document.getElementById('bl').className = 'tcb' + (m==='l'?' on':'');
}

// ── Language ──
function toggleLang(){ setLang(LANG==='ru'?'he':'ru'); }
function setLang(lang){
  LANG = lang;
  document.getElementById('langBtn').textContent = lang.toUpperCase();
  renderAll();
}

renderAll();
