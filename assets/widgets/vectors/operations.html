                const match = text.match(/([A-Z']+)(?=\(|$)/); // Буквы до скобки с координатами или до конца
                if (match) {
                    const lettersOnly = match[1];
                    arrowWidth = ctx.measureText(lettersOnly).width;
                    // Смещаем начало стрелки к позиции букв
                    const coefficientPart = text.replace(/[A-Z']+(?=\(|$).*/, '').replace(/[A-Z']+$/, '');
                    const coefficientWidth = ctx.measureText(coefficientPart).width;
                    arrowX = x + coefficientWidth;
                } else {
                    // Если не нашли буквы, рисуем над всем текстом до скобок
                    const textBeforeCoords = text.split('(')[0];
                    arrowWidth = ctx.measureText(textBeforeCoords).width;
                }
            } else {
                // Стрелка над всем текстом до координат
                const textBeforeCoords = text.split('(')[0];
                arrowWidth = ctx.measureText(textBeforeCoords).width;
            }
            
            const arrowY = y - 20;
            const arrowStartX = arrowX;
            const arrowEndX = arrowX + arrowWidth;
            
            ctx.strokeStyle = LABEL_COLOR;
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.moveTo(arrowStartX, arrowY);
            ctx.lineTo(arrowEndX, arrowY);
            ctx.stroke();
            
            const arrowHeadSize = 4;
            ctx.beginPath();
            ctx.moveTo(arrowEndX, arrowY);
            ctx.lineTo(arrowEndX - arrowHeadSize, arrowY - arrowHeadSize/2);
            ctx.lineTo(arrowEndX - arrowHeadSize, arrowY + arrowHeadSize/2);
            ctx.closePath();
            ctx.fillStyle = LABEL_COLOR;
            ctx.fill();
        }

        function drawVectorUnderline(text, x, y, underlineOnlyLetter = false) {
            ctx.font = 'bold 16px "STIX Two Math", "Times New Roman", serif';
            
            let underlineWidth;
            let underlineX = x;
            
            if (underlineOnlyLetter) {
                // Подчеркиваем только буквы в конце (до координат)
                const match = text.match(/([a-zA-Z]+)(?=\(|$)/);
                if (match) {
                    const lettersOnly = match[1];
                    underlineWidth = ctx.measureText(lettersOnly).width;
                    // Смещаем начало подчеркивания к позиции букв
                    const coefficientPart = text.replace(/[a-zA-Z]+(?=\(|$).*/, '').replace(/[a-zA-Z]+$/, '');
                    const coefficientWidth = ctx.measureText(coefficientPart).width;
                    underlineX = x + coefficientWidth;
                } else {
                    // Если не нашли буквы, подчеркиваем весь текст до скобок
                    const textBeforeCoords = text.split('(')[0];
                    underlineWidth = ctx.measureText(textBeforeCoords).width;
                }
            } else {
                // Подчеркиваем весь текст до координат
                const textBeforeCoords = text.split('(')[0];
                underlineWidth = ctx.measureText(textBeforeCoords).width;
            }
            
            const underlineY = y + 3;
            
            ctx.strokeStyle = LABEL_COLOR;
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.moveTo(underlineX, underlineY);
            ctx.lineTo(underlineX + underlineWidth, underlineY);
            ctx.stroke();
        }

        function drawOperationVectorUnderline(text, x, y) {
            // Подчеркиваем отдельные буквы в операциях как на кнопках (a+b → a̲+b̲)
            ctx.font = 'bold 16px "STIX Two Math", "Times New Roman", serif';
            ctx.strokeStyle = LABEL_COLOR;
            ctx.lineWidth = 1.5;
            
            const textBeforeCoords = text.split('(')[0]; // Убираем координаты если есть
            let currentX = x;
            const underlineY = y + 3;
            
            for (let i = 0; i < textBeforeCoords.length; i++) {
                const char = textBeforeCoords[i];
                const charWidth = ctx.measureText(char).width;
                
                // Подчеркиваем только буквы (a, b, c и т.д.)
                if (/[a-zA-Z]/.test(char)) {
                    ctx.beginPath();
                    ctx.moveTo(currentX, underlineY);
                    ctx.lineTo(currentX + charWidth, underlineY);
                    ctx.stroke();
                }
                
                currentX += charWidth;
            }
        }

        function drawLabels() {
            ctx.fillStyle = LABEL_COLOR;
            ctx.font = 'bold 16px "STIX Two Math", "Times New Roman", serif';
            ctx.textAlign = 'left'; // Явно устанавливаем выравнивание

            // Отрисовка ярлыков точек с умным смещением
            const drawnPointLabels = new Set(); // Чтобы не дублировать ярлыки одной точки
            
            points.forEach(point => {
                // Пропускаем точки без имен (временные точки)
                if (!point.name || drawnPointLabels.has(point)) return;
                
                let labelText = point.name;
                
                // Добавляем координаты если показаны оси
                if (showAxesCheckbox.checked) {
                    // Находим центр координатной системы
                    const centerX = Math.round(canvas.width / 2 / GRID_SIZE) * GRID_SIZE;
                    const centerY = Math.round(canvas.height / 2 / GRID_SIZE) * GRID_SIZE;
                    
                    // Вычисляем координаты точки относительно центра координатной системы
                    const coordX = Math.round((point.x - centerX) / GRID_SIZE * 10) / 10; // Округляем до 1 знака после запятой
                    const coordY = Math.round((centerY - point.y) / GRID_SIZE * 10) / 10; // Инвертируем Y для математической системы
                    
                    labelText = `${point.name}(${coordX}; ${coordY})`;
                }
                
                // Получаем умное смещение для этой точки
                let offset;
                
                // Для треугольного метода: фиксируем позицию ярлыков начальной и конечной точек результирующего вектора
                const resultVector = operationVectors.find(v => v.isResultVector);
                if (resultVector && isTriangleMethod && 
                    (point === resultVector.endPoint || point === resultVector.startPoint)) {
                    // Используем стандартное смещение без учета usageCount
                    offset = { x: 8, y: -8 };
                } else {
                    offset = getLabelOffset(point, 0); // Обычное смещение с учетом usageCount
                }
                
                ctx.fillText(labelText, point.x + offset.x, point.y + offset.y);
                
                drawnPointLabels.add(point);
            });

            vectors.forEach(vector => {
                const midX = (vector.startPoint.x + vector.endPoint.x) / 2;
                const midY = (vector.startPoint.y + vector.endPoint.y) / 2;
                
                const angle = Math.atan2(vector.endPoint.y - vector.startPoint.y, vector.endPoint.x - vector.startPoint.x);
                const offsetDistance = 20;
                const offsetX = -Math.sin(angle) * offsetDistance;
                const offsetY = Math.cos(angle) * offsetDistance;
                
                let labelX = midX + offsetX;
                let labelY = midY + offsetY;
                
                // Проверяем, нужно ли смещение из-за близости к точке с несколькими векторами
                for (let point of points) {
                    if (point.name && pointUsageCount.has(point) && pointUsageCount.get(point) > 1) {
                        const distanceToPoint = Math.sqrt((labelX - point.x) ** 2 + (labelY - point.y) ** 2);
                        if (distanceToPoint < 40) { // Если ярлык вектора слишком близко к многоиспользуемой точке
                            // Смещаем ярлык вектора дальше
                            const avoidanceOffsetX = -Math.sin(angle) * (offsetDistance + 15);
                            const avoidanceOffsetY = Math.cos(angle) * (offsetDistance + 15);
                            labelX = midX + avoidanceOffsetX;
                            labelY = midY + avoidanceOffsetY;
                        }
                    }
                }
                
                let displayText;
                
                if (vector.parentVector) {
                    const coefficient = calculateCoefficient(vector, vector.parentVector);
                    const roundedCoeff = Math.round(coefficient * 10) / 10;
                    
                    if (vectorNamingCheckbox.checked) {
                        // Двубуквенный формат: коэффициент + точки зависимого вектора + стрелка
                        const vectorPoints = vector.startPoint.name + vector.endPoint.name;
                        if (roundedCoeff === 1) {
                            displayText = vectorPoints;
                        } else if (roundedCoeff === -1) {
                            displayText = '-' + vectorPoints;
                        } else {
                            displayText = roundedCoeff + vectorPoints;
                        }
                        
                        // Добавляем координаты если показаны оси
                        if (showAxesCheckbox.checked) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        ctx.fillText(displayText, labelX, labelY);
                        drawVectorArrow(displayText, labelX, labelY, true); // Стрелка только над буквами
                    } else {
                        // Однобуквенный формат с коэффициентом и подчеркиванием
                        if (roundedCoeff === 1) {
                            displayText = vector.parentVector.name;
                        } else if (roundedCoeff === -1) {
                            displayText = '-' + vector.parentVector.name;
                        } else {
                            displayText = roundedCoeff + vector.parentVector.name;
                        }
                        
                        // Добавляем координаты если показаны оси
                        if (showAxesCheckbox.checked) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        ctx.fillText(displayText, labelX, labelY);
                        // Подчеркиваем только букву, НЕ коэффициент
                        drawVectorUnderline(displayText, labelX, labelY, true);
                    }
                } else {
                    if (vectorNamingCheckbox.checked) {
                        // Двубуквенный формат со стрелкой
                        displayText = vector.startPoint.name + vector.endPoint.name;
                        
                        // Добавляем координаты если показаны оси
                        if (showAxesCheckbox.checked) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        ctx.fillText(displayText, labelX, labelY);
                        drawVectorArrow(displayText, labelX, labelY);
                    } else {
                        // Однобуквенный формат с подчеркиванием
                        displayText = vector.name;
                        
                        // Добавляем координаты если показаны оси
                        if (showAxesCheckbox.checked) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        ctx.fillText(displayText, labelX, labelY);
                        
                        // Для результирующих векторов операций подчеркиваем отдельные буквы как на кнопках
                        if (vector.name && (vector.name.includes('+') || vector.name.includes('-'))) {
                            drawOperationVectorUnderline(displayText, labelX, labelY);
                        } else {
                            drawVectorUnderline(displayText, labelX, labelY);
                        }
                    }
                }
            });
            
            // Обновляем список векторов на панели
            updateVectorsList();
        }

        function getVectorCoordinates(vector) {
            // Находим центр координатной системы
            const centerX = Math.round(canvas.width / 2 / GRID_SIZE) * GRID_SIZE;
            const centerY = Math.round(canvas.height / 2 / GRID_SIZE) * GRID_SIZE;
            
            // Вычисляем координаты вектора
            const dx = vector.endPoint.x - vector.startPoint.x;
            const dy = vector.endPoint.y - vector.startPoint.y;
            
            // Переводим в единицы координатной системы
            const coordX = Math.round(dx / GRID_SIZE * 10) / 10;
            const coordY = Math.round(-dy / GRID_SIZE * 10) / 10; // Инвертируем Y
            
            return { x: coordX, y: coordY };
        }

        function getPointCoordinates(point) {
            // Находим центр координатной системы
            const centerX = Math.round(canvas.width / 2 / GRID_SIZE) * GRID_SIZE;
            const centerY = Math.round(canvas.height / 2 / GRID_SIZE) * GRID_SIZE;
            
            // Вычисляем координаты точки относительно центра
            const coordX = Math.round((point.x - centerX) / GRID_SIZE * 10) / 10;
            const coordY = Math.round((centerY - point.y) / GRID_SIZE * 10) / 10;
            
            return { x: coordX, y: coordY };
        }

        function updateVectorsList() {
            const vectorsList = document.getElementById('vectorsList');
            
            if (vectors.length === 0) {
                vectorsList.innerHTML = '<div class="no-vectors">Нет построенных векторов</div>';
                return;
            }
            
            let html = '';
            vectors.forEach((vector, index) => {
                const coords = getVectorCoordinates(vector);
                const startCoords = getPointCoordinates(vector.startPoint);
                const endCoords = getPointCoordinates(vector.endPoint);
                
                let vectorName = '';
                let katexVectorName = '';
                
                // Определяем название вектора без коэффициентов
                if (vectorNamingCheckbox.checked) {
                    vectorName = vector.startPoint.name + vector.endPoint.name;
                    katexVectorName = `\\overrightarrow{${vectorName}}`;
                } else {
                    vectorName = vector.name;
                    katexVectorName = `\\underline{${vectorName}}`;
                }
                
                // Особые названия для зависимых векторов
                if (vector.parentVector) {
                    const coefficient = calculateCoefficient(vector, vector.parentVector);
                    const roundedCoeff = Math.round(coefficient * 10) / 10;
                    
                    let coefficientPart = '';
                    if (roundedCoeff === 1) {
                        coefficientPart = '';
                    } else if (roundedCoeff === -1) {
                        coefficientPart = '-';
                    } else {
                        coefficientPart = roundedCoeff.toString();
                    }
                    
                    if (vectorNamingCheckbox.checked) {
                        const vectorPoints = vector.startPoint.name + vector.endPoint.name;
                        katexVectorName = `${coefficientPart}\\overrightarrow{${vectorPoints}}`;
                        vectorName = coefficientPart + vectorPoints;
                    } else {
                        katexVectorName = `${coefficientPart}\\underline{${vector.parentVector.name}}`;
                        vectorName = coefficientPart + vector.parentVector.name;
                    }
                }
                
                // Функция для правильного форматирования координат в формуле
                const formatCoordinate = (endCoord, startCoord) => {
                    if (startCoord >= 0) {
                        return `${endCoord} - ${startCoord}`;
                    } else {
                        return `${endCoord} + ${Math.abs(startCoord)}`;
                    }
                };
                
                // Создаем уникальные ID для каждого KaTeX элемента
                const vectorTitleId = `vector-title-${index}`;
                const vectorFormulaId = `vector-formula-${index}`;
                const vectorCoordsId = `vector-coords-${index}`;
                
                html += `
                    <div class="vector-item" id="vector-${index}">
                        <div class="vector-header" onclick="toggleVectorDetails(${index})">
                            <span>Вектор <span id="${vectorTitleId}"></span></span>
                            <span class="vector-arrow">▼</span>
                        </div>
                        <div class="vector-content">
                            <div class="vector-coordinates">
                                <div class="vector-formula">
                                    <span id="${vectorFormulaId}"></span>
                                </div>
                                <div><span id="${vectorCoordsId}"></span></div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Рендерим KaTeX после добавления HTML
                setTimeout(() => {
                    try {
                        // Название вектора
                        katex.render(katexVectorName, document.getElementById(vectorTitleId), {
                            throwOnError: false
                        });
                        
                        // Формула вектора
                        const formulaText = `${katexVectorName} = (${formatCoordinate(endCoords.x, startCoords.x)}; ${formatCoordinate(endCoords.y, startCoords.y)})`;
                        katex.render(formulaText, document.getElementById(vectorFormulaId), {
                            throwOnError: false
                        });
                        
                        // Координаты вектора
                        const coordsText = `${katexVectorName} = (${coords.x}; ${coords.y})`;
                        katex.render(coordsText, document.getElementById(vectorCoordsId), {
                            throwOnError: false
                        });
                    } catch (error) {
                        console.warn('KaTeX rendering error:', error);
                    }
                }, 10);
            });
            
            vectorsList.innerHTML = html;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Обновляем счетчики использования точек перед отрисовкой
            updatePointUsageCount();
            
            drawGrid();
            drawAxes();
            
            // Рисуем пунктирные линии операций
            drawOperationLines();
            
            vectors.forEach(vector => {
                drawVector(vector);
            });
            
            drawLabels();
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function distance(p1, p2) {
            return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
        }

        function pointToLineDistance(point, lineStart, lineEnd) {
            const A = point.x - lineStart.x;
            const B = point.y - lineStart.y;
            const C = lineEnd.x - lineStart.x;
            const D = lineEnd.y - lineStart.y;

            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            
            if (lenSq === 0) return distance(point, lineStart);
            
            let param = dot / lenSq;
            
            if (param < 0) {
                return distance(point, lineStart);
            } else if (param > 1) {
                return distance(point, lineEnd);
            }
            
            const projection = {
                x: lineStart.x + param * C,
                y: lineStart.y + param * D
            };
            
            return distance(point, projection);
        }

        function findClickTarget(mousePos) {
            for (let i = vectors.length - 1; i >= 0; i--) {
                const vector = vectors[i];
                
                if (distance(mousePos, vector.startPoint) <= 10) {
                    return { vector, mode: 'start' };
                }
                
                if (distance(mousePos, vector.endPoint) <= 10) {
                    return { vector, mode: 'end' };
                }
                
                if (pointToLineDistance(mousePos, vector.startPoint, vector.endPoint) <= 5) {
                    return { vector, mode: 'move' };
                }
            }
            
            return null;
        }

        canvas.addEventListener('mousedown', (e) => {
            hideContextMenu();
            
            if (e.button === 2) {
                e.preventDefault();
                const mousePos = getMousePos(e);
                const target = findClickTarget(mousePos);
                if (target) {
                    selectedVector = target.vector;
                    showContextMenu(e.clientX, e.clientY, target.vector);
                    draw();
                }
                return;
            }
            
            const mousePos = getMousePos(e);
            const target = findClickTarget(mousePos);
            const currentTime = Date.now();
            
            if (currentTime - lastClickTime < 300 && target) {
                if (!target.vector.parentVector) {
                    const dependentVector = createDependentVector(target.vector, mousePos);
                    activeVector = dependentVector;
                    dragMode = 'end';
                    selectedVector = dependentVector;
                }
                lastClickTime = 0;
                return;
            }
            
            lastClickTime = currentTime;
            
            if (target) {
                // Проверяем выбор векторов для операций (с Shift)
                toggleVectorSelection(target.vector, e.shiftKey);
                
                // Обычная логика перетаскивания (только без Shift)
                if (!e.shiftKey) {
                    activeVector = target.vector;
                    dragMode = target.mode;
                    
                    if (dragMode === 'move') {
                        dragOffset = {
                            x: mousePos.x - target.vector.startPoint.x,
                            y: mousePos.y - target.vector.startPoint.y
                        };
                    }
                }
            } else {
                isDrawing = true;
                selectedVector = null;
                const startPoint = createPoint(mousePos.x, mousePos.y);
                const endPoint = createPoint(mousePos.x, mousePos.y);
                
                const newVector = {
                    startPoint: startPoint,
                    endPoint: endPoint,
                    name: getNextVectorName()
                };
                
                vectors.push(newVector);
                vectorCounter++;
                activeVector = newVector;
            }
            
            draw();
        });

        canvas.addEventListener('mousemove', (e) => {
            const mousePos = getMousePos(e);
            
            if (isDrawing && activeVector) {
                activeVector.endPoint.x = mousePos.x;
                activeVector.endPoint.y = mousePos.y;
                draw();
            } else if (dragMode && activeVector) {
                if (activeVector.parentVector) {
                    // Обработка зависимых векторов
                    if (activeVector.hasIndependentStart) {
                        // Для отсоединенных зависимых векторов
                        if (dragMode === 'start' || dragMode === 'end') {
                            // РАЗРЕШАЕМ движение концов, но ТОЛЬКО вдоль направления исходного вектора
                            const parentDir = {
                                x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                            };
                            const parentLength = Math.sqrt(parentDir.x * parentDir.x + parentDir.y * parentDir.y);
                            
                            if (parentLength > 0) {
                                // Нормализуем направление исходного вектора
                                const normalizedDir = {
                                    x: parentDir.x / parentLength,
                                    y: parentDir.y / parentLength
                                };
                                
                                // Вычисляем вектор от текущей позиции точки до позиции мыши
                                const currentPoint = (dragMode === 'start') ? activeVector.startPoint : activeVector.endPoint;
                                const dx = mousePos.x - currentPoint.x;
                                const dy = mousePos.y - currentPoint.y;
                                
                                // Проецируем движение мыши на направление исходного вектора
                                const projectedDistance = dx * normalizedDir.x + dy * normalizedDir.y;
                                
                                // Перемещаем точку только вдоль направления исходного вектора
                                if (dragMode === 'start') {
                                    activeVector.startPoint.x += projectedDistance * normalizedDir.x;
                                    activeVector.startPoint.y += projectedDistance * normalizedDir.y;
                                } else {
                                    activeVector.endPoint.x += projectedDistance * normalizedDir.x;
                                    activeVector.endPoint.y += projectedDistance * normalizedDir.y;
                                }
                            }
                        } else if (dragMode === 'move') {
                            // Разрешаем только параллельный перенос
                            const parentDir = {
                                x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                            };
                            const parentLength = Math.sqrt(parentDir.x * parentDir.x + parentDir.y * parentDir.y);
                            
                            if (parentLength > 0) {
                                const normalizedDir = {
                                    x: parentDir.x / parentLength,
                                    y: parentDir.y / parentLength
                                };
                                
                                const dx = mousePos.x - dragOffset.x - activeVector.startPoint.x;
                                const dy = mousePos.y - dragOffset.y - activeVector.startPoint.y;
                                
                                // Проекция смещения на направление исходного вектора
                                const projectedDistance = dx * normalizedDir.x + dy * normalizedDir.y;
                                
                                // Применяем только проекцию (параллельный перенос)
                                const moveX = projectedDistance * normalizedDir.x;
                                const moveY = projectedDistance * normalizedDir.y;
                                
                                activeVector.startPoint.x += moveX;
                                activeVector.startPoint.y += moveY;
                                activeVector.endPoint.x += moveX;
                                activeVector.endPoint.y += moveY;
                            }
                        }
                    } else {
                        // Для присоединенных зависимых векторов - обычная логика по прямой
                        if (dragMode === 'end' || dragMode === 'start') {
                            // При движении точек зависимого вектора создаем независимую точку начала
                            if (!activeVector.hasIndependentStart && dragMode === 'start') {
                                const parentDir = {
                                    x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                    y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                                };
                                const parentLengthSq = parentDir.x * parentDir.x + parentDir.y * parentDir.y;
                                
                                if (parentLengthSq > 0) {
                                    const toStart = {
                                        x: activeVector.startPoint.x - activeVector.parentVector.startPoint.x,
                                        y: activeVector.startPoint.y - activeVector.parentVector.startPoint.y
                                    };
                                    activeVector.startPositionParameter = (toStart.x * parentDir.x + toStart.y * parentDir.y) / parentLengthSq;
                                }
                                
                                activeVector.startPoint = {
                                    x: activeVector.startPoint.x,
                                    y: activeVector.startPoint.y,
                                    name: activeVector.startPoint.name + "'"
                                };
                                points.push(activeVector.startPoint);
                                activeVector.hasIndependentStart = true;
                            }
                            
                            const projectedPoint = projectPointOnLine(mousePos, 
                                activeVector.parentVector.startPoint, 
                                activeVector.parentVector.endPoint);
                            
                            if (dragMode === 'start') {
                                activeVector.startPoint.x = projectedPoint.x;
                                activeVector.startPoint.y = projectedPoint.y;
                            } else {
                                activeVector.endPoint.x = projectedPoint.x;
                                activeVector.endPoint.y = projectedPoint.y;
                            }
                            
                            activeVector.storedCoefficient = calculateCoefficient(activeVector, activeVector.parentVector);
                        } else if (dragMode === 'move') {
                            // При перемещении присоединенного зависимого вектора
                            if (!activeVector.hasIndependentStart) {
                                activeVector.startPositionParameter = 0;
                                
                                activeVector.startPoint = {
                                    x: activeVector.startPoint.x,
                                    y: activeVector.startPoint.y,
                                    name: activeVector.startPoint.name + "'"
                                };
                                points.push(activeVector.startPoint);
                                activeVector.hasIndependentStart = true;
                            }
                            
                            // Обычное движение по прямой для только что отсоединенного
                            const dx = mousePos.x - dragOffset.x - activeVector.startPoint.x;
                            const dy = mousePos.y - dragOffset.y - activeVector.startPoint.y;
                            
                            const parentDir = {
                                x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                            };
                            const parentLengthSq = parentDir.x * parentDir.x + parentDir.y * parentDir.y;
                            
                            if (parentLengthSq > 0) {
                                const projectedShift = (dx * parentDir.x + dy * parentDir.y) / parentLengthSq;
                                
                                activeVector.startPositionParameter += projectedShift;
                                
                                activeVector.startPoint.x += parentDir.x * projectedShift;
                                activeVector.startPoint.y += parentDir.y * projectedShift;
                                activeVector.endPoint.x += parentDir.x * projectedShift;
                                activeVector.endPoint.y += parentDir.y * projectedShift;
                            }
                        }
                    }
                } else {
                    // Обычные независимые векторы - полная свобода движения
                    if (dragMode === 'start') {
                        activeVector.startPoint.x = mousePos.x;
                        activeVector.startPoint.y = mousePos.y;
                    } else if (dragMode === 'end') {
                        activeVector.endPoint.x = mousePos.x;
                        activeVector.endPoint.y = mousePos.y;
                    } else if (dragMode === 'move') {
                        const dx = mousePos.x - dragOffset.x - activeVector.startPoint.x;
                        const dy = mousePos.y - dragOffset.y - activeVector.startPoint.y;
                        
                        activeVector.startPoint.x += dx;
                        activeVector.startPoint.y += dy;
                        activeVector.endPoint.x += dx;
                        activeVector.endPoint.y += dy;
                    }
                    
                    updateDependentVectors(activeVector);
                }
                draw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            isDrawing = false;
            dragMode = null;
            activeVector = null;
            dragOffset = { x: 0, y: 0 };
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedVector) {
                e.preventDefault();
                deleteVector(selectedVector);
                draw();
            }
        });

        document.addEventListener('click', (e) => {
            if (contextMenu && !contextMenu.contains(e.target)) {
                hideContextMenu();
            }
        });

        showGridCheckbox.addEventListener('change', draw);
        showAxesCheckbox.addEventListener('change', draw);
        vectorNamingCheckbox.addEventListener('change', draw);
        clearCanvasBtn.addEventListener('click', clearCanvas);
        clearOperationBtn.addEventListener('click', clearOperationResults);

        // Переключатель метода построения
        methodSwitch.addEventListener('change', (e) => {
            toggleMethod();
        });

        function toggleMethod() {
            // Переключаем метод
            isTriangleMethod = !isTriangleMethod;
            
            // Обновляем кнопки операций
            updateOperationButtons();
            
            // УБИРАЕМ АВТОМАТИЧЕСКОЕ ПОВТОРНОЕ ВЫПОЛНЕНИЕ ОПЕРАЦИЙ
            // Пользователь должен сам выбрать, когда выполнять операцию другим методом
        }

        // Кнопки операций
        addVectorsBtn.addEventListener('click', () => {
            if (selectedVectors.length === 2 && !isAnimating) {
                const method = isTriangleMethod ? 'triangle' : 'parallelogram';
                performVectorAddition(selectedVectors[0], selectedVectors[1], method);
            }
        });

        subtractVectorsBtn.addEventListener('click', () => {
            if (selectedVectors.length === 2 && !isAnimating) {
                const method = isTriangleMethod ? 'triangle' : 'parallelogram';
                performVectorSubtraction(selectedVectors[0], selectedVectors[1], method);
            }
        });

        // Кнопка проверки результатов
        const verifyBtn = document.getElementById('verifyResults');
        if (verifyBtn) {
            verifyBtn.addEventListener('click', performVerification);
        }

        window.addEventListener('resize', resizeCanvas);

        // Инициализация KaTeX для панели управления
        function initializeKaTeX() {
            // Рендерим математические символы в переключателе векторного представления
            const switchLeft = document.getElementById('switchLeft');
            const switchRight = document.getElementById('switchRight');
            
            try {
                // Левая сторона - однобуквенное представление с подчеркиванием
                katex.render('\\underline{a}', switchLeft, {
                    throwOnError: false,
                    displayMode: false
                });
                
                // Правая сторона - двубуквенное представление со стрелкой
                katex.render('\\overrightarrow{AB}', switchRight, {
                    throwOnError: false,
                    displayMode: false
                });
            } catch (e) {
                // Fallback для браузеров без KaTeX
                switchLeft.innerHTML = 'a̲';
                switchRight.innerHTML = 'AB→';
            }
        }

        window.addEventListener('load', () => {
            initializeKaTeX();
            resizeCanvas();
        });
        
        // Функция для управления индивидуальными аккордионами векторов
        function toggleVectorDetails(vectorId) {
            const vectorItem = document.getElementById(`vector-${vectorId}`);
            if (vectorItem) {
                vectorItem.classList.toggle('expanded');
            }
        }
    </script>
</body>
</html>
