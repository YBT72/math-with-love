        function drawGrid() {
            if (!showCoordinateSystem) return;
            
            ctx.strokeStyle = GRID_COLOR;
            ctx.lineWidth = 1;
            
            for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawAxes() {
            if (!showCoordinateSystem) return;
            
            // Save current context settings
            const savedTextAlign = ctx.textAlign;
            const savedFillStyle = ctx.fillStyle;
            const savedFont = ctx.font;
            const savedStrokeStyle = ctx.strokeStyle;
            const savedLineWidth = ctx.lineWidth;
            
            // Find grid intersection nearest to center for origin
            const centerX = Math.round(canvas.width / 2 / GRID_SIZE) * GRID_SIZE;
            const centerY = Math.round(canvas.height / 2 / GRID_SIZE) * GRID_SIZE;
            
            ctx.strokeStyle = AXIS_COLOR;
            ctx.lineWidth = 2;
            
            // X axis (horizontal)
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.stroke();
            
            // Arrow on X axis
            const arrowSize = 8;
            ctx.beginPath();
            ctx.moveTo(canvas.width - arrowSize, centerY - arrowSize/2);
            ctx.lineTo(canvas.width, centerY);
            ctx.lineTo(canvas.width - arrowSize, centerY + arrowSize/2);
            ctx.strokeStyle = AXIS_COLOR;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Y axis (vertical)
            ctx.beginPath();
            ctx.moveTo(centerX, canvas.height);
            ctx.lineTo(centerX, 0);
            ctx.stroke();
            
            // Arrow on Y axis
            ctx.beginPath();
            ctx.moveTo(centerX - arrowSize/2, arrowSize);
            ctx.lineTo(centerX, 0);
            ctx.lineTo(centerX + arrowSize/2, arrowSize);
            ctx.stroke();
            
            // Axis labels
            ctx.fillStyle = AXIS_LABEL_COLOR;
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'left';
            ctx.direction = 'ltr'; // Force LTR for mathematical content
            ctx.fillText('x', canvas.width - 20, centerY - 10);
            ctx.fillText('y', centerX + 10, 20);
            
            // Numeric labels every 2 units (40 pixels)
            ctx.font = '12px Arial';
            ctx.fillStyle = AXIS_LABEL_COLOR;
            ctx.direction = 'ltr'; // Force LTR for numbers
            
            // Labels on X axis
            for (let i = -20; i <= 20; i += 2) {
                if (i === 0) continue; // Skip center
                const x = centerX + i * GRID_SIZE;
                if (x > 0 && x < canvas.width) {
                    // Tick mark
                    ctx.beginPath();
                    ctx.moveTo(x, centerY - 5);
                    ctx.lineTo(x, centerY + 5);
                    ctx.strokeStyle = AXIS_COLOR;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // Number
                    ctx.textAlign = 'center';
                    ctx.fillText(i.toString(), x, centerY + 20);
                }
            }
            
            // Labels on Y axis
            for (let i = -20; i <= 20; i += 2) {
                if (i === 0) continue; // Skip center
                const y = centerY - i * GRID_SIZE; // Invert Y for mathematical coordinate system
                if (y > 0 && y < canvas.height) {
                    // Tick mark
                    ctx.beginPath();
                    ctx.moveTo(centerX - 5, y);
                    ctx.lineTo(centerX + 5, y);
                    ctx.strokeStyle = AXIS_COLOR;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // Number
                    ctx.textAlign = 'right';
                    ctx.fillText(i.toString(), centerX - 10, y + 4);
                }
            }
            
            // Origin label
            ctx.textAlign = 'right';
            ctx.fillText('0', centerX - 10, centerY + 15);
            
            // Restore all context settings
            ctx.textAlign = savedTextAlign;
            ctx.fillStyle = savedFillStyle;
            ctx.font = savedFont;
            ctx.strokeStyle = savedStrokeStyle;
            ctx.lineWidth = savedLineWidth;
        }



        function drawVector(vector) {
            const isDependent = vector.parentVector !== undefined;
            const isSelected = vector === selectedVector;
            const isSelectedForOperation = selectedVectors.includes(vector);
            const isOperationVector = vector.isOperationVector;
            const isResultVector = vector.isResultVector;
            const isBlinking = vector.isBlinking;
            const isHighlighted = vector.isHighlighted;
            const isVerificationCopy = vector.isVerificationCopy;
            const isRotating = rotatingVector && rotatingVector.original === vector;
            
            let strokeStyle, fillStyle;
            
            if (isRotating) {
                // Rotating vector - special color
                strokeStyle = '#8B5CF6'; // Purple
                fillStyle = '#8B5CF6';
                ctx.lineWidth = 4;
            } else if (isHighlighted) {
                // Highlighted vectors - bright yellow
                strokeStyle = '#F59E0B';
                fillStyle = '#F59E0B';
                ctx.lineWidth = 5;
            } else if (isBlinking) {
                // Blinking vectors - red
                strokeStyle = '#DC2626';
                fillStyle = '#DC2626';
                ctx.lineWidth = 4;
            } else if (isVerificationCopy) {
                // Copies for checking - orange
                strokeStyle = '#F97316';
                fillStyle = '#F97316';
                ctx.lineWidth = 3;
            } else if (isResultVector) {
                // Result vector - purple for addition, lilac for subtraction
                if (vector.name && vector.name.includes('+')) {
                    strokeStyle = '#8B5CF6'; // Purple
                    fillStyle = '#8B5CF6';
                } else {
                    strokeStyle = '#A78BFA'; // Lilac
                    fillStyle = '#A78BFA';
                }
                ctx.lineWidth = 4;
            } else if (isOperationVector) {
                // Operation vectors (copies) - gray
                strokeStyle = '#6B7280';
                fillStyle = '#6B7280';
                ctx.lineWidth = 2;
            } else if (isSelectedForOperation) {
                // Selected for operations - first blue, second green
                const vectorIndex = selectedVectors.indexOf(vector);
                if (vectorIndex === 0) {
                    strokeStyle = '#3B82F6'; // Blue for first vector
                    fillStyle = '#3B82F6';
                } else {
                    strokeStyle = '#10B981'; // Green for second vector
                    fillStyle = '#10B981';
                }
                ctx.lineWidth = 3;
            } else if (isDependent) {
                strokeStyle = DEPENDENT_VECTOR_COLOR;
                fillStyle = DEPENDENT_VECTOR_COLOR;
                ctx.lineWidth = 4;
            } else {
                strokeStyle = VECTOR_COLOR;
                fillStyle = VECTOR_COLOR;
                ctx.lineWidth = 2;
            }
            
            ctx.strokeStyle = strokeStyle;
            ctx.fillStyle = fillStyle;
            
            // Highlighting for selected vector or special states
            if (isSelected) {
                ctx.shadowColor = '#3B82F6';
                ctx.shadowBlur = 10;
            } else if (isSelectedForOperation || isResultVector || isHighlighted || isBlinking) {
                ctx.shadowColor = strokeStyle;
                ctx.shadowBlur = isHighlighted ? 15 : 8;
            }

            ctx.beginPath();
            ctx.moveTo(vector.startPoint.x, vector.startPoint.y);
            ctx.lineTo(vector.endPoint.x, vector.endPoint.y);
            ctx.stroke();

            const angle = Math.atan2(vector.endPoint.y - vector.startPoint.y, vector.endPoint.x - vector.startPoint.x);
            const arrowLength = 15;
            const arrowAngle = Math.PI / 6;

            ctx.beginPath();
            ctx.moveTo(vector.endPoint.x, vector.endPoint.y);
            ctx.lineTo(
                vector.endPoint.x - arrowLength * Math.cos(angle - arrowAngle),
                vector.endPoint.y - arrowLength * Math.sin(angle - arrowAngle)
            );
            ctx.lineTo(
                vector.endPoint.x - arrowLength * Math.cos(angle + arrowAngle),
                vector.endPoint.y - arrowLength * Math.sin(angle + arrowAngle)
            );
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.arc(vector.startPoint.x, vector.startPoint.y, 5, 0, 2 * Math.PI);
            ctx.fill();
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
        }

        function drawVectorArrow(text, x, y, arrowOnlyOverLetters = false) {
            ctx.font = 'bold 16px "STIX Two Math", "Times New Roman", serif';
            
            let arrowWidth;
            let arrowX = x;
            
            if (arrowOnlyOverLetters) {
                // Find letters (last symbols without digits and signs)
                const match = text.match(/([A-Z']+)(?=\(|$)/); // Letters before bracket with coordinates or to end
                if (match) {
                    const lettersOnly = match[1];
                    arrowWidth = ctx.measureText(lettersOnly).width;
                    // Shift arrow start to letter position
                    const coefficientPart = text.replace(/[A-Z']+(?=\(|$).*/, '').replace(/[A-Z']+$/, '');
                    const coefficientWidth = ctx.measureText(coefficientPart).width;
                    arrowX = x + coefficientWidth;
                } else {
                    // If no letters found, draw over all text before brackets
                    const textBeforeCoords = text.split('(')[0];
                    arrowWidth = ctx.measureText(textBeforeCoords).width;
                }
            } else {
                // Arrow over all text before coordinates
                const textBeforeCoords = text.split('(')[0];
                arrowWidth = ctx.measureText(textBeforeCoords).width;
            }
            
            const arrowY = y - 20;
            const arrowStartX = arrowX;
            const arrowEndX = arrowX + arrowWidth;
            
            ctx.strokeStyle = LABEL_COLOR;
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.moveTo(arrowStartX, arrowY);
            ctx.lineTo(arrowEndX, arrowY);
            ctx.stroke();
            
            const arrowHeadSize = 4;
            ctx.beginPath();
            ctx.moveTo(arrowEndX, arrowY);
            ctx.lineTo(arrowEndX - arrowHeadSize, arrowY - arrowHeadSize/2);
            ctx.lineTo(arrowEndX - arrowHeadSize, arrowY + arrowHeadSize/2);
            ctx.closePath();
            ctx.fillStyle = LABEL_COLOR;
            ctx.fill();
        }

        function drawVectorUnderline(text, x, y, underlineOnlyLetter = false) {
            ctx.font = 'bold 16px "STIX Two Math", "Times New Roman", serif';
            
            let underlineWidth;
            let underlineX = x;
            
            if (underlineOnlyLetter) {
                // Underline only letters at end (before coordinates)
                const match = text.match(/([a-zA-Z]+)(?=\(|$)/);
                if (match) {
                    const lettersOnly = match[1];
                    underlineWidth = ctx.measureText(lettersOnly).width;
                    // Shift underline start to letter position
                    const coefficientPart = text.replace(/[a-zA-Z]+(?=\(|$).*/, '').replace(/[a-zA-Z]+$/, '');
                    const coefficientWidth = ctx.measureText(coefficientPart).width;
                    underlineX = x + coefficientWidth;
                } else {
                    // If no letters found, underline all text before brackets
                    const textBeforeCoords = text.split('(')[0];
                    underlineWidth = ctx.measureText(textBeforeCoords).width;
                }
            } else {
                // Underline all text before coordinates
                const textBeforeCoords = text.split('(')[0];
                underlineWidth = ctx.measureText(textBeforeCoords).width;
            }
            
            const underlineY = y + 3;
            
            ctx.strokeStyle = LABEL_COLOR;
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.moveTo(underlineX, underlineY);
            ctx.lineTo(underlineX + underlineWidth, underlineY);
            ctx.stroke();
        }

        function drawOperationVectorUnderline(text, x, y) {
            // Underline individual letters in operations like on buttons (a+b → a̲+b̲)
            ctx.font = 'bold 16px "STIX Two Math", "Times New Roman", serif';
            ctx.strokeStyle = LABEL_COLOR;
            ctx.lineWidth = 1.5;
            
            const textBeforeCoords = text.split('(')[0]; // Remove coordinates if present
            let currentX = x;
            const underlineY = y + 3;
            
            for (let i = 0; i < textBeforeCoords.length; i++) {
                const char = textBeforeCoords[i];
                const charWidth = ctx.measureText(char).width;
                
                // Underline only letters (a, b, c etc.)
                if (/[a-zA-Z]/.test(char)) {
                    ctx.beginPath();
                    ctx.moveTo(currentX, underlineY);
                    ctx.lineTo(currentX + charWidth, underlineY);
                    ctx.stroke();
                }
                
                currentX += charWidth;
            }
        }

        function drawLabels() {
            ctx.fillStyle = LABEL_COLOR;
            ctx.font = 'bold 16px "STIX Two Math", "Times New Roman", serif';
            ctx.textAlign = 'left';
            ctx.direction = 'ltr'; // Force LTR for mathematical content

            // Draw point labels with smart offset
            const drawnPointLabels = new Set(); // To avoid duplicating labels of same point
            
            points.forEach(point => {
                // Skip points without names (temporary points)
                if (!point.name || drawnPointLabels.has(point)) return;
                
                let labelText = point.name;
                
                // Add coordinates if coordinate system is shown
                if (showCoordinateSystem) {
                    // Find coordinate system center
                    const centerX = Math.round(canvas.width / 2 / GRID_SIZE) * GRID_SIZE;
                    const centerY = Math.round(canvas.height / 2 / GRID_SIZE) * GRID_SIZE;
                    
                    // Calculate point coordinates relative to coordinate system center
                    const coordX = Math.round((point.x - centerX) / GRID_SIZE * 10) / 10; // Round to 1 decimal place
                    const coordY = Math.round((centerY - point.y) / GRID_SIZE * 10) / 10; // Invert Y for mathematical system
                    
                    labelText = `${point.name}(${coordX}; ${coordY})`;
                }
                
                // Get smart offset for this point
                let offset;
                
                // For triangle method: fix position of result vector start and end point labels
                const resultVector = operationVectors.find(v => v.isResultVector);
                if (resultVector && isTriangleMethod && 
                    (point === resultVector.endPoint || point === resultVector.startPoint)) {
                    // Use standard offset without considering usageCount
                    offset = { x: 8, y: -8 };
                } else {
                    offset = getLabelOffset(point, 0); // Normal offset considering usageCount
                }
                
                // Ensure LTR rendering for mathematical labels
                ctx.save();
                ctx.direction = 'ltr';
                ctx.fillText(labelText, point.x + offset.x, point.y + offset.y);
                ctx.restore();
                
                drawnPointLabels.add(point);
            });

            vectors.forEach(vector => {
                const midX = (vector.startPoint.x + vector.endPoint.x) / 2;
                const midY = (vector.startPoint.y + vector.endPoint.y) / 2;
                
                const angle = Math.atan2(vector.endPoint.y - vector.startPoint.y, vector.endPoint.x - vector.startPoint.x);
                const offsetDistance = 20;
                const offsetX = -Math.sin(angle) * offsetDistance;
                const offsetY = Math.cos(angle) * offsetDistance;
                
                let labelX = midX + offsetX;
                let labelY = midY + offsetY;
                
                // Check if offset needed due to proximity to multi-vector point
                for (let point of points) {
                    if (point.name && pointUsageCount.has(point) && pointUsageCount.get(point) > 1) {
                        const distanceToPoint = Math.sqrt((labelX - point.x) ** 2 + (labelY - point.y) ** 2);
                        if (distanceToPoint < 40) { // If vector label too close to multi-used point
                            // Move vector label further
                            const avoidanceOffsetX = -Math.sin(angle) * (offsetDistance + 15);
                            const avoidanceOffsetY = Math.cos(angle) * (offsetDistance + 15);
                            labelX = midX + avoidanceOffsetX;
                            labelY = midY + avoidanceOffsetY;
                        }
                    }
                }
                
                let displayText;
                
                if (vector.parentVector) {
                    const coefficient = calculateCoefficient(vector, vector.parentVector);
                    const roundedCoeff = Math.round(coefficient * 10) / 10;
                    
                    if (vectorNamingCheckbox.checked) {
                        // Two-letter format: coefficient + dependent vector points + arrow
                        const vectorPoints = vector.startPoint.name + vector.endPoint.name;
                        if (roundedCoeff === 1) {
                            displayText = vectorPoints;
                        } else if (roundedCoeff === -1) {
                            displayText = '-' + vectorPoints;
                        } else {
                            displayText = roundedCoeff + vectorPoints;
                        }
                        
                        // Add coordinates if coordinate system is shown
                        if (showCoordinateSystem) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        // Ensure LTR rendering for mathematical labels
                        ctx.save();
                        ctx.direction = 'ltr';
                        ctx.fillText(displayText, labelX, labelY);
                        ctx.restore();
                        drawVectorArrow(displayText, labelX, labelY, true); // Arrow only over letters
                    } else {
                        // Single-letter format with coefficient and underline
                        if (roundedCoeff === 1) {
                            displayText = vector.parentVector.name;
                        } else if (roundedCoeff === -1) {
                            displayText = '-' + vector.parentVector.name;
                        } else {
                            displayText = roundedCoeff + vector.parentVector.name;
                        }
                        
                        // Add coordinates if coordinate system is shown
                        if (showCoordinateSystem) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        // Ensure LTR rendering for mathematical labels
                        ctx.save();
                        ctx.direction = 'ltr';
                        ctx.fillText(displayText, labelX, labelY);
                        ctx.restore();
                        // Underline only letter, NOT coefficient
                        drawVectorUnderline(displayText, labelX, labelY, true);
                    }
                } else {
                    if (vectorNamingCheckbox.checked) {
                        // Two-letter format with arrow
                        displayText = vector.startPoint.name + vector.endPoint.name;
                        
                        // Add coordinates if coordinate system is shown
                        if (showCoordinateSystem) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        // Ensure LTR rendering for mathematical labels
                        ctx.save();
                        ctx.direction = 'ltr';
                        ctx.fillText(displayText, labelX, labelY);
                        ctx.restore();
                        drawVectorArrow(displayText, labelX, labelY);
                    } else {
                        // Single-letter format with underline
                        displayText = vector.name;
                        
                        // Add coordinates if coordinate system is shown
                        if (showCoordinateSystem) {
                            const coords = getVectorCoordinates(vector);
                            displayText += `(${coords.x}; ${coords.y})`;
                        }
                        
                        // Ensure LTR rendering for mathematical labels
                        ctx.save();
                        ctx.direction = 'ltr';
                        ctx.fillText(displayText, labelX, labelY);
                        ctx.restore();
                        
                        // For operation result vectors underline individual letters like on buttons
                        if (vector.name && (vector.name.includes('+') || vector.name.includes('-'))) {
                            drawOperationVectorUnderline(displayText, labelX, labelY);
                        } else {
                            drawVectorUnderline(displayText, labelX, labelY);
                        }
                    }
                }
            });
            
            // Update vectors list on panel
            updateVectorsList();
        }

        function getVectorCoordinates(vector) {
            // Find coordinate system center
            const centerX = Math.round(canvas.width / 2 / GRID_SIZE) * GRID_SIZE;
            const centerY = Math.round(canvas.height / 2 / GRID_SIZE) * GRID_SIZE;
            
            // Calculate vector coordinates
            const dx = vector.endPoint.x - vector.startPoint.x;
            const dy = vector.endPoint.y - vector.startPoint.y;
            
            // Convert to coordinate system units
            const coordX = Math.round(dx / GRID_SIZE * 10) / 10;
            const coordY = Math.round(-dy / GRID_SIZE * 10) / 10; // Invert Y
            
            return { x: coordX, y: coordY };
        }

        function getPointCoordinates(point) {
            // Find coordinate system center
            const centerX = Math.round(canvas.width / 2 / GRID_SIZE) * GRID_SIZE;
            const centerY = Math.round(canvas.height / 2 / GRID_SIZE) * GRID_SIZE;
            
            // Calculate point coordinates relative to center
            const coordX = Math.round((point.x - centerX) / GRID_SIZE * 10) / 10;
            const coordY = Math.round((centerY - point.y) / GRID_SIZE * 10) / 10;
            
            return { x: coordX, y: coordY };
        }

        function updateVectorsList() {
            const vectorsList = document.getElementById('vectorsList');
            
            if (vectors.length === 0) {
                vectorsList.innerHTML = '<div class="no-vectors">אין וקטורים מוגדרים</div>';
                return;
            }
            
            let html = '';
            vectors.forEach((vector, index) => {
                const coords = getVectorCoordinates(vector);
                const startCoords = getPointCoordinates(vector.startPoint);
                const endCoords = getPointCoordinates(vector.endPoint);
                
                let vectorName = '';
                let katexVectorName = '';
                
                // Determine vector name without coefficients
                if (vectorNamingCheckbox.checked) {
                    vectorName = vector.startPoint.name + vector.endPoint.name;
                    katexVectorName = `\\overrightarrow{${vectorName}}`;
                } else {
                    vectorName = vector.name;
                    // Check if this is operation vector with operators
                    if (vector.isOperationVector && (vectorName.includes('+') || vectorName.includes('-'))) {
                        // Parse name and underline only vector letters
                        const parts = vectorName.split(/([+\-])/);
                        let formattedName = '';
                        for (let i = 0; i < parts.length; i++) {
                            const part = parts[i];
                            if (part === '+' || part === '-') {
                                formattedName += part; // Operators without underline
                            } else if (part.trim()) {
                                formattedName += `\\underline{${part.trim()}}`; // Underline only letters
                            }
                        }
                        katexVectorName = formattedName;
                    } else {
                        katexVectorName = `\\underline{${vectorName}}`;
                    }
                }
                
                // Special names for dependent vectors
                if (vector.parentVector) {
                    const coefficient = calculateCoefficient(vector, vector.parentVector);
                    const roundedCoeff = Math.round(coefficient * 10) / 10;
                    
                    let coefficientPart = '';
                    if (roundedCoeff === 1) {
                        coefficientPart = '';
                    } else if (roundedCoeff === -1) {
                        coefficientPart = '-';
                    } else {
                        coefficientPart = roundedCoeff.toString();
                    }
                    
                    if (vectorNamingCheckbox.checked) {
                        const vectorPoints = vector.startPoint.name + vector.endPoint.name;
                        katexVectorName = `${coefficientPart}\\overrightarrow{${vectorPoints}}`;
                        vectorName = coefficientPart + vectorPoints;
                    } else {
                        const parentName = vector.parentVector.name;
                        // Check if parent vector name contains operators
                        if (parentName.includes('+') || parentName.includes('-')) {
                            const parts = parentName.split(/([+\-])/);
                            let formattedName = '';
                            for (let i = 0; i < parts.length; i++) {
                                const part = parts[i];
                                if (part === '+' || part === '-') {
                                    formattedName += part;
                                } else if (part.trim()) {
                                    formattedName += `\\underline{${part.trim()}}`;
                                }
                            }
                            katexVectorName = `${coefficientPart}${formattedName}`;
                        } else {
                            katexVectorName = `${coefficientPart}\\underline{${parentName}}`;
                        }
                        vectorName = coefficientPart + parentName;
                    }
                }
                
                // Function for proper coordinate formatting in formula
                const formatCoordinate = (endCoord, startCoord) => {
                    if (startCoord >= 0) {
                        return `${endCoord} - ${startCoord}`;
                    } else {
                        return `${endCoord} + ${Math.abs(startCoord)}`;
                    }
                };
                
                // Create unique IDs for each KaTeX element
                const vectorTitleId = `vector-title-${index}`;
                const vectorFormulaId = `vector-formula-${index}`;
                const vectorCoordsId = `vector-coords-${index}`;
                
                html += `
                    <div class="vector-item" id="vector-${index}">
                        <div class="vector-header" onclick="toggleVectorDetails(${index})">
                            <span dir="rtl">וקטור <span id="${vectorTitleId}" class="math-formula" dir="ltr"></span></span>
                            <span class="vector-arrow">▼</span>
                        </div>
                        <div class="vector-content">
                            <div class="vector-coordinates">
                                <div class="vector-formula">
                                    <span id="${vectorFormulaId}" class="math-formula" dir="ltr"></span>
                                </div>
                                <div><span id="${vectorCoordsId}" class="math-formula" dir="ltr"></span></div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Render KaTeX after adding HTML
                setTimeout(() => {
                    try {
                        console.log('Rendering vector:', vectorName, 'with KaTeX:', katexVectorName); // Debug
                        
                        // Vector name
                        const titleElement = document.getElementById(vectorTitleId);
                        if (titleElement) {
                            katex.render(katexVectorName, titleElement, {
                                throwOnError: false
                            });
                        } else {
                            console.error('Title element not found:', vectorTitleId);
                        }
                        
                        // Vector formula
                        const formulaText = `${katexVectorName} = (${formatCoordinate(endCoords.x, startCoords.x)}; ${formatCoordinate(endCoords.y, startCoords.y)})`;
                        katex.render(formulaText, document.getElementById(vectorFormulaId), {
                            throwOnError: false
                        });
                        
                        // Vector coordinates
                        const coordsText = `${katexVectorName} = (${coords.x}; ${coords.y})`;
                        katex.render(coordsText, document.getElementById(vectorCoordsId), {
                            throwOnError: false
                        });
                    } catch (error) {
                        console.warn('KaTeX rendering error:', error);
                    }
                }, 10);
            });
            
            vectorsList.innerHTML = html;
            
            // Force style update after rendering
            setTimeout(() => {
                vectorsList.style.display = 'none';
                vectorsList.offsetHeight; // Force reflow
                vectorsList.style.display = '';
            }, 100);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update point usage counters before drawing
            updatePointUsageCount();
            
            drawGrid();
            drawAxes();
            
            // Draw dashed operation lines
            drawOperationLines();
            
            vectors.forEach(vector => {
                drawVector(vector);
            });
            
            drawLabels();
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function distance(p1, p2) {
            return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
        }

        function pointToLineDistance(point, lineStart, lineEnd) {
            const A = point.x - lineStart.x;
            const B = point.y - lineStart.y;
            const C = lineEnd.x - lineStart.x;
            const D = lineEnd.y - lineStart.y;

            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            
            if (lenSq === 0) return distance(point, lineStart);
            
            let param = dot / lenSq;
            
            if (param < 0) {
                return distance(point, lineStart);
            } else if (param > 1) {
                return distance(point, lineEnd);
            }
            
            const projection = {
                x: lineStart.x + param * C,
                y: lineStart.y + param * D
            };
            
            return distance(point, projection);
        }

        function findClickTarget(mousePos) {
            for (let i = vectors.length - 1; i >= 0; i--) {
                const vector = vectors[i];
                
                if (distance(mousePos, vector.startPoint) <= 10) {
                    return { vector, mode: 'start' };
                }
                
                if (distance(mousePos, vector.endPoint) <= 10) {
                    return { vector, mode: 'end' };
                }
                
                if (pointToLineDistance(mousePos, vector.startPoint, vector.endPoint) <= 5) {
                    return { vector, mode: 'move' };
                }
            }
            
            return null;
        }

        canvas.addEventListener('mousedown', (e) => {
            hideContextMenu();
            
            if (e.button === 2) {
                e.preventDefault();
                const mousePos = getMousePos(e);
                const target = findClickTarget(mousePos);
                if (target) {
                    selectedVector = target.vector;
                    showContextMenu(e.clientX, e.clientY, target.vector);
                    draw();
                }
                return;
            }
            
            const mousePos = getMousePos(e);
            const target = findClickTarget(mousePos);
            const currentTime = Date.now();
            
            if (currentTime - lastClickTime < 300 && target) {
                if (!target.vector.parentVector) {
                    const dependentVector = createDependentVector(target.vector, mousePos);
                    activeVector = dependentVector;
                    dragMode = 'end';
                    selectedVector = dependentVector;
                }
                lastClickTime = 0;
                return;
            }
            
            lastClickTime = currentTime;
            
            if (target) {
                // Check vector selection for operations (with Shift)
                toggleVectorSelection(target.vector, e.shiftKey);
                
                // Normal drag logic (only without Shift)
                if (!e.shiftKey) {
                    activeVector = target.vector;
                    dragMode = target.mode;
                    
                    if (dragMode === 'move') {
                        dragOffset = {
                            x: mousePos.x - target.vector.startPoint.x,
                            y: mousePos.y - target.vector.startPoint.y
                        };
                    }
                }
            } else {
                isDrawing = true;
                selectedVector = null;
                const startPoint = createPoint(mousePos.x, mousePos.y);
                const endPoint = createPoint(mousePos.x, mousePos.y);
                
                const newVector = {
                    startPoint: startPoint,
                    endPoint: endPoint,
                    name: getNextVectorName()
                };
                
                vectors.push(newVector);
                vectorCounter++;
                activeVector = newVector;
            }
            
            draw();
        });

        canvas.addEventListener('mousemove', (e) => {
            const mousePos = getMousePos(e);
            
            if (isDrawing && activeVector) {
                activeVector.endPoint.x = mousePos.x;
                activeVector.endPoint.y = mousePos.y;
                draw();
            } else if (dragMode && activeVector) {
                if (activeVector.parentVector) {
                    // Handle dependent vectors
                    if (activeVector.hasIndependentStart) {
                        // For detached dependent vectors
                        if (dragMode === 'start' || dragMode === 'end') {
                            // ALLOW end movement, but ONLY along source vector direction
                            const parentDir = {
                                x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                            };
                            const parentLength = Math.sqrt(parentDir.x * parentDir.x + parentDir.y * parentDir.y);
                            
                            if (parentLength > 0) {
                                // Normalize source vector direction
                                const normalizedDir = {
                                    x: parentDir.x / parentLength,
                                    y: parentDir.y / parentLength
                                };
                                
                                // Calculate vector from current point position to mouse position
                                const currentPoint = (dragMode === 'start') ? activeVector.startPoint : activeVector.endPoint;
                                const dx = mousePos.x - currentPoint.x;
                                const dy = mousePos.y - currentPoint.y;
                                
                                // Project mouse movement onto source vector direction
                                const projectedDistance = dx * normalizedDir.x + dy * normalizedDir.y;
                                
                                // Move point only along source vector direction
                                if (dragMode === 'start') {
                                    activeVector.startPoint.x += projectedDistance * normalizedDir.x;
                                    activeVector.startPoint.y += projectedDistance * normalizedDir.y;
                                } else {
                                    activeVector.endPoint.x += projectedDistance * normalizedDir.x;
                                    activeVector.endPoint.y += projectedDistance * normalizedDir.y;
                                }
                            }
                        } else if (dragMode === 'move') {
                            // Allow only parallel translation
                            const parentDir = {
                                x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                            };
                            const parentLength = Math.sqrt(parentDir.x * parentDir.x + parentDir.y * parentDir.y);
                            
                            if (parentLength > 0) {
                                const normalizedDir = {
                                    x: parentDir.x / parentLength,
                                    y: parentDir.y / parentLength
                                };
                                
                                const dx = mousePos.x - dragOffset.x - activeVector.startPoint.x;
                                const dy = mousePos.y - dragOffset.y - activeVector.startPoint.y;
                                
                                // Project displacement onto source vector direction
                                const projectedDistance = dx * normalizedDir.x + dy * normalizedDir.y;
                                
                                // Apply only projection (parallel translation)
                                const moveX = projectedDistance * normalizedDir.x;
                                const moveY = projectedDistance * normalizedDir.y;
                                
                                activeVector.startPoint.x += moveX;
                                activeVector.startPoint.y += moveY;
                                activeVector.endPoint.x += moveX;
                                activeVector.endPoint.y += moveY;
                            }
                        }
                    } else {
                        // For attached dependent vectors - normal line logic
                        if (dragMode === 'end' || dragMode === 'start') {
                            // When moving dependent vector points create independent start point
                            if (!activeVector.hasIndependentStart && dragMode === 'start') {
                                const parentDir = {
                                    x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                    y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                                };
                                const parentLengthSq = parentDir.x * parentDir.x + parentDir.y * parentDir.y;
                                
                                if (parentLengthSq > 0) {
                                    const toStart = {
                                        x: activeVector.startPoint.x - activeVector.parentVector.startPoint.x,
                                        y: activeVector.startPoint.y - activeVector.parentVector.startPoint.y
                                    };
                                    activeVector.startPositionParameter = (toStart.x * parentDir.x + toStart.y * parentDir.y) / parentLengthSq;
                                }
                                
                                activeVector.startPoint = {
                                    x: activeVector.startPoint.x,
                                    y: activeVector.startPoint.y,
                                    name: activeVector.startPoint.name + "'"
                                };
                                points.push(activeVector.startPoint);
                                activeVector.hasIndependentStart = true;
                            }
                            
                            const projectedPoint = projectPointOnLine(mousePos, 
                                activeVector.parentVector.startPoint, 
                                activeVector.parentVector.endPoint);
                            
                            if (dragMode === 'start') {
                                activeVector.startPoint.x = projectedPoint.x;
                                activeVector.startPoint.y = projectedPoint.y;
                            } else {
                                activeVector.endPoint.x = projectedPoint.x;
                                activeVector.endPoint.y = projectedPoint.y;
                            }
                            
                            activeVector.storedCoefficient = calculateCoefficient(activeVector, activeVector.parentVector);
                        } else if (dragMode === 'move') {
                            // When moving attached dependent vector
                            if (!activeVector.hasIndependentStart) {
                                activeVector.startPositionParameter = 0;
                                
                                activeVector.startPoint = {
                                    x: activeVector.startPoint.x,
                                    y: activeVector.startPoint.y,
                                    name: activeVector.startPoint.name + "'"
                                };
                                points.push(activeVector.startPoint);
                                activeVector.hasIndependentStart = true;
                            }
                            
                            // Normal line movement for just detached
                            const dx = mousePos.x - dragOffset.x - activeVector.startPoint.x;
                            const dy = mousePos.y - dragOffset.y - activeVector.startPoint.y;
                            
                            const parentDir = {
                                x: activeVector.parentVector.endPoint.x - activeVector.parentVector.startPoint.x,
                                y: activeVector.parentVector.endPoint.y - activeVector.parentVector.startPoint.y
                            };
                            const parentLengthSq = parentDir.x * parentDir.x + parentDir.y * parentDir.y;
                            
                            if (parentLengthSq > 0) {
                                const projectedShift = (dx * parentDir.x + dy * parentDir.y) / parentLengthSq;
                                
                                activeVector.startPositionParameter += projectedShift;
                                
                                activeVector.startPoint.x += parentDir.x * projectedShift;
                                activeVector.startPoint.y += parentDir.y * projectedShift;
                                activeVector.endPoint.x += parentDir.x * projectedShift;
                                activeVector.endPoint.y += parentDir.y * projectedShift;
                            }
                        }
                    }
                } else {
                    // Normal independent vectors - full movement freedom
                    if (dragMode === 'start') {
                        activeVector.startPoint.x = mousePos.x;
                        activeVector.startPoint.y = mousePos.y;
                    } else if (dragMode === 'end') {
                        activeVector.endPoint.x = mousePos.x;
                        activeVector.endPoint.y = mousePos.y;
                    } else if (dragMode === 'move') {
                        const dx = mousePos.x - dragOffset.x - activeVector.startPoint.x;
                        const dy = mousePos.y - dragOffset.y - activeVector.startPoint.y;
                        
                        activeVector.startPoint.x += dx;
                        activeVector.startPoint.y += dy;
                        activeVector.endPoint.x += dx;
                        activeVector.endPoint.y += dy;
                    }
                    
                    updateDependentVectors(activeVector);
                }
                draw();
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            isDrawing = false;
            dragMode = null;
            activeVector = null;
            dragOffset = { x: 0, y: 0 };
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Delete' || e.key === 'Backspace') && selectedVector) {
                e.preventDefault();
                deleteVector(selectedVector);
                draw();
            }
        });

        document.addEventListener('click', (e) => {
            if (contextMenu && !contextMenu.contains(e.target)) {
                hideContextMenu();
            }
        });

        coordinateSystemBtn.addEventListener('click', () => {
            showCoordinateSystem = !showCoordinateSystem;
            coordinateSystemBtn.classList.toggle('active', showCoordinateSystem);
            draw();
        });
        vectorNamingCheckbox.addEventListener('change', draw);
        clearCanvasBtn.addEventListener('click', clearCanvas);
        clearOperationBtn.addEventListener('click', clearOperationResults);

        // Construction method toggle
        methodSwitch.addEventListener('change', (e) => {
            toggleMethod();
        });

        function toggleMethod() {
            // Toggle method
            isTriangleMethod = !isTriangleMethod;
            
            // Update operation buttons
            updateOperationButtons();
            
            // УБИРАЕМ АВТОМАТИЧЕСКОЕ ПОВТОРНОЕ ВЫПОЛНЕНИЕ ОПЕРАЦИЙ
            // User should choose when to perform operation with other method
        }

        // Operation buttons
        addVectorsBtn.addEventListener('click', () => {
            if (selectedVectors.length === 2 && !isAnimating) {
                const method = isTriangleMethod ? 'triangle' : 'parallelogram';
                performVectorAddition(selectedVectors[0], selectedVectors[1], method);
            }
        });

        subtractVectorsBtn.addEventListener('click', () => {
            if (selectedVectors.length === 2 && !isAnimating) {
                const method = isTriangleMethod ? 'triangle' : 'parallelogram';
                performVectorSubtraction(selectedVectors[0], selectedVectors[1], method);
            }
        });

        // Results check button
        const verifyBtn = document.getElementById('verifyResults');
        if (verifyBtn) {
            verifyBtn.addEventListener('click', performVerification);
        }

        window.addEventListener('resize', resizeCanvas);

        // KaTeX initialization for control panel
        function initializeKaTeX() {
            // Render mathematical symbols in vector representation toggle
            const switchLeft = document.getElementById('switchLeft');
            const switchRight = document.getElementById('switchRight');
            
            try {
                // Left side - single-letter representation with underline
                katex.render('\\underline{a}', switchLeft, {
                    throwOnError: false,
                    displayMode: false
                });
                
                // Right side - two-letter representation with arrow
                katex.render('\\overrightarrow{AB}', switchRight, {
                    throwOnError: false,
                    displayMode: false
                });
            } catch (e) {
                // Fallback for browsers without KaTeX
                switchLeft.innerHTML = 'a̲';
                switchRight.innerHTML = 'AB→';
            }
        }

        window.addEventListener('load', () => {
            // Wait a bit for correct size initialization
            setTimeout(() => {
                initializeKaTeX();
                resizeCanvas();
                draw();
            }, 100);
        });
        
        // Function for managing individual vector accordions
        function toggleVectorDetails(vectorId) {
            const vectorItem = document.getElementById(`vector-${vectorId}`);
            if (vectorItem) {
                vectorItem.classList.toggle('expanded');
            }
        }
    </script>
</body>
</html>
