<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallelepiped Cross Section</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 5px;
            font-size: 14px;
            max-width: 300px;
        }
        #status {
            color: #4CAF50;
            font-weight: bold;
        }
        button {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #1976D2;
        }
    </style>
</head>
<body>
    <div id="info">
        <div id="status">Ready. Click on parallelepiped to select points.</div>
        <div style="margin-top: 10px; font-size: 12px;">
            Points selected: <span id="pointCount">0</span>/3
        </div>
        <button onclick="resetSelection()">Reset</button>
        <button onclick="testWithRandomPoints()">Test with Random Points</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // Simple fan triangulation (no external library needed)
        function triangulatePolygon(numVertices) {
            const indices = [];
            // Fan triangulation from vertex 0
            for (let i = 1; i < numVertices - 1; i++) {
                indices.push(0, i, i + 1);
            }
            return indices;
        }
    </script>
    
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 4);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.4);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);
        
        // Create parallelepiped vertices (unit cube for simplicity)
        const vertices = [
            new THREE.Vector3(-1, -1, -1), // 0
            new THREE.Vector3( 1, -1, -1), // 1
            new THREE.Vector3( 1, -1,  1), // 2
            new THREE.Vector3(-1, -1,  1), // 3
            new THREE.Vector3(-1,  1, -1), // 4
            new THREE.Vector3( 1,  1, -1), // 5
            new THREE.Vector3( 1,  1,  1), // 6
            new THREE.Vector3(-1,  1,  1)  // 7
        ];
        
        // Define 12 edges
        const edges = [
            [0,1], [1,2], [2,3], [3,0], // bottom face
            [4,5], [5,6], [6,7], [7,4], // top face
            [0,4], [1,5], [2,6], [3,7]  // vertical edges
        ];
        
        // Create parallelepiped wireframe
        const edgeGeometry = new THREE.BufferGeometry();
        const edgePositions = [];
        edges.forEach(([i, j]) => {
            edgePositions.push(vertices[i].x, vertices[i].y, vertices[i].z);
            edgePositions.push(vertices[j].x, vertices[j].y, vertices[j].z);
        });
        edgeGeometry.setAttribute('position', new THREE.Float32BufferAttribute(edgePositions, 3));
        const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const wireframe = new THREE.LineSegments(edgeGeometry, edgeMaterial);
        scene.add(wireframe);
        
        // Create semi-transparent faces for clicking
        const faceGeometry = new THREE.BoxGeometry(2, 2, 2);
        const faceMaterial = new THREE.MeshBasicMaterial({
            color: 0xcccccc,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide
        });
        const facesMesh = new THREE.Mesh(faceGeometry, faceMaterial);
        scene.add(facesMesh);
        
        // Selection state
        let selectedPoints = [];
        let selectedSpheres = [];
        let crossSectionMesh = null;
        
        // Raycaster for mouse picking
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // Mouse click handler
        function onMouseClick(event) {
            if (selectedPoints.length >= 3) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(facesMesh);
            
            console.log('Click detected, intersects:', intersects.length);
            
            if (intersects.length > 0) {
                const point = intersects[0].point.clone();
                
                // Clamp point to be exactly on parallelepiped surface
                point.x = Math.max(-1, Math.min(1, point.x));
                point.y = Math.max(-1, Math.min(1, point.y));
                point.z = Math.max(-1, Math.min(1, point.z));
                
                console.log('Point selected:', point);
                selectedPoints.push(point);
                
                // Create visual marker for selected point
                const sphereGeometry = new THREE.SphereGeometry(0.08, 16, 16);
                const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xff6600 });
                const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
                sphere.position.copy(point);
                scene.add(sphere);
                selectedSpheres.push(sphere);
                
                document.getElementById('pointCount').textContent = selectedPoints.length;
                
                if (selectedPoints.length === 3) {
                    console.log('Building cross section with points:', selectedPoints);
                    buildCrossSection();
                } else {
                    document.getElementById('status').textContent = 
                        `Point ${selectedPoints.length} selected. Select ${3 - selectedPoints.length} more.`;
                }
            } else {
                console.log('No intersection detected');
            }
        }
        
        // Main algorithm: Build cross section polygon
        function buildCrossSection() {
            const t0 = performance.now();
            
            const P1 = selectedPoints[0];
            const P2 = selectedPoints[1];
            const P3 = selectedPoints[2];
            
            // STEP 1: Check collinearity
            const v1 = new THREE.Vector3().subVectors(P2, P1);
            const v2 = new THREE.Vector3().subVectors(P3, P1);
            const normal = new THREE.Vector3().crossVectors(v1, v2);
            
            if (normal.length() < 0.0001) {
                document.getElementById('status').textContent = 'Error: Points are collinear!';
                document.getElementById('status').style.color = '#f44336';
                return;
            }
            
            normal.normalize();
            
            // STEP 2: Create plane
            const plane = new THREE.Plane().setFromNormalAndCoplanarPoint(normal, P1);
            
            // STEP 3: Find intersections with edges
            const intersectionPoints = [];
            
            for (let i = 0; i < edges.length; i++) {
                const [idx1, idx2] = edges[i];
                const v1 = vertices[idx1];
                const v2 = vertices[idx2];
                
                const line = new THREE.Line3(v1, v2);
                const intersection = new THREE.Vector3();
                
                if (plane.intersectLine(line, intersection)) {
                    // Check if point is within segment (not beyond endpoints)
                    const t = v1.distanceTo(intersection) / v1.distanceTo(v2);
                    if (t >= -0.0001 && t <= 1.0001) {
                        intersectionPoints.push(intersection.clone());
                    }
                }
            }
            
            console.log('Intersection points found:', intersectionPoints.length);
            console.log('Points:', intersectionPoints);
            
            if (intersectionPoints.length < 3) {
                document.getElementById('status').textContent = 'Error: Not enough intersection points!';
                document.getElementById('status').style.color = '#f44336';
                console.error('Only', intersectionPoints.length, 'intersection points found');
                return;
            }
            
            // STEP 4: Sort points by angle (critical for correct polygon)
            
            // 4.1: Create 2D coordinate system on the plane
            const zAxis = normal.clone();
            
            let xAxis;
            if (Math.abs(normal.x) < 0.9) {
                xAxis = new THREE.Vector3(1, 0, 0);
            } else {
                xAxis = new THREE.Vector3(0, 1, 0);
            }
            
            xAxis.cross(zAxis).normalize();
            const yAxis = new THREE.Vector3().crossVectors(zAxis, xAxis);
            
            // 4.2: Find center of mass
            const center = new THREE.Vector3();
            for (let i = 0; i < intersectionPoints.length; i++) {
                center.add(intersectionPoints[i]);
            }
            center.divideScalar(intersectionPoints.length);
            
            // 4.3: Project points to 2D and calculate angles
            const points2D = [];
            
            for (let i = 0; i < intersectionPoints.length; i++) {
                const p = intersectionPoints[i];
                const relative = new THREE.Vector3().subVectors(p, center);
                
                const x = relative.dot(xAxis);
                const y = relative.dot(yAxis);
                const angle = Math.atan2(y, x);
                
                points2D.push({
                    point3D: p,
                    x: x,
                    y: y,
                    angle: angle
                });
            }
            
            // 4.4: Sort by angle
            points2D.sort((a, b) => a.angle - b.angle);
            const sortedPoints3D = points2D.map(p => p.point3D);
            
            // STEP 5: Create geometry
            
            // 5.1: Simple fan triangulation (no external library)
            const triangles = triangulatePolygon(sortedPoints3D.length);
            
            console.log('Triangulation indices:', triangles);
            
            // 5.2: Create BufferGeometry
            const geometry = new THREE.BufferGeometry();
            
            const positions = [];
            for (let i = 0; i < sortedPoints3D.length; i++) {
                const p = sortedPoints3D[i];
                positions.push(p.x, p.y, p.z);
            }
            
            console.log('Positions array:', positions);
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setIndex(triangles);
            geometry.computeVertexNormals();
            
            console.log('Geometry created with', sortedPoints3D.length, 'vertices and', triangles.length / 3, 'triangles');
            
            // 5.3: Create mesh and add to scene
            const material = new THREE.MeshBasicMaterial({
                color: 0xff6464,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
                depthTest: true,
                depthWrite: false // Try without depth write for transparency
            });
            
            crossSectionMesh = new THREE.Mesh(geometry, material);
            
            // Force render order to show above parallelepiped
            crossSectionMesh.renderOrder = 1;
            
            scene.add(crossSectionMesh);
            
            console.log('Mesh material:', material);
            console.log('Mesh visible:', crossSectionMesh.visible);
            
            // Add outline for better visibility
            const outlineGeometry = new THREE.EdgesGeometry(geometry);
            const outlineMaterial = new THREE.LineBasicMaterial({ 
                color: 0xff0000, 
                linewidth: 3 
            });
            const outlineEdges = new THREE.LineSegments(outlineGeometry, outlineMaterial);
            crossSectionMesh.add(outlineEdges);
            
            console.log('Cross section mesh created:', crossSectionMesh);
            console.log('Geometry vertices:', positions.length / 3);
            console.log('Geometry triangles:', triangles.length / 3);
            
            const t1 = performance.now();
            const execTime = (t1 - t0).toFixed(2);
            
            document.getElementById('status').textContent = 
                `Cross section built! (${intersectionPoints.length} vertices, ${execTime}ms)`;
            document.getElementById('status').style.color = '#4CAF50';
        }
        
        // Reset selection
        function resetSelection() {
            selectedPoints = [];
            document.getElementById('pointCount').textContent = '0';
            document.getElementById('status').textContent = 'Ready. Click on parallelepiped to select points.';
            document.getElementById('status').style.color = '#4CAF50';
            
            // Remove spheres
            selectedSpheres.forEach(sphere => scene.remove(sphere));
            selectedSpheres = [];
            
            // Remove cross section
            if (crossSectionMesh) {
                scene.remove(crossSectionMesh);
                crossSectionMesh = null;
            }
        }
        
        // Test function with predefined points
        function testWithRandomPoints() {
            resetSelection();
            
            // Three points that will create a nice cross-section
            const testPoints = [
                new THREE.Vector3(0.5, -1, 0.5),   // bottom face
                new THREE.Vector3(1, 0.5, 0.5),    // right face
                new THREE.Vector3(-0.5, 1, -0.5)   // top face
            ];
            
            console.log('Testing with predefined points:', testPoints);
            
            testPoints.forEach(point => {
                selectedPoints.push(point);
                
                // Create visual marker
                const sphereGeometry = new THREE.SphereGeometry(0.08, 16, 16);
                const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xff6600 });
                const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
                sphere.position.copy(point);
                scene.add(sphere);
                selectedSpheres.push(sphere);
            });
            
            document.getElementById('pointCount').textContent = '3';
            buildCrossSection();
        }
        
        // Event listeners
        window.addEventListener('click', onMouseClick);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Simple camera rotation (instead of OrbitControls)
        let autoRotate = false; // Disabled by default for easier point selection
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                autoRotate = !autoRotate;
                console.log('Auto-rotate:', autoRotate);
            }
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (autoRotate) {
                camera.position.x = 4 * Math.cos(Date.now() * 0.0003);
                camera.position.z = 4 * Math.sin(Date.now() * 0.0003);
                camera.lookAt(0, 0, 0);
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
