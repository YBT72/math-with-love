        function hideVisualization(obj) {
            if (obj.vizGroup) {
                // Recursively dispose all geometry and materials
                obj.vizGroup.traverse((child) => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach(mat => {
                                if (mat.map) mat.map.dispose();
                                mat.dispose();
                            });
                        } else {
                            if (child.material.map) child.material.map.dispose();
                            child.material.dispose();
                        }
                    }
                });
                
                scene.remove(obj.vizGroup);
                obj.vizGroup = null;
            }
            obj.visualizing = false;
        }
        
        function showLineParameterVisualization(lineObj, preservedT = null) {
            const vizGroup = new THREE.Group();
            vizGroup.name = 'lineViz';
            
            // Get the two source points
            const point1 = AppState.objects.find(p => p.id === lineObj.sourcePoints[0]);
            const point2 = AppState.objects.find(p => p.id === lineObj.sourcePoints[1]);
            
            if (!point1 || !point2) return; // Safety check
            
            // Base point (first point) and end point (second point)
            const basePoint = mathToThree(point1.coords);
            const endPoint = mathToThree(point2.coords);
            
            // Direction vector from point1 to point2
            const threeDirVector = new THREE.Vector3().subVectors(endPoint, basePoint);
            const dirNormalized = threeDirVector.clone().normalize();
            const actualLength = threeDirVector.length();
            
            // === BLUE DIRECTION VECTOR ū (from point1 to point2) ===
            // Shaft
            const blueShaftGeom = new THREE.CylinderGeometry(0.04, 0.04, actualLength, 8);
            const blueShaftMat = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const blueShaft = new THREE.Mesh(blueShaftGeom, blueShaftMat);
            
            const blueMid = new THREE.Vector3().addVectors(basePoint, endPoint).multiplyScalar(0.5);
            blueShaft.position.copy(blueMid);
            blueShaft.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirNormalized);
            vizGroup.add(blueShaft);
            
            // Arrow head (bigger to be visible over spheres)
            const blueHeadGeom = new THREE.ConeGeometry(0.12, 0.35, 12);
            const blueHeadMat = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const blueHead = new THREE.Mesh(blueHeadGeom, blueHeadMat);
            blueHead.position.copy(endPoint);
            blueHead.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirNormalized);
            vizGroup.add(blueHead);
            
            // Extract line number from line name (e.g., "l_{1}" -> "1")
            const lineNumberMatch = lineObj.name.match(/l_\{(\d+)\}/);
            const lineNumber = lineNumberMatch ? lineNumberMatch[1] : '';
            
            // Convert number to subscript digits for label
            const subscriptDigits = ['₀', '₁', '₂', '₃', '₄', '₅', '₆', '₇', '₈', '₉'];
            const subscript = lineNumber.split('').map(d => subscriptDigits[parseInt(d)]).join('');
            
            // Label "u̲₁" for blue vector (u with underline + subscript)
            const blueLabel = createTextSprite(`u̲${subscript}`, '#1976d2', 64);
            blueLabel.position.copy(blueMid.clone().add(new THREE.Vector3(0, 0.4, 0)));
            vizGroup.add(blueLabel);
            
            // === ORANGE DRAGGABLE SPHERE (1.1x bigger than regular points) ===
            // Initial position: use preserved t value or default to 1.0
            const initialT = preservedT !== null ? preservedT : 1.0;
            const initialOrangePos = basePoint.clone().add(dirNormalized.clone().multiplyScalar(initialT * actualLength));
            
            const sphereGeometry = new THREE.SphereGeometry(0.165, 16, 16); // 0.15 * 1.1 = 0.165
            const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xff6600 });
            const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            sphere.position.copy(initialOrangePos);
            vizGroup.add(sphere);
            
            // Store data for dragging
            sphere.userData = {
                type: 'lineParam',
                lineObj: lineObj,
                basePoint: basePoint,
                direction: dirNormalized,
                originalDirection: threeDirVector,  // Store original unnormalized direction
                tValue: initialT
            };
            
            // Orange vector group (initially hidden)
            const orangeGroup = new THREE.Group();
            orangeGroup.visible = false;
            vizGroup.add(orangeGroup);
            
            vizGroup.userData.sphere = sphere;
            vizGroup.userData.orangeGroup = orangeGroup;
            vizGroup.userData.basePoint = basePoint;
            vizGroup.userData.direction = dirNormalized;
            vizGroup.userData.originalDirection = threeDirVector;
            vizGroup.userData.lineNumber = lineNumber; // Store line number for labels
            
            scene.add(vizGroup);
            
            lineObj.vizGroup = vizGroup;
            lineObj.visualizing = true;
            
            // If sphere was moved (t != 1.0), show orange vector immediately
            if (initialT !== 1.0) {
                orangeGroup.visible = true;
                updateLineVisualization(vizGroup, basePoint, initialOrangePos, dirNormalized, initialT, lineNumber);
            }
        }
        
        function createTextSprite(text, color, size = 64) {
            const canvas = document.createElement('canvas');
            canvas.width = size * 2;
            canvas.height = size;
            const context = canvas.getContext('2d');
            context.font = `Bold ${size * 0.7}px Arial`;
            context.fillStyle = color;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, size, size / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(0.8, 0.4, 1);
            return sprite;
        }
        
        function showPlaneParameterVisualization(planeObj) {
            // TODO: Implement plane parameter visualization
            planeObj.visualizing = true;
            updateInfoPanel('Визуализация параметров плоскости - в разработке');
        }
        
        function updateObjectPosition(objectId, mesh) {
            const obj = AppState.objects.find(o => o.id === objectId);
            if (!obj) return;
            
            const threePos = mesh.position;
            const mathPos = threeToMath(threePos);
            
            // Update object data based on type
            if (obj.type === 'point') {
                obj.coords = mathPos;
            } else if (obj.type === 'line') {
                // Update line's base point
                obj.point = mathPos;
            } else if (obj.type === 'plane') {
                // Update plane's base point
                obj.point = mathPos;
            } else if (obj.type === 'vector') {
                // Move both start and end points
                const offset = {
                    x: mathPos.x - obj.start.x,
                    y: mathPos.y - obj.start.y,
                    z: mathPos.z - obj.start.z
                };
                obj.start = mathPos;
                obj.end = {
                    x: obj.end.x + offset.x,
                    y: obj.end.y + offset.y,
                    z: obj.end.z + offset.z
                };
            }
            
            // Update UI
            updateObjectsList();
        }

        function recreateObjectFromData(objData) {
            switch(objData.type) {
                case 'point':
                    recreatePoint(objData);
                    break;
                case 'line':
                    recreateLine(objData);
                    break;
                case 'plane':
                    recreatePlane(objData);
                    break;
                case 'vector':
                    recreateVector(objData);
                    break;
            }
        }

        function recreatePoint(data) {
            const geometry = new THREE.SphereGeometry(0.15, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.copy(mathToThree(data.coords));
            scene.add(sphere);
            
            AppState.objects.push({
                type: 'point',
                name: data.name,
                coords: data.coords,
                mesh: sphere,
                id: data.id,
                connectedLines: data.connectedLines || []
            });
            
            // Restore point color if connected
            if (data.connectedLines && data.connectedLines.length > 0) {
                sphere.material.color.setHex(0x666666);
            }
        }

        function recreateLine(data) {
            const threeP1 = mathToThree(data.point);
            const direction = data.direction;
            const mathP2 = {
                x: data.point.x + direction.x,
                y: data.point.y + direction.y,
                z: data.point.z + direction.z
            };
            const threeP2 = mathToThree(mathP2);
            
            // Create line as thick cylinder
            const extendFactor = 5;
            const dir = new THREE.Vector3().subVectors(threeP2, threeP1).normalize();
            const startPoint = threeP1.clone().sub(dir.clone().multiplyScalar(extendFactor));
            const endPoint = threeP2.clone().add(dir.clone().multiplyScalar(extendFactor));
            const length = startPoint.distanceTo(endPoint);
            
            const geometry = new THREE.CylinderGeometry(0.025, 0.025, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            const midPoint = new THREE.Vector3().addVectors(startPoint, endPoint).multiplyScalar(0.5);
            cylinder.position.copy(midPoint);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            
            scene.add(cylinder);
            
            AppState.objects.push({
                type: 'line',
                name: data.name,
                point: data.point,
                direction: data.direction,
                mesh: cylinder,
                id: data.id,
                sourcePoints: data.sourcePoints || []
            });
        }

        function recreatePlane(data) {
            const threeP1 = mathToThree(data.point);
            const size = 8;
            const planeGeometry = new THREE.PlaneGeometry(size, size);
            
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x64b5f6, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const plane = new THREE.Mesh(planeGeometry, material);
            plane.position.copy(threeP1);
            plane.lookAt(threeP1.clone().add(mathToThree(data.normal)));
            
            scene.add(plane);
            
            AppState.objects.push({
                type: 'plane',
                name: data.name,
                point: data.point,
                normal: data.normal,
                mesh: plane,
                id: data.id
            });
        }

        function recreateVector(data) {
            const threeStart = mathToThree(data.start);
            const threeEnd = mathToThree(data.end);
            const direction = new THREE.Vector3().subVectors(threeEnd, threeStart);
            const length = direction.length();
            direction.normalize();
            
            // Create custom arrow with thick shaft
            const group = new THREE.Group();
            
            // Shaft
            const shaftLength = length - 0.4;
            const shaftGeometry = new THREE.CylinderGeometry(0.025, 0.025, shaftLength, 8);
            const shaftMaterial = new THREE.MeshBasicMaterial({ color: 0xef4444 });
            const shaft = new THREE.Mesh(shaftGeometry, shaftMaterial);
            shaft.position.y = shaftLength / 2;
            group.add(shaft);
            
            // Arrow head
            const headGeometry = new THREE.ConeGeometry(0.08, 0.4, 12);
            const headMaterial = new THREE.MeshBasicMaterial({ color: 0xef4444 });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = shaftLength + 0.2;
            group.add(head);
            
            group.position.copy(threeStart);
            group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
            
            scene.add(group);
            
            AppState.objects.push({
                type: 'vector',
                name: data.name,
                start: data.start,
                end: data.end,
                mesh: group,
                id: data.id
            });
        }

        function handleCanvasClick(event) {
            // Ignore click if we just finished dragging
            if (wasDragging) {
                return;
            }
            
            // Check if clicking on an object in select mode
            if (AppState.currentTool === 'select') {
                getMousePosition(event);
                raycaster.setFromCamera(mouse, camera);
                
                // Collect all meshes from objects (including children for ArrowHelper)
                // EXCLUDE vizGroup elements (orange spheres, vectors) - they are for visualization only
                const clickableObjects = [];
                AppState.objects.forEach(obj => {
                    if (obj.mesh) {
                        if (obj.type === 'vector') {
                            // Vector has children (shaft and head)
                            obj.mesh.children.forEach(child => {
                                clickableObjects.push({ mesh: child, objId: obj.id });
                            });
                        } else {
                            clickableObjects.push({ mesh: obj.mesh, objId: obj.id });
                        }
                    }
                });
                
                const meshes = clickableObjects.map(item => item.mesh);
                
                // Perform raycast but filter out vizGroup children
                const allIntersects = raycaster.intersectObjects(meshes, true);
                const intersects = allIntersects.filter(hit => {
                    // Exclude objects that are part of vizGroup
                    let obj = hit.object;
                    while (obj) {
                        if (obj.name === 'lineViz') return false;
                        obj = obj.parent;
                    }
                    return true;
                });
                
                if (intersects.length > 0) {
                    const clickedMesh = intersects[0].object;
                    const clickedItem = clickableObjects.find(item => item.mesh === clickedMesh);
                    const clickPoint = intersects[0].point; // Point where user clicked in 3D space
                    
                    if (clickedItem) {
                        selectObject(clickedItem.objId, clickPoint);
                        const obj = AppState.objects.find(o => o.id === clickedItem.objId);
                        if (obj) {
                            updateInfoPanel(`Выбран объект: ${obj.name} (используйте стрелки для перемещения)`);
                        }
                        return;
                    }
                } else {
                    // Clicked on empty space - deselect
                    deselectObject();
                    updateInfoPanel('Выбор снят');
                    return;
                }
            }
            
            // For line, vector, and plane creation - MUST click on existing point
            if (['line', 'vector', 'plane'].includes(AppState.currentTool)) {
                getMousePosition(event);
                raycaster.setFromCamera(mouse, camera);
                
                // Check if clicking on a point
                const points = AppState.objects.filter(obj => obj.type === 'point');
                const pointMeshes = points.map(p => p.mesh);
                const intersects = raycaster.intersectObjects(pointMeshes, false);
                
                if (intersects.length > 0) {
                    // Clicked on existing point - use its coordinates
                    const clickedMesh = intersects[0].object;
                    const clickedPoint = points.find(p => p.mesh === clickedMesh);
                    
                    if (clickedPoint) {
                        // Pass point ID to handler
                        switch(AppState.currentTool) {
                            case 'line':
                                handleLineCreation(clickedPoint.id);
                                return;
                            case 'vector':
                                handleVectorCreation(clickedPoint.coords);
                                return;
                            case 'plane':
                                handlePlaneCreation(clickedPoint.coords);
                                return;
                        }
                    }
                } else {
                    // Clicked on empty space - show warning
                    if (AppState.currentTool === 'line') {
                        updateInfoPanel('⚠️ Кликните на существующую точку для создания прямой');
                    } else if (AppState.currentTool === 'plane') {
                        updateInfoPanel('⚠️ Кликните на существующую точку для создания плоскости');
                    } else if (AppState.currentTool === 'vector') {
                        updateInfoPanel('⚠️ Кликните на существующую точку для создания вектора');
                    }
                    return;
                }
            }
            
            // Create new objects - ONLY POINT can be created by clicking in space
            const mathPoint = raycastToPlane(event);
            if (!mathPoint) return;
            
            switch(AppState.currentTool) {
                case 'point':
                    saveToHistory();
                    createPoint(mathPoint);
                    break;
                // line, plane, vector can ONLY be created via existing points
            }
        }

        // OBJECT CREATION
        function createPoint(mathCoords) {
            const name = String.fromCharCode(AppState.nextNames.point++);
            
            const geometry = new THREE.SphereGeometry(0.15, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const sphere = new THREE.Mesh(geometry, material);
            
            const threePos = mathToThree(mathCoords);
            sphere.position.copy(threePos);
            
            scene.add(sphere);
            
            const pointObj = {
                type: 'point',
                name: name,
                coords: mathCoords,
                mesh: sphere,
                connectedLines: [],  // Array of line IDs that use this point
                id: Date.now()
            };
            
            AppState.objects.push(pointObj);
            updateObjectsList();
            updateInfoPanel(`Создана точка ${name} (${formatCoords(mathCoords)})`);
        }

        function handleLineCreation(pointId) {
            AppState.tempPoints.push(pointId);
            
            // Change point color to light gray (captured)
            const point = AppState.objects.find(p => p.id === pointId);
            if (point && point.mesh) {
                point.mesh.material.color.setHex(0xcccccc);
            }
            
            // Update UI to show active button
            updateObjectsList();
            
            if (AppState.tempPoints.length === 1) {
                updateInfoPanel('Укажите вторую точку для создания прямой');
            } else if (AppState.tempPoints.length === 2) {
                saveToHistory();
                // Get actual point objects
                const point1 = AppState.objects.find(p => p.id === AppState.tempPoints[0]);
                const point2 = AppState.objects.find(p => p.id === AppState.tempPoints[1]);
                
                if (point1 && point2) {
                    createLineFromPoints(point1.id, point2.id);
                }
                
                // Clear tempPoints and reset colors after 2 seconds
                const tempPointsCopy = [...AppState.tempPoints];
                AppState.tempPoints = [];
                
                setTimeout(() => {
                    tempPointsCopy.forEach(pid => {
                        const pt = AppState.objects.find(p => p.id === pid);
                        if (pt && pt.mesh) {
                            // Restore color based on whether point is connected to lines
                            if (pt.connectedLines && pt.connectedLines.length > 0) {
                                pt.mesh.material.color.setHex(0x666666); // Gray for connected
                            } else {
                                pt.mesh.material.color.setHex(0x1976d2); // Blue for free
                            }
                        }
                    });
                    updateObjectsList();
                }, 2000);
            }
        }

        function createLineFromPoints(pointId1, pointId2) {
            const point1 = AppState.objects.find(p => p.id === pointId1);
            const point2 = AppState.objects.find(p => p.id === pointId2);
            
            if (!point1 || !point2) return;
            
            const name = `l_{${AppState.nextNames.line++}}`;
            
            const direction = {
                x: point2.coords.x - point1.coords.x,
                y: point2.coords.y - point1.coords.y,
                z: point2.coords.z - point1.coords.z
            };
            
            const threeP1 = mathToThree(point1.coords);
            const threeP2 = mathToThree(point2.coords);
            
            // Create line as thick cylinder
            const extendFactor = 5;
            const dir = new THREE.Vector3().subVectors(threeP2, threeP1).normalize();
            const startPoint = threeP1.clone().sub(dir.clone().multiplyScalar(extendFactor));
            const endPoint = threeP2.clone().add(dir.clone().multiplyScalar(extendFactor));
            const length = startPoint.distanceTo(endPoint);
            
            const geometry = new THREE.CylinderGeometry(0.025, 0.025, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            // Position and orient cylinder
            const midPoint = new THREE.Vector3().addVectors(startPoint, endPoint).multiplyScalar(0.5);
            cylinder.position.copy(midPoint);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            
            scene.add(cylinder);
            
            const lineObj = {
                type: 'line',
                name: name,
                point: { ...point1.coords },  // Copy of first point coords
                direction: direction,
                sourcePoints: [pointId1, pointId2],  // Store IDs directly
                mesh: cylinder,
                id: Date.now()
            };
            
            // Add bidirectional link: point -> line
            [point1, point2].forEach(point => {
                if (point.connectedLines) {
                    point.connectedLines.push(lineObj.id);
                    // Change point color to gray (connected)
                    if (point.mesh) {
                        point.mesh.material.color.setHex(0x666666);
                    }
                }
            });
            
            AppState.objects.push(lineObj);
            updateObjectsList();
            
            // Format line name for display: l_{1} -> l₁
            const displayName = name.replace(/l_\{(\d+)\}/, (match, num) => {
                const subscriptDigits = ['₀', '₁', '₂', '₃', '₄', '₅', '₆', '₇', '₈', '₉'];
                return 'l' + num.split('').map(d => subscriptDigits[parseInt(d)]).join('');
            });
            updateInfoPanel(`Создана прямая ${displayName}`);
            
            // DON'T switch to select tool - keep line tool active for creating more lines
        }

        function createLine(mathPoint1, mathPoint2) {
            const name = `l_{${AppState.nextNames.line++}}`;
            
            const direction = {
                x: mathPoint2.x - mathPoint1.x,
                y: mathPoint2.y - mathPoint1.y,
                z: mathPoint2.z - mathPoint1.z
            };
            
            const threeP1 = mathToThree(mathPoint1);
            const threeP2 = mathToThree(mathPoint2);
            
            // Create line as thick cylinder
            const extendFactor = 5;
            const dir = new THREE.Vector3().subVectors(threeP2, threeP1).normalize();
            const startPoint = threeP1.clone().sub(dir.clone().multiplyScalar(extendFactor));
            const endPoint = threeP2.clone().add(dir.clone().multiplyScalar(extendFactor));
            const length = startPoint.distanceTo(endPoint);
            
            const geometry = new THREE.CylinderGeometry(0.025, 0.025, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            // Position and orient cylinder
            const midPoint = new THREE.Vector3().addVectors(startPoint, endPoint).multiplyScalar(0.5);
            cylinder.position.copy(midPoint);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            
            scene.add(cylinder);
            
            // Find source points if they exist and create bidirectional links
            const sourcePoints = [];
            AppState.objects.forEach(obj => {
                if (obj.type === 'point') {
                    const dist1 = Math.sqrt(
                        Math.pow(obj.coords.x - mathPoint1.x, 2) +
                        Math.pow(obj.coords.y - mathPoint1.y, 2) +
                        Math.pow(obj.coords.z - mathPoint1.z, 2)
                    );
                    const dist2 = Math.sqrt(
                        Math.pow(obj.coords.x - mathPoint2.x, 2) +
                        Math.pow(obj.coords.y - mathPoint2.y, 2) +
                        Math.pow(obj.coords.z - mathPoint2.z, 2)
                    );
                    if (dist1 < 0.01 || dist2 < 0.01) {
                        sourcePoints.push(obj.id);
                    }
                }
            });
            
            const lineObj = {
                type: 'line',
                name: name,
                point: mathPoint1,
                direction: direction,
                sourcePoints: sourcePoints,  // Store IDs of source points
                mesh: cylinder,
                id: Date.now()
            };
            
            // Add bidirectional link: point -> line
            sourcePoints.forEach(pointId => {
                const point = AppState.objects.find(p => p.id === pointId);
                if (point && point.connectedLines) {
                    point.connectedLines.push(lineObj.id);
                    // Change point color to gray (connected)
                    if (point.mesh) {
                        point.mesh.material.color.setHex(0x666666);
                    }
                }
            });
            
            AppState.objects.push(lineObj);
            updateObjectsList();
            
            // Format line name for display: l_{1} -> l₁
            const displayName = name.replace(/l_\{(\d+)\}/, (match, num) => {
                const subscriptDigits = ['₀', '₁', '₂', '₃', '₄', '₅', '₆', '₇', '₈', '₉'];
                return 'l' + num.split('').map(d => subscriptDigits[parseInt(d)]).join('');
            });
            updateInfoPanel(`Создана прямая ${displayName}`);
        }

        function handlePlaneCreation(pointId) {
            AppState.tempPoints.push(pointId);  // Store pointId instead of coords
            
            if (AppState.tempPoints.length < 3) {
                updateInfoPanel(`Укажите точку ${AppState.tempPoints.length + 1} из 3 для создания плоскости`);
                // Get point coords for visual
                const point = AppState.objects.find(p => p.id === pointId);
                if (point) {
                    createTempPointVisual(point.coords);
                }
            } else if (AppState.tempPoints.length === 3) {
                saveToHistory();
                createPlane(AppState.tempPoints[0], AppState.tempPoints[1], AppState.tempPoints[2]);
                AppState.tempPoints = [];
                clearTempVisuals();
            }
        }

        function createPlane(pointId1, pointId2, pointId3) {
            // Get points by ID
            const point1 = AppState.objects.find(p => p.id === pointId1);
            const point2 = AppState.objects.find(p => p.id === pointId2);
            const point3 = AppState.objects.find(p => p.id === pointId3);
            
            if (!point1 || !point2 || !point3) {
                updateInfoPanel('Ошибка: точки не найдены');
                return;
            }
            
            const mathP1 = point1.coords;
            const mathP2 = point2.coords;
            const mathP3 = point3.coords;
            
            const name = `\\pi_{${AppState.nextNames.plane++}}`;
            
            const v1 = { x: mathP2.x - mathP1.x, y: mathP2.y - mathP1.y, z: mathP2.z - mathP1.z };
            const v2 = { x: mathP3.x - mathP1.x, y: mathP3.y - mathP1.y, z: mathP3.z - mathP1.z };
            
            const normal = {
                x: v1.y * v2.z - v1.z * v2.y,
                y: v1.z * v2.x - v1.x * v2.z,
                z: v1.x * v2.y - v1.y * v2.x
            };
            
            const threeP1 = mathToThree(mathP1);
            const threeP2 = mathToThree(mathP2);
            const threeP3 = mathToThree(mathP3);
            
            const size = 8;
            const center = new THREE.Vector3().addVectors(threeP1, threeP2).add(threeP3).divideScalar(3);
            const planeGeometry = new THREE.PlaneGeometry(size, size);
            
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x64b5f6, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const plane = new THREE.Mesh(planeGeometry, material);
            plane.position.copy(center);
            plane.lookAt(center.clone().add(mathToThree(normal)));
            
            scene.add(plane);
            
            const planeObj = {
                type: 'plane',
                name: name,
                point: mathP1,
                normal: normal,
                mesh: plane,
                id: Date.now(),
                sourcePoints: [pointId1, pointId2, pointId3],  // Store source points
                v1: v1,  // Store base vectors for updates
                v2: v2
            };
            
            // Add this plane to each point's connectedPlanes
            [point1, point2, point3].forEach(pt => {
                if (!pt.connectedPlanes) {
                    pt.connectedPlanes = [];
                }
                pt.connectedPlanes.push(planeObj.id);
            });
            
            AppState.objects.push(planeObj);
            updateObjectsList();
            updateInfoPanel(`Создана плоскость ${name}`);
        }

        function handleVectorCreation(mathPoint) {
            AppState.tempPoints.push(mathPoint);
            
            if (AppState.tempPoints.length === 1) {
                updateInfoPanel('Укажите конечную точку вектора');
                createTempPointVisual(mathPoint);
            } else if (AppState.tempPoints.length === 2) {
                saveToHistory();
                createVector(AppState.tempPoints[0], AppState.tempPoints[1]);
                AppState.tempPoints = [];
                clearTempVisuals();
            }
        }

        function createVector(mathStart, mathEnd) {
            const startName = String.fromCharCode(AppState.nextNames.point - 1);
            const endName = String.fromCharCode(AppState.nextNames.point);
            const name = `\\overrightarrow{${startName}${endName}}`;
            
            const threeStart = mathToThree(mathStart);
            const threeEnd = mathToThree(mathEnd);
            const direction = new THREE.Vector3().subVectors(threeEnd, threeStart);
            const length = direction.length();
            direction.normalize();
            
            // Create custom arrow with thick shaft
            const group = new THREE.Group();
            
            // Shaft (cylinder)
            const shaftLength = length - 0.4;
            const shaftGeometry = new THREE.CylinderGeometry(0.025, 0.025, shaftLength, 8);
            const shaftMaterial = new THREE.MeshBasicMaterial({ color: 0xef4444 });
            const shaft = new THREE.Mesh(shaftGeometry, shaftMaterial);
            shaft.position.y = shaftLength / 2;
            group.add(shaft);
            
            // Arrow head (cone)
            const headGeometry = new THREE.ConeGeometry(0.08, 0.4, 12);
            const headMaterial = new THREE.MeshBasicMaterial({ color: 0xef4444 });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = shaftLength + 0.2;
            group.add(head);
            
            // Position and orient the group
            group.position.copy(threeStart);
            group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
            
            scene.add(group);
            
            const vectorObj = {
                type: 'vector',
                name: name,
                start: mathStart,
                end: mathEnd,
                mesh: group,
                id: Date.now()
            };
            
            AppState.objects.push(vectorObj);
            updateObjectsList();
            updateInfoPanel(`Создан вектор ${name}`);
        }

        // HELPERS
        let tempVisuals = [];
        
        function createTempPointVisual(mathCoords) {
            const geometry = new THREE.SphereGeometry(0.1, 16, 16);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x999999,
                transparent: true,
                opacity: 0.5
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.copy(mathToThree(mathCoords));
            scene.add(sphere);
            tempVisuals.push(sphere);
        }
        
        function clearTempVisuals() {
            tempVisuals.forEach(visual => {
                scene.remove(visual);
                if (visual.geometry) visual.geometry.dispose();
                if (visual.material) visual.material.dispose();
            });
            tempVisuals = [];
        }

        function formatCoords(coords) {
            return `${coords.x.toFixed(1)}, ${coords.y.toFixed(1)}, ${coords.z.toFixed(1)}`;
        }
        
        // Format number for equations: replace "+ -x" with "- x"
        function formatNumber(num) {
            const formatted = num.toFixed(1);
            return formatted;
        }
        
        // Format term in equation: handles "x + -2" -> "x - 2" and "x - -2" -> "x + 2"
        function formatTerm(baseValue, coefficient, variable = 't') {
            const base = baseValue.toFixed(1);
            const coef = parseFloat(coefficient.toFixed(1));
            
            if (coef >= 0) {
                return `${base} + ${Math.abs(coef).toFixed(1)}${variable}`;
            } else {
                // Negative coefficient: use minus sign instead of "+ -"
                return `${base} - ${Math.abs(coef).toFixed(1)}${variable}`;
            }
        }
        
        // Format numerator for canonical equation: handles "x - -2" -> "x + 2"
        function formatCanonicalNumerator(variable, pointCoord) {
            const coord = parseFloat(pointCoord.toFixed(1));
            
            if (coord >= 0) {
                // Positive: x - 2.4
                return `${variable} - ${coord.toFixed(1)}`;
            } else {
                // Negative: x - (-2.4) -> x + 2.4
                return `${variable} + ${Math.abs(coord).toFixed(1)}`;
            }
        }

            }

        function createObjectGroup(group) {
            const groupDiv = document.createElement('div');

            groupHeader.className = 'group-header';
            groupHeader.innerHTML = `

                    <span class="group-count">${group.objects.length}</span>
                </div>
                <span class="group-expand-icon">▼</span>

            groupContent.className = 'group-content expanded';
            
            group.objects.forEach(obj => {
                const accordion = createObjectAccordion(obj);
                groupContent.appendChild(accordion);
            });

            groupDiv.appendChild(groupContent);
            
            groupHeader.addEventListener('click', () => {
                groupContent.classList.toggle('expanded');

                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                                    <circle cx="12" cy="12" r="10" stroke-width="2"/>
                                    <line x1="12" y1="8" x2="12" y2="16"/>
                                    <line x1="8" y1="12" x2="16" y2="12"/>

                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">

            setTimeout(() => {

                    renderEquations(obj, div);
                }
            }, 50);
            
            const header = div.querySelector('.object-header');
            header.addEventListener('click', (e) => {

                if (!e.target.classList.contains('delete-btn') && 
                    !e.target.closest('.delete-btn') &&
                    !e.target.classList.contains('viz-icon-btn') &&
                    !e.target.closest('.viz-icon-btn')) {

                    div.classList.toggle('expanded');
                    
                    // Render equations when expanding (but don't select for transform)
                    if (!wasExpanded && (obj.type === 'line' || obj.type === 'plane')) {
                        setTimeout(() => {
                            renderEquations(obj, div);
                        }, 50);
                    }
                }
            });
            
            // Delete button handler
            const deleteBtn = div.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteObject(obj.id);
            });
            
            // Use point button handler
            if (obj.type === 'point') {
                const useBtn = div.querySelector('.use-point-icon-btn');
                if (useBtn) {
                    useBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        handlePointSelection(obj.id);
                    });

            // Visualization button handler

            if (vizBtn) {

                    e.stopPropagation();

                    const vizType = vizBtn.dataset.vizType;
                    const objId = parseInt(vizBtn.dataset.objId);
                    toggleVisualization(objId, vizType);
                });

            return div;

        function renderEquations(obj, container) {
            if (obj.type === 'line') {
                const lineEqVec = `\\underline{r} = (${obj.point.x.toFixed(1)}, ${obj.point.y.toFixed(1)}, ${obj.point.z.toFixed(1)}) + t(${obj.direction.x.toFixed(1)}, ${obj.direction.y.toFixed(1)}, ${obj.direction.z.toFixed(1)})`;
                
                // Format parametric equation with proper signs
                const xEq = formatTerm(obj.point.x, obj.direction.x, 't');
                const yEq = formatTerm(obj.point.y, obj.direction.y, 't');
                const zEq = formatTerm(obj.point.z, obj.direction.z, 't');
                const lineEqParam = `\\begin{cases} x = ${xEq} \\\\ y = ${yEq} \\\\ z = ${zEq} \\end{cases}`;
                
                // Format canonical equation with proper signs in numerator
                const xNumerator = formatCanonicalNumerator('x', obj.point.x);
                const yNumerator = formatCanonicalNumerator('y', obj.point.y);
                const zNumerator = formatCanonicalNumerator('z', obj.point.z);
                
                const lineEqCanon = obj.direction.x !== 0 && obj.direction.y !== 0 && obj.direction.z !== 0 
                    ? `\\frac{${xNumerator}}{${obj.direction.x.toFixed(1)}} = \\frac{${yNumerator}}{${obj.direction.y.toFixed(1)}} = \\frac{${zNumerator}}{${obj.direction.z.toFixed(1)}}`
                    : null;
                
                const vecEl = container.querySelector('[data-eq-type="line-vec"]');
                const paramEl = container.querySelector('[data-eq-type="line-param"]');
                const canonEl = container.querySelector('[data-eq-type="line-canon"]');
                
                if (vecEl) katex.render(lineEqVec, vecEl, { throwOnError: false });
                if (paramEl) katex.render(lineEqParam, paramEl, { throwOnError: false, displayMode: true });
                if (canonEl) {
                    if (lineEqCanon) {
                        katex.render(lineEqCanon, canonEl, { throwOnError: false });
                    } else {
                        canonEl.textContent = 'Невозможно (нулевые компоненты вектора)';
                        canonEl.style.fontFamily = 'inherit';
                        canonEl.style.fontSize = '12px';
                        canonEl.style.color = '#999';
                    }
                }
            } else if (obj.type === 'plane') {
                const a = parseFloat(obj.normal.x.toFixed(1));
                const b = parseFloat(obj.normal.y.toFixed(1));
                const c = parseFloat(obj.normal.z.toFixed(1));
                const d = parseFloat((-(a * obj.point.x + b * obj.point.y + c * obj.point.z)).toFixed(1));
                
                // Format equation terms properly
                let planeEqGeneral = `${a.toFixed(1)}x`;
                
                // Add b term
                if (b >= 0) {
                    planeEqGeneral += ` + ${b.toFixed(1)}y`;
                } else {
                    planeEqGeneral += ` - ${Math.abs(b).toFixed(1)}y`;
                }
                
                // Add c term
                if (c >= 0) {
                    planeEqGeneral += ` + ${c.toFixed(1)}z`;
                } else {
                    planeEqGeneral += ` - ${Math.abs(c).toFixed(1)}z`;
                }
                
                // Add d term
                if (d >= 0) {
                    planeEqGeneral += ` + ${d.toFixed(1)}`;
                } else {
                    planeEqGeneral += ` - ${Math.abs(d).toFixed(1)}`;
                }
                
                planeEqGeneral += ` = 0`;
                
                const planeEqNormal = `(${a.toFixed(1)}, ${b.toFixed(1)}, ${c.toFixed(1)}) \\cdot ((x, y, z) - (${obj.point.x.toFixed(1)}, ${obj.point.y.toFixed(1)}, ${obj.point.z.toFixed(1)})) = 0`;
                
                const generalEl = container.querySelector('[data-eq-type="plane-general"]');
                const vectorEl = container.querySelector('[data-eq-type="plane-vector"]');
                
                if (generalEl) katex.render(planeEqGeneral, generalEl, { throwOnError: false });
                if (vectorEl) katex.render(planeEqNormal, vectorEl, { throwOnError: false });
            }
        }

        // ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        // RESIZE HANDLER
        window.addEventListener('resize', () => {
            const container = canvas.parentElement;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        updateInfoPanel();
    </script>
</body>
</html>
