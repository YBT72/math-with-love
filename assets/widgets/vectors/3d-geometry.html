        function showLineParameterVisualization(lineObj, preservedT = null) {
            const vizGroup = new THREE.Group();
            vizGroup.name = 'lineViz';
            
            // Get the two source points
            const point1 = AppState.objects.find(p => p.id === lineObj.sourcePoints[0]);
            const point2 = AppState.objects.find(p => p.id === lineObj.sourcePoints[1]);
            
            if (!point1 || !point2) return; // Safety check
            
            // Base point (first point) and end point (second point)
            const basePoint = mathToThree(point1.coords);
            const endPoint = mathToThree(point2.coords);
            
            // Direction vector from point1 to point2
            const threeDirVector = new THREE.Vector3().subVectors(endPoint, basePoint);
            const dirNormalized = threeDirVector.clone().normalize();
            const actualLength = threeDirVector.length();
            
            // === BLUE DIRECTION VECTOR ū (from point1 to point2) ===
            // Adjust length to account for sphere radius and gap at the end
            const sphereAndGap = 0.2; // Reduced gap to match orange arrow
            const adjustedBlueLength = Math.max(0.1, actualLength - sphereAndGap);
            
            // Start from basePoint, end before the end sphere
            const adjustedBlueStart = basePoint;
            const adjustedBlueEnd = basePoint.clone().add(dirNormalized.clone().multiplyScalar(adjustedBlueLength));
            
            // Shaft
            const blueShaftGeom = new THREE.CylinderGeometry(0.04, 0.04, adjustedBlueLength, 8);
            const blueShaftMat = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const blueShaft = new THREE.Mesh(blueShaftGeom, blueShaftMat);
            
            const blueMid = new THREE.Vector3().addVectors(adjustedBlueStart, adjustedBlueEnd).multiplyScalar(0.5);
            blueShaft.position.copy(blueMid);
            blueShaft.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirNormalized);
            vizGroup.add(blueShaft);
            
            // Arrow head (same size as independent vectors)
            const blueHeadGeom = new THREE.ConeGeometry(0.09, 0.3, 12);
            const blueHeadMat = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const blueHead = new THREE.Mesh(blueHeadGeom, blueHeadMat);
            blueHead.position.copy(adjustedBlueEnd);
            blueHead.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirNormalized);
            vizGroup.add(blueHead);
            
            // Extract line number from line name (e.g., "l₁" -> "1")
            const lineNumber = lineObj.name.replace('l', '');
            
            // Label "u̲₁" for blue vector (u with underline + subscript)
            const blueLabel = createTextSprite(`u̲${lineNumber}`, '#1976d2', 64);
            blueLabel.position.copy(blueMid.clone().add(new THREE.Vector3(0, 0.4, 0)));
            vizGroup.add(blueLabel);
            
            // === ORANGE DRAGGABLE SPHERE (same size as regular points) ===
            // Initial position: use preserved t value or default to 1.0
            const initialT = preservedT !== null ? preservedT : 1.0;
            const initialOrangePos = basePoint.clone().add(dirNormalized.clone().multiplyScalar(initialT * actualLength));
            
            const sphereGeometry = new THREE.SphereGeometry(0.15, 16, 16); // Same as regular points
            const sphereMaterial = new THREE.MeshBasicMaterial({ color: 0xff6600 });
            const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            sphere.position.copy(initialOrangePos);
            vizGroup.add(sphere);
            
            // Store data for dragging
            sphere.userData = {
                type: 'lineParam',
                lineObj: lineObj,
                basePoint: basePoint,
                direction: dirNormalized,
                originalDirection: threeDirVector,  // Store original unnormalized direction
                tValue: initialT
            };
            
            // Orange vector group (initially hidden)
            const orangeGroup = new THREE.Group();
            orangeGroup.visible = false;
            vizGroup.add(orangeGroup);
            
            vizGroup.userData.sphere = sphere;
            vizGroup.userData.orangeGroup = orangeGroup;
            vizGroup.userData.basePoint = basePoint;
            vizGroup.userData.direction = dirNormalized;
            vizGroup.userData.originalDirection = threeDirVector;
            vizGroup.userData.lineNumber = lineNumber; // Store line number for labels
            
            scene.add(vizGroup);
            
            lineObj.vizGroup = vizGroup;
            lineObj.visualizing = true;
            
            // If sphere was moved (t != 1.0), show orange vector immediately
            if (initialT !== 1.0) {
                orangeGroup.visible = true;
                updateLineVisualization(vizGroup, basePoint, initialOrangePos, dirNormalized, initialT, lineNumber);
            }
        }
        
        function createTextSprite(text, color, size = 64) {
            const canvas = document.createElement('canvas');
            canvas.width = size * 2;
            canvas.height = size;
            const context = canvas.getContext('2d');
            context.font = `Bold ${size * 0.7}px Arial`;
            context.fillStyle = color;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(text, size, size / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(0.8, 0.4, 1);
            return sprite;
        }

        // Helper: Create purple vector (shaft + arrow head)
        function createPurpleVector(group, startPos, endPos, direction) {
            const vectorLength = startPos.distanceTo(endPos);
            const sphereAndGap = 0.2; // Account for sphere radius (0.15) + small gap (0.05)
            const adjustedLength = Math.max(0.1, vectorLength - sphereAndGap);
            
            // Calculate adjusted end position (closer to start point, before sphere)
            const directionNormalized = direction.clone().normalize();
            const adjustedEndPos = startPos.clone().add(directionNormalized.clone().multiplyScalar(adjustedLength));
            
            // Purple color
            const purpleColor = 0x8B008B; // Dark purple
            
            // Create shaft
            const shaftLength = adjustedLength - 0.2; // Leave space for arrow head
            const shaftGeom = new THREE.CylinderGeometry(0.05, 0.05, shaftLength, 8);
            const shaftMat = new THREE.MeshBasicMaterial({ color: purpleColor });
            const shaft = new THREE.Mesh(shaftGeom, shaftMat);
            
            // Position shaft between start and adjusted end (minus arrow head)
            const shaftMid = new THREE.Vector3().addVectors(startPos, adjustedEndPos.clone().sub(directionNormalized.clone().multiplyScalar(0.1))).multiplyScalar(0.5);
            shaft.position.copy(shaftMid);
            shaft.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), directionNormalized);
            group.add(shaft);
            
            // Create arrow head at adjusted position (before sphere)
            const headGeom = new THREE.ConeGeometry(0.1, 0.4, 12);
            const headMat = new THREE.MeshBasicMaterial({ color: purpleColor });
            const head = new THREE.Mesh(headGeom, headMat);
            head.position.copy(adjustedEndPos);
            head.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), directionNormalized);
            group.add(head);
            
            console.log('✅ Created purple vector shaft and head (not inside sphere)');
        }

        // Helper: create line for plane (silent, no tool switch)
        function createLineFromPointsForPlane(pointId1, pointId2) {
            const point1 = AppState.objects.find(p => p.id === pointId1);
            const point2 = AppState.objects.find(p => p.id === pointId2);
            
            if (!point1 || !point2) return null;
            
            const name = `l${toSubscript(AppState.nextNames.line++)}`;
            
            const direction = {
                x: point2.coords.x - point1.coords.x,
                y: point2.coords.y - point1.coords.y,
                z: point2.coords.z - point1.coords.z
            };
            
            const threeP1 = mathToThree(point1.coords);
            const threeP2 = mathToThree(point2.coords);
            
            // Create line as thick cylinder
            const extendFactor = 5;
            const dir = new THREE.Vector3().subVectors(threeP2, threeP1).normalize();
            const startPoint = threeP1.clone().sub(dir.clone().multiplyScalar(extendFactor));
            const endPoint = threeP2.clone().add(dir.clone().multiplyScalar(extendFactor));
            const length = startPoint.distanceTo(endPoint);
            
            const geometry = new THREE.CylinderGeometry(0.025, 0.025, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            // Position and orient cylinder
            const midPoint = new THREE.Vector3().addVectors(startPoint, endPoint).multiplyScalar(0.5);
            cylinder.position.copy(midPoint);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            
            scene.add(cylinder);
            
            const lineObj = {
                type: 'line',
                name: name,
                point: { ...point1.coords },
                direction: direction,
                sourcePoints: [pointId1, pointId2],
                mesh: cylinder,
                id: generateLineId()
            };
            
            // Add bidirectional link: point -> line
            [point1, point2].forEach(point => {
                if (point.connectedLines) {
                    point.connectedLines.push(lineObj.id);
                    // Change point color to gray (connected)
                    if (point.mesh) {
                        point.mesh.material.color.setHex(0x666666);
                    }
                }
            });
            
            // Auto-link line to planes that contain both points (this should happen automatically since this function is called for plane lines)
            AppState.objects.forEach(plane => {
                if (plane.type === 'plane' && plane.sourcePoints) {
                    const containsPoint1 = plane.sourcePoints.includes(pointId1);
                    const containsPoint2 = plane.sourcePoints.includes(pointId2);
                    
                    if (containsPoint1 && containsPoint2) {
                        // Both points are in this plane - link line to plane
                        if (!plane.connectedLines) {
                            plane.connectedLines = [];
                        }
                        if (!plane.connectedLines.includes(lineObj.id)) {
                            plane.connectedLines.push(lineObj.id);
                        }
                    }
                }
            });
            
            AppState.objects.push(lineObj);
            return lineObj;

        function updateObjectPosition(objectId, mesh) {

            const threePos = mesh.position;

            // Update object data based on type
            if (obj.type === 'point') {
                obj.coords = mathPos;
            } else if (obj.type === 'line') {
                // Update line's base point
                obj.point = mathPos;
            } else if (obj.type === 'plane') {
                // Update plane's base point
                obj.point = mathPos;
            } else if (obj.type === 'vector') {
                // Move both start and end points
                const offset = {
                    x: mathPos.x - obj.start.x,
                    y: mathPos.y - obj.start.y,
                    z: mathPos.z - obj.start.z
                };
                obj.start = mathPos;
                obj.end = {
                    x: obj.end.x + offset.x,
                    y: obj.end.y + offset.y,
                    z: obj.end.z + offset.z
                };
            }
            
            // Update UI
            updateObjectsList();
        }

        function updatePointCoordinatesDisplay(pointId, coords) {
            const pointAccordion = document.querySelector(`.object-accordion[data-id="${pointId}"]`);
            if (pointAccordion && pointAccordion.classList.contains('expanded')) {
                const coordsText = pointAccordion.querySelector('.coords-text');
                if (coordsText) {
                    const formattedCoords = `${coords.x.toFixed(1)}, ${coords.y.toFixed(1)}, ${coords.z.toFixed(1)}`;
                    coordsText.textContent = `(${formattedCoords})`;
                }
                
                // Also update input values if editor is open
                const coordInputs = pointAccordion.querySelectorAll('.coord-input');
                if (coordInputs.length > 0) {
                    coordInputs.forEach(input => {
                        const coord = input.dataset.coord;
                        input.value = coords[coord].toFixed(1);
                    });
                }
            }
        }

        function updatePointCoordinates(pointId, newCoords) {
            const point = AppState.objects.find(obj => obj.id === pointId && obj.type === 'point');
            if (!point) return;
            
            // Save to history before making changes
            saveToHistory();
            
            // Update point coordinates
            point.coords = { ...newCoords };
            
            // Update point mesh position
            const newThreePos = mathToThree(point.coords);
            point.mesh.position.copy(newThreePos);
            
            // Update connected lines
            if (point.connectedLines && point.connectedLines.length > 0) {
                point.connectedLines.forEach(lineId => {
                    const line = AppState.objects.find(l => l.id === lineId);
                    if (line && line.type === 'line' && line.sourcePoints && line.sourcePoints.length >= 2) {
                        const point1 = AppState.objects.find(p => p.id === line.sourcePoints[0]);
                        const point2 = AppState.objects.find(p => p.id === line.sourcePoints[1]);
                        
                        if (point1 && point2) {
                            // Update line's base point and direction
                            line.point = { ...point1.coords };
                            line.direction = {
                                x: point2.coords.x - point1.coords.x,
                                y: point2.coords.y - point1.coords.y,
                                z: point2.coords.z - point1.coords.z
                            };
                            
                            // Rebuild line mesh
                            rebuildLineMesh(line);
                            
                            // Update vizGroup if exists
                            if (line.vizGroup && line.visualizing) {
                                let savedTValue = null;
                                if (line.vizGroup.userData.sphere && line.vizGroup.userData.sphere.userData) {
                                    savedTValue = line.vizGroup.userData.sphere.userData.tValue;
                                }
                                hideVisualization(line);
                                showLineParameterVisualization(line, savedTValue);
                            }
                        }
                    }
                });
            }
            
            // Update connected planes
            if (point.connectedPlanes && point.connectedPlanes.length > 0) {
                point.connectedPlanes.forEach(planeId => {
                    const plane = AppState.objects.find(pl => pl.id === planeId);
                    if (plane && plane.type === 'plane' && plane.sourcePoints && plane.sourcePoints.length >= 3) {
                        const point1 = AppState.objects.find(p => p.id === plane.sourcePoints[0]);
                        const point2 = AppState.objects.find(p => p.id === plane.sourcePoints[1]);
                        const point3 = AppState.objects.find(p => p.id === plane.sourcePoints[2]);
                        
                        if (point1 && point2 && point3) {
                            // Update base point
                            plane.point = { ...point1.coords };
                            
                            // Recalculate plane vectors
                            plane.v1 = {
                                x: point2.coords.x - point1.coords.x,
                                y: point2.coords.y - point1.coords.y,
                                z: point2.coords.z - point1.coords.z
                            };
                            
                            plane.v2 = {
                                x: point3.coords.x - point1.coords.x,
                                y: point3.coords.y - point1.coords.y,
                                z: point3.coords.z - point1.coords.z
                            };
                            
                            // Recalculate normal vector
                            plane.normal = {
                                x: plane.v1.y * plane.v2.z - plane.v1.z * plane.v2.y,
                                y: plane.v1.z * plane.v2.x - plane.v1.x * plane.v2.z,
                                z: plane.v1.x * plane.v2.y - plane.v1.y * plane.v2.x
                            };
                            
                            // Update plane mesh
                            const threeP1 = mathToThree(point1.coords);
                            const threeP2 = mathToThree(point2.coords);
                            const threeP3 = mathToThree(point3.coords);
                            const center = new THREE.Vector3().addVectors(threeP1, threeP2).add(threeP3).divideScalar(3);
                            
                            plane.mesh.position.copy(center);
                            // ИСПРАВЛЕНО: Правильное вычисление lookAt с Three.js координатами
                            const normalThree = mathToThree(plane.normal);
                            plane.mesh.lookAt(center.clone().add(normalThree));
                            
                            // Update stored center
                            if (plane.center) {
                                plane.center.copy(center);
                            }
                            
                            // Update connected lines of the plane
                            if (plane.connectedLines && plane.connectedLines.length > 0) {
                                plane.connectedLines.forEach(lineId => {
                                    const line = AppState.objects.find(l => l.id === lineId);
                                    if (line && line.type === 'line' && line.sourcePoints && line.sourcePoints.length >= 2) {
                                        const linePoint1 = AppState.objects.find(p => p.id === line.sourcePoints[0]);
                                        const linePoint2 = AppState.objects.find(p => p.id === line.sourcePoints[1]);
                                        
                                        if (linePoint1 && linePoint2) {
                                            line.point = { ...linePoint1.coords };
                                            line.direction = {
                                                x: linePoint2.coords.x - linePoint1.coords.x,
                                                y: linePoint2.coords.y - linePoint1.coords.y,
                                                z: linePoint2.coords.z - linePoint1.coords.z
                                            };
                                            rebuildLineMesh(line);
                                        }
                                    }
                                });
                            }
                            
                            // Update connected vectors of the plane
                            if (plane.connectedVectors && plane.connectedVectors.length > 0) {
                                plane.connectedVectors.forEach(vectorId => {
                                    const vector = AppState.objects.find(v => v.id === vectorId);
                                    if (vector && vector.type === 'vector' && vector.sourcePoints && vector.sourcePoints.length >= 2) {
                                        const startPoint = AppState.objects.find(p => p.id === vector.sourcePoints[0]);
                                        const endPoint = AppState.objects.find(p => p.id === vector.sourcePoints[1]);
                                        
                                        if (startPoint && endPoint) {
                                            vector.start = { ...startPoint.coords };
                                            vector.end = { ...endPoint.coords };
                                            rebuildVectorMesh(vector);
                                        }
                                    }
                                });
                            }
                        }
                    }
                });
            }
            
            // Update connected vectors
            if (point.connectedVectors && point.connectedVectors.length > 0) {
                point.connectedVectors.forEach(vectorId => {
                    const vector = AppState.objects.find(v => v.id === vectorId);
                    if (vector && vector.type === 'vector' && vector.sourcePoints && vector.sourcePoints.length >= 2) {
                        const startPoint = AppState.objects.find(p => p.id === vector.sourcePoints[0]);
                        const endPoint = AppState.objects.find(p => p.id === vector.sourcePoints[1]);
                        
                        if (startPoint && endPoint) {
                            vector.start = { ...startPoint.coords };
                            vector.end = { ...endPoint.coords };
                            rebuildVectorMesh(vector);
                        }
                    }
                });
            }
            
            // Update object list to refresh coordinates display
            updateObjectsList();
            updateInfoPanel(`Координаты точки ${point.name} обновлены`);
        }

        function recreateObjectFromData(objData) {
            switch(objData.type) {
                case 'point':
                    recreatePoint(objData);
                    break;
                case 'line':
                    recreateLine(objData);
                    break;
                case 'plane':
                    recreatePlane(objData);
                    break;
                case 'vector':
                    recreateVector(objData);
                    break;
            }
        }

        function recreatePoint(data) {
            const geometry = new THREE.SphereGeometry(0.15, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.position.copy(mathToThree(data.coords));
            scene.add(sphere);
            
            AppState.objects.push({
                type: 'point',
                name: data.name,
                coords: data.coords,
                mesh: sphere,
                id: data.id,
                connectedLines: data.connectedLines || []
            });
            
            // Restore point color if connected
            if (data.connectedLines && data.connectedLines.length > 0) {
                sphere.material.color.setHex(0x666666);
            }
        }

        function recreateLine(data) {
            const threeP1 = mathToThree(data.point);
            const direction = data.direction;
            const mathP2 = {
                x: data.point.x + direction.x,
                y: data.point.y + direction.y,
                z: data.point.z + direction.z
            };
            const threeP2 = mathToThree(mathP2);
            
            // Create line as thick cylinder
            const extendFactor = 5;
            const dir = new THREE.Vector3().subVectors(threeP2, threeP1).normalize();
            const startPoint = threeP1.clone().sub(dir.clone().multiplyScalar(extendFactor));
            const endPoint = threeP2.clone().add(dir.clone().multiplyScalar(extendFactor));
            const length = startPoint.distanceTo(endPoint);
            
            const geometry = new THREE.CylinderGeometry(0.025, 0.025, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            const midPoint = new THREE.Vector3().addVectors(startPoint, endPoint).multiplyScalar(0.5);
            cylinder.position.copy(midPoint);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            
            scene.add(cylinder);
            
            AppState.objects.push({
                type: 'line',
                name: data.name,
                point: data.point,
                direction: data.direction,
                mesh: cylinder,
                id: data.id,
                sourcePoints: data.sourcePoints || []
            });
            
            // Restore links to planes that contain both line points
            if (data.sourcePoints && data.sourcePoints.length >= 2) {
                AppState.objects.forEach(plane => {
                    if (plane.type === 'plane' && plane.sourcePoints) {
                        const containsPoint1 = plane.sourcePoints.includes(data.sourcePoints[0]);
                        const containsPoint2 = plane.sourcePoints.includes(data.sourcePoints[1]);
                        
                        if (containsPoint1 && containsPoint2) {
                            // Both points are in this plane - restore link to plane
                            if (!plane.connectedLines) {
                                plane.connectedLines = [];
                            }
                            if (!plane.connectedLines.includes(data.id)) {
                                plane.connectedLines.push(data.id);
                            }
                        }
                    }
                });
            }
        }

        function recreatePlane(data) {
            const threeP1 = mathToThree(data.point);
            const size = 8;
            const planeGeometry = new THREE.PlaneGeometry(size, size);
            
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x64b5f6, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const plane = new THREE.Mesh(planeGeometry, material);
            plane.position.copy(threeP1);
            plane.lookAt(threeP1.clone().add(mathToThree(data.normal)));
            
            scene.add(plane);
            
            AppState.objects.push({
                type: 'plane',
                name: data.name,
                point: data.point,
                normal: data.normal,
                mesh: plane,
                id: data.id,
                sourcePoints: data.sourcePoints || [],
                v1: data.v1,
                v2: data.v2,
                connectedLines: data.connectedLines || [],
                connectedVectors: data.connectedVectors || [],
                showingLines: data.showingLines || false
            });
        }

        function recreateVector(data) {
            const threeStart = mathToThree(data.start);
            const threeEnd = mathToThree(data.end);
            const direction = new THREE.Vector3().subVectors(threeEnd, threeStart);
            const length = direction.length();
            direction.normalize();
            
            const group = new THREE.Group();
            
            const shaftLength = length - 0.4;
            const shaftGeometry = new THREE.CylinderGeometry(0.04, 0.04, shaftLength, 8);
            const shaftMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
            const shaft = new THREE.Mesh(shaftGeometry, shaftMaterial);
            shaft.position.y = shaftLength / 2;
            group.add(shaft);
            
            const headGeometry = new THREE.ConeGeometry(0.09, 0.3, 12);
            const headMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = shaftLength + 0.15;
            group.add(head);
            
            group.position.copy(threeStart);
            group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
            
            scene.add(group);
            
            AppState.objects.push({
                type: 'vector',
                name: data.name,
                start: data.start,
                end: data.end,
                sourcePoints: data.sourcePoints || [],
                mesh: group,
                id: data.id
            });
            
            if (data.sourcePoints) {
                data.sourcePoints.forEach(pointId => {
                    const point = AppState.objects.find(p => p.id === pointId);
                    if (point) {
                        if (!point.connectedVectors) {
                            point.connectedVectors = [];
                        }
                        point.connectedVectors.push(data.id);
                    }
                });
                
                // Restore links to planes that contain both vector points
                AppState.objects.forEach(plane => {
                    if (plane.type === 'plane' && plane.sourcePoints) {
                        const containsStart = plane.sourcePoints.includes(data.sourcePoints[0]);
                        const containsEnd = plane.sourcePoints.includes(data.sourcePoints[1]);
                        
                        if (containsStart && containsEnd) {
                            // Both points are in this plane - restore link to plane
                            if (!plane.connectedVectors) {
                                plane.connectedVectors = [];
                            }
                            if (!plane.connectedVectors.includes(data.id)) {
                                plane.connectedVectors.push(data.id);
                            }
                        }
                    }
                });
            }
        }

        function handleCanvasClick(event) {
            // Ignore click if we just finished dragging
            if (wasDragging) {
                return;
            }
            
            // Check if clicking on an object in select mode
            if (AppState.currentTool === 'select') {
                getMousePosition(event);
                raycaster.setFromCamera(mouse, camera);
                
                // Collect all meshes from objects (including children for ArrowHelper)
                // EXCLUDE vizGroup elements (orange spheres, vectors) - they are for visualization only
                const clickableObjects = [];
                AppState.objects.forEach(obj => {
                    if (obj.mesh) {
                        if (obj.type === 'vector') {
                            // Vector has children (shaft and head)
                            obj.mesh.children.forEach(child => {
                                clickableObjects.push({ mesh: child, objId: obj.id });
                            });
                        } else {
                            clickableObjects.push({ mesh: obj.mesh, objId: obj.id });
                        }
                    }
                });
                
                const meshes = clickableObjects.map(item => item.mesh);
                
                // Perform raycast but filter out vizGroup children
                const allIntersects = raycaster.intersectObjects(meshes, true);
                const intersects = allIntersects.filter(hit => {
                    // Exclude objects that are part of vizGroup
                    let obj = hit.object;
                    while (obj) {
                        if (obj.name === 'lineViz') return false;
                        obj = obj.parent;
                    }
                    return true;
                });
                
                if (intersects.length > 0) {
                    const clickedMesh = intersects[0].object;
                    const clickedItem = clickableObjects.find(item => item.mesh === clickedMesh);
                    const clickPoint = intersects[0].point; // Point where user clicked in 3D space
                    
                    if (clickedItem) {
                        selectObject(clickedItem.objId, clickPoint);
                        const obj = AppState.objects.find(o => o.id === clickedItem.objId);
                        if (obj) {
                            updateInfoPanel(`Выбран объект: ${obj.name} (используйте стрелки для перемещения)`);
                        }
                        return;
                    }
                } else {
                    // Clicked on empty space - deselect
                    deselectObject();
                    updateInfoPanel('Выбор снят');
                    return;
                }
            }
            
            // For line, vector, and plane creation - MUST click on existing point
            if (['line', 'vector', 'plane'].includes(AppState.currentTool)) {
                getMousePosition(event);
                raycaster.setFromCamera(mouse, camera);
                
                // Check if clicking on a point
                const points = AppState.objects.filter(obj => obj.type === 'point');
                const pointMeshes = points.map(p => p.mesh);
                const intersects = raycaster.intersectObjects(pointMeshes, false);
                
                if (intersects.length > 0) {
                    // Clicked on existing point - use its coordinates
                    const clickedMesh = intersects[0].object;
                    const clickedPoint = points.find(p => p.mesh === clickedMesh);
                    
                    if (clickedPoint) {
                        // Pass point ID to handler
                        switch(AppState.currentTool) {
                            case 'line':
                                handleLineCreation(clickedPoint.id);
                                return;
                            case 'vector':
                                handleVectorCreation(clickedPoint.id);
                                return;
                            case 'plane':
                                handlePlaneCreation(clickedPoint.id);  // Changed: pass ID instead of coords
                                return;
                        }
                    }
                } else {
                    // Clicked on empty space - show warning
                    if (AppState.currentTool === 'line') {
                        updateInfoPanel('⚠️ Кликните на существующую точку для создания прямой');
                    } else if (AppState.currentTool === 'plane') {
                        updateInfoPanel('⚠️ Кликните на существующую точку для создания плоскости');
                    } else if (AppState.currentTool === 'vector') {
                        updateInfoPanel('⚠️ Кликните на существующую точку для создания вектора');
                    }
                    return;
                }
            }
            
            // Create new objects - ONLY POINT can be created by clicking in space
            const mathPoint = raycastToPlane(event);
            if (!mathPoint) return;
            
            switch(AppState.currentTool) {
                case 'point':
                    saveToHistory();
                    createPoint(mathPoint);
                    break;
                // line, plane, vector can ONLY be created via existing points
            }
        }

        // OBJECT CREATION
        function createPoint(mathCoords) {
            const name = String.fromCharCode(AppState.nextNames.point++);
            
            const geometry = new THREE.SphereGeometry(0.15, 16, 16);
            const material = new THREE.MeshBasicMaterial({ color: 0x1976d2 });
            const sphere = new THREE.Mesh(geometry, material);
            
            const threePos = mathToThree(mathCoords);
            sphere.position.copy(threePos);
            
            scene.add(sphere);
            
            const pointObj = {
                type: 'point',
                name: name,
                coords: mathCoords,
                mesh: sphere,
                connectedLines: [],  // Array of line IDs that use this point
                id: Date.now()
            };
            
            AppState.objects.push(pointObj);
            updateObjectsList();
            updateInfoPanel(`Создана точка ${name} (${formatCoords(mathCoords)})`);
        }

        function handleLineCreation(pointId) {
            AppState.tempPoints.push(pointId);
            
            // Change point color to light gray (captured)
            const point = AppState.objects.find(p => p.id === pointId);
            if (point && point.mesh) {
                point.mesh.material.color.setHex(0xcccccc);
            }
            
            // Update UI to show active button
            updateObjectsList();
            
            if (AppState.tempPoints.length === 1) {
                updateInfoPanel('Укажите вторую точку для создания прямой');
            } else if (AppState.tempPoints.length === 2) {
                saveToHistory();
                // Get actual point objects
                const point1 = AppState.objects.find(p => p.id === AppState.tempPoints[0]);
                const point2 = AppState.objects.find(p => p.id === AppState.tempPoints[1]);
                
                if (point1 && point2) {
                    createLineFromPoints(point1.id, point2.id);
                }
                
                // Clear tempPoints and reset colors after 2 seconds
                const tempPointsCopy = [...AppState.tempPoints];
                AppState.tempPoints = [];
                
                setTimeout(() => {
                    tempPointsCopy.forEach(pid => {
                        const pt = AppState.objects.find(p => p.id === pid);
                        if (pt && pt.mesh) {
                            // Restore color based on whether point is connected to lines
                            if (pt.connectedLines && pt.connectedLines.length > 0) {
                                pt.mesh.material.color.setHex(0x666666); // Gray for connected
                            } else {
                                pt.mesh.material.color.setHex(0x1976d2); // Blue for free
                            }
                        }
                    });
                    updateObjectsList();
                }, 2000);
            }
        }

        function createLineFromPoints(pointId1, pointId2) {
            const point1 = AppState.objects.find(p => p.id === pointId1);
            const point2 = AppState.objects.find(p => p.id === pointId2);
            
            if (!point1 || !point2) return;
            
            const name = `l${toSubscript(AppState.nextNames.line++)}`;
            
            const direction = {
                x: point2.coords.x - point1.coords.x,
                y: point2.coords.y - point1.coords.y,
                z: point2.coords.z - point1.coords.z
            };
            
            const threeP1 = mathToThree(point1.coords);
            const threeP2 = mathToThree(point2.coords);
            
            // Create line as thick cylinder
            const extendFactor = 5;
            const dir = new THREE.Vector3().subVectors(threeP2, threeP1).normalize();
            const startPoint = threeP1.clone().sub(dir.clone().multiplyScalar(extendFactor));
            const endPoint = threeP2.clone().add(dir.clone().multiplyScalar(extendFactor));
            const length = startPoint.distanceTo(endPoint);
            
            const geometry = new THREE.CylinderGeometry(0.025, 0.025, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            // Position and orient cylinder
            const midPoint = new THREE.Vector3().addVectors(startPoint, endPoint).multiplyScalar(0.5);
            cylinder.position.copy(midPoint);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            
            scene.add(cylinder);
            
            const lineObj = {
                type: 'line',
                name: name,
                point: { ...point1.coords },  // Copy of first point coords
                direction: direction,
                sourcePoints: [pointId1, pointId2],  // Store IDs directly
                mesh: cylinder,
                id: generateLineId()
            };
            
            // Add bidirectional link: point -> line
            [point1, point2].forEach(point => {
                if (point.connectedLines) {
                    point.connectedLines.push(lineObj.id);
                    // Change point color to gray (connected)
                    if (point.mesh) {
                        point.mesh.material.color.setHex(0x666666);
                    }
                }
            });
            
            // Auto-link line to planes that contain both points
            AppState.objects.forEach(plane => {
                if (plane.type === 'plane' && plane.sourcePoints) {
                    const containsPoint1 = plane.sourcePoints.includes(pointId1);
                    const containsPoint2 = plane.sourcePoints.includes(pointId2);
                    
                    if (containsPoint1 && containsPoint2) {
                        // Both points are in this plane - link line to plane
                        if (!plane.connectedLines) {
                            plane.connectedLines = [];
                        }
                        plane.connectedLines.push(lineObj.id);
                        
                        // If plane is currently showing lines, make this line visible immediately
                        if (plane.showingLines && lineObj.mesh) {
                            lineObj.mesh.visible = true;
                        }
                    }
                }
            });
            
            AppState.objects.push(lineObj);
            updateObjectsList();
            updateInfoPanel(`Создана прямая ${name}`);
            
            // DON'T switch to select tool - keep line tool active for creating more lines
        }

        function createLine(mathPoint1, mathPoint2) {
            const name = `l${toSubscript(AppState.nextNames.line++)}`;
            
            const direction = {
                x: mathPoint2.x - mathPoint1.x,
                y: mathPoint2.y - mathPoint1.y,
                z: mathPoint2.z - mathPoint1.z
            };
            
            const threeP1 = mathToThree(mathPoint1);
            const threeP2 = mathToThree(mathPoint2);
            
            // Create line as thick cylinder
            const extendFactor = 5;
            const dir = new THREE.Vector3().subVectors(threeP2, threeP1).normalize();
            const startPoint = threeP1.clone().sub(dir.clone().multiplyScalar(extendFactor));
            const endPoint = threeP2.clone().add(dir.clone().multiplyScalar(extendFactor));
            const length = startPoint.distanceTo(endPoint);
            
            const geometry = new THREE.CylinderGeometry(0.025, 0.025, length, 8);
            const material = new THREE.MeshBasicMaterial({ color: 0x333333 });
            const cylinder = new THREE.Mesh(geometry, material);
            
            // Position and orient cylinder
            const midPoint = new THREE.Vector3().addVectors(startPoint, endPoint).multiplyScalar(0.5);
            cylinder.position.copy(midPoint);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            
            scene.add(cylinder);
            
            // Find source points if they exist and create bidirectional links
            const sourcePoints = [];
            AppState.objects.forEach(obj => {
                if (obj.type === 'point') {
                    const dist1 = Math.sqrt(
                        Math.pow(obj.coords.x - mathPoint1.x, 2) +
                        Math.pow(obj.coords.y - mathPoint1.y, 2) +
                        Math.pow(obj.coords.z - mathPoint1.z, 2)
                    );
                    const dist2 = Math.sqrt(
                        Math.pow(obj.coords.x - mathPoint2.x, 2) +
                        Math.pow(obj.coords.y - mathPoint2.y, 2) +
                        Math.pow(obj.coords.z - mathPoint2.z, 2)
                    );
                    if (dist1 < 0.01 || dist2 < 0.01) {
                        sourcePoints.push(obj.id);
                    }
                }
            });
            
            const lineObj = {
                type: 'line',
                name: name,
                point: mathPoint1,
                direction: direction,
                sourcePoints: sourcePoints,  // Store IDs of source points
                mesh: cylinder,
                id: generateLineId()
            };
            
            // Add bidirectional link: point -> line
            sourcePoints.forEach(pointId => {
                const point = AppState.objects.find(p => p.id === pointId);
                if (point && point.connectedLines) {
                    point.connectedLines.push(lineObj.id);
                    // Change point color to gray (connected)
                    if (point.mesh) {
                        point.mesh.material.color.setHex(0x666666);
                    }
                }
            });
            
            // Auto-link line to planes that contain both source points
            if (sourcePoints.length >= 2) {
                AppState.objects.forEach(plane => {
                    if (plane.type === 'plane' && plane.sourcePoints) {
                        const containsPoint1 = plane.sourcePoints.includes(sourcePoints[0]);
                        const containsPoint2 = plane.sourcePoints.includes(sourcePoints[1]);
                        
                        if (containsPoint1 && containsPoint2) {
                            // Both points are in this plane - link line to plane
                            if (!plane.connectedLines) {
                                plane.connectedLines = [];
                            }
                            plane.connectedLines.push(lineObj.id);
                            
                            // If plane is currently showing lines, make this line visible immediately
                            if (plane.showingLines && lineObj.mesh) {
                                lineObj.mesh.visible = true;
                            }
                        }
                    }
                });
            }
            
            AppState.objects.push(lineObj);
            updateObjectsList();
            updateInfoPanel(`Создана прямая ${name}`);
        }

        function createPlane(pointId1, pointId2, pointId3) {
            // Get points by ID
            const point1 = AppState.objects.find(p => p.id === pointId1);
            const point2 = AppState.objects.find(p => p.id === pointId2);
            const point3 = AppState.objects.find(p => p.id === pointId3);
            
            if (!point1 || !point2 || !point3) {
                updateInfoPanel('Ошибка: точки не найдены');
                return;
            }
            
            const mathP1 = point1.coords;
            const mathP2 = point2.coords;
            const mathP3 = point3.coords;
            
            const name = `π${toSubscript(AppState.nextNames.plane++)}`;
            
            const v1 = { x: mathP2.x - mathP1.x, y: mathP2.y - mathP1.y, z: mathP2.z - mathP1.z };
            const v2 = { x: mathP3.x - mathP1.x, y: mathP3.y - mathP1.y, z: mathP3.z - mathP1.z };
            
            const normal = {
                x: v1.y * v2.z - v1.z * v2.y,
                y: v1.z * v2.x - v1.x * v2.z,
                z: v1.x * v2.y - v1.y * v2.x
            };
            
            const threeP1 = mathToThree(mathP1);
            const threeP2 = mathToThree(mathP2);
            const threeP3 = mathToThree(mathP3);
            
            const size = 8;
            const center = new THREE.Vector3().addVectors(threeP1, threeP2).add(threeP3).divideScalar(3);
            const planeGeometry = new THREE.PlaneGeometry(size, size);
            
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x64b5f6, 
                transparent: true, 
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const plane = new THREE.Mesh(planeGeometry, material);
            plane.position.copy(center);
            plane.lookAt(center.clone().add(mathToThree(normal)));
            
            scene.add(plane);
            
            const planeObj = {
                type: 'plane',
                name: name,
                point: mathP1,
                normal: normal,
                mesh: plane,
                center: center.clone(),  // Store center for updates
                id: Date.now(),
                sourcePoints: [pointId1, pointId2, pointId3],  // Store source points
                v1: v1,  // Store base vectors for updates
                v2: v2,
                connectedLines: [],  // Lines connected to this plane (A-B and A-C)
                showingLines: false  // Toggle state for showing lines
            };
            
            // Add this plane to each point's connectedPlanes
            [point1, point2, point3].forEach(pt => {
                if (!pt.connectedPlanes) {
                    pt.connectedPlanes = [];
                }
                pt.connectedPlanes.push(planeObj.id);
            });
            
            AppState.objects.push(planeObj);
            updateObjectsList();
            updateInfoPanel(`Создана плоскость ${name}`);
        }

        function createVectorFromPoints(startPointId, endPointId) {
            const startPoint = AppState.objects.find(p => p.id === startPointId);
            const endPoint = AppState.objects.find(p => p.id === endPointId);
            
            if (!startPoint || !endPoint) return;
            
            const name = generateVectorName();
            
            const threeStart = mathToThree(startPoint.coords);
            const threeEnd = mathToThree(endPoint.coords);
            const direction = new THREE.Vector3().subVectors(threeEnd, threeStart);
            const length = direction.length();
            direction.normalize();
            
            const group = new THREE.Group();
            
            const shaftLength = length - 0.4;
            const shaftGeometry = new THREE.CylinderGeometry(0.04, 0.04, shaftLength, 8);
            const shaftMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
            const shaft = new THREE.Mesh(shaftGeometry, shaftMaterial);
            shaft.position.y = shaftLength / 2;
            group.add(shaft);
            
            const headGeometry = new THREE.ConeGeometry(0.09, 0.3, 12);
            const headMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = shaftLength + 0.15;
            group.add(head);
            
            group.position.copy(threeStart);
            group.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
            
            scene.add(group);
            
            const vectorObj = {
                type: 'vector',
                name: name,
                start: { ...startPoint.coords },
                end: { ...endPoint.coords },
                sourcePoints: [startPointId, endPointId],
                mesh: group,
                id: Date.now()
            };
            
            [startPoint, endPoint].forEach(point => {
                if (!point.connectedVectors) {
                    point.connectedVectors = [];
                }
                point.connectedVectors.push(vectorObj.id);
                console.log('🔗 Vector', vectorObj.name, 'connected to point', point.name, '- total connected vectors:', point.connectedVectors.length);
                
                if (point.mesh) {
                    point.mesh.material.color.setHex(0x666666);
                }
            });
            
            // Link vector to planes that contain both points
            AppState.objects.forEach(plane => {
                if (plane.type === 'plane' && plane.sourcePoints) {
                    const containsStart = plane.sourcePoints.includes(startPointId);
                    const containsEnd = plane.sourcePoints.includes(endPointId);
                    
                    if (containsStart && containsEnd) {
                        // Both points are in this plane - link vector to plane
                        if (!plane.connectedVectors) {
                            plane.connectedVectors = [];
                        }
                        plane.connectedVectors.push(vectorObj.id);
                    }
                }
            });
            
            AppState.objects.push(vectorObj);
            updateObjectsList();
            updateInfoPanel(`Создан вектор ${name}`);
        }

        function formatCoords(coords) {
            return `${coords.x.toFixed(1)}, ${coords.y.toFixed(1)}, ${coords.z.toFixed(1)}`;
        }
        
        // Format number for equations: replace "+ -x" with "- x"
        function formatNumber(num) {
            const formatted = num.toFixed(1);
            return formatted;
        }
        
        // Format term in equation: handles "x + -2" -> "x - 2" and "x - -2" -> "x + 2"
        function formatTerm(baseValue, coefficient, variable = 't') {
            const base = baseValue.toFixed(1);
            const coef = parseFloat(coefficient.toFixed(1));
            
            if (coef >= 0) {
                return `${base} + ${Math.abs(coef).toFixed(1)}${variable}`;
            } else {
                // Negative coefficient: use minus sign instead of "+ -"
                return `${base} - ${Math.abs(coef).toFixed(1)}${variable}`;
            }
        }
        
        // Format numerator for canonical equation: handles "x - -2" -> "x + 2"
        function formatCanonicalNumerator(variable, pointCoord) {
            const coord = parseFloat(pointCoord.toFixed(1));
            
            if (coord >= 0) {
                // Positive: x - 2.4
                return `${variable} - ${coord.toFixed(1)}`;
            } else {
                // Negative: x - (-2.4) -> x + 2.4
                return `${variable} + ${Math.abs(coord).toFixed(1)}`;
            }
        }

                case 'line':
                    return `
                        <div class="detail-row">
                            <div class="detail-label">Векторное уравнение:</div>
                            <div class="katex-equation" data-eq-type="line-vec"></div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Параметрическое уравнение:</div>
                            <div class="katex-equation-param" data-eq-type="line-param"></div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Каноническое уравнение:</div>
                            <div class="katex-equation-canon" data-eq-type="line-canon"></div>
                        </div>
                    `;
                
                case 'plane':
                    return `
                        <div class="detail-row">
                            <div class="detail-label">Точка на плоскости:</div>
                            <div class="detail-value">(${formatCoords(obj.point)})</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Нормальный вектор:</div>
                            <div class="detail-value">(${formatCoords(obj.normal)})</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Общее уравнение:</div>
                            <div class="katex-equation-general" data-eq-type="plane-general"></div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Векторное уравнение:</div>
                            <div class="katex-equation-vector" data-eq-type="plane-vector"></div>
                        </div>
                    `;
                
                case 'vector':
                    // Vector equations will be rendered by KaTeX
                    return `
                        <div class="equation-row">
                            <div data-eq-type="vector-eq"></div>
                        </div>
                        <div class="equation-row">
                            <div data-eq-type="vector-magnitude"></div>
                        </div>
                    `;
            }
        }
        
        function renderEquations(obj, container) {
            if (obj.type === 'line') {
                const lineEqVec = `\\underline{r} = (${obj.point.x.toFixed(1)}, ${obj.point.y.toFixed(1)}, ${obj.point.z.toFixed(1)}) + t(${obj.direction.x.toFixed(1)}, ${obj.direction.y.toFixed(1)}, ${obj.direction.z.toFixed(1)})`;
                
                // Format parametric equation with proper signs
                const xEq = formatTerm(obj.point.x, obj.direction.x, 't');
                const yEq = formatTerm(obj.point.y, obj.direction.y, 't');
                const zEq = formatTerm(obj.point.z, obj.direction.z, 't');
                const lineEqParam = `\\begin{cases} x = ${xEq} \\\\ y = ${yEq} \\\\ z = ${zEq} \\end{cases}`;
                
                // Format canonical equation with proper signs in numerator
                const xNumerator = formatCanonicalNumerator('x', obj.point.x);
                const yNumerator = formatCanonicalNumerator('y', obj.point.y);
                const zNumerator = formatCanonicalNumerator('z', obj.point.z);
                
                const lineEqCanon = obj.direction.x !== 0 && obj.direction.y !== 0 && obj.direction.z !== 0 
                    ? `\\frac{${xNumerator}}{${obj.direction.x.toFixed(1)}} = \\frac{${yNumerator}}{${obj.direction.y.toFixed(1)}} = \\frac{${zNumerator}}{${obj.direction.z.toFixed(1)}}`
                    : null;
                
                const vecEl = container.querySelector('[data-eq-type="line-vec"]');
                const paramEl = container.querySelector('[data-eq-type="line-param"]');
                const canonEl = container.querySelector('[data-eq-type="line-canon"]');
                
                if (vecEl) katex.render(lineEqVec, vecEl, { throwOnError: false });
                if (paramEl) katex.render(lineEqParam, paramEl, { throwOnError: false, displayMode: true });
                if (canonEl) {
                    if (lineEqCanon) {
                        katex.render(lineEqCanon, canonEl, { throwOnError: false });
                    } else {
                        canonEl.textContent = 'Невозможно (нулевые компоненты вектора)';
                        canonEl.style.fontFamily = 'inherit';
                        canonEl.style.fontSize = '12px';
                        canonEl.style.color = '#999';
                    }
                }
            } else if (obj.type === 'plane') {
                const a = parseFloat(obj.normal.x.toFixed(1));
                const b = parseFloat(obj.normal.y.toFixed(1));
                const c = parseFloat(obj.normal.z.toFixed(1));
                const d = parseFloat((-(a * obj.point.x + b * obj.point.y + c * obj.point.z)).toFixed(1));
                
                // Format equation terms properly
                let planeEqGeneral = `${a.toFixed(1)}x`;
                
                // Add b term
                if (b >= 0) {
                    planeEqGeneral += ` + ${b.toFixed(1)}y`;
                } else {
                    planeEqGeneral += ` - ${Math.abs(b).toFixed(1)}y`;
                }
                
                // Add c term
                if (c >= 0) {
                    planeEqGeneral += ` + ${c.toFixed(1)}z`;
                } else {
                    planeEqGeneral += ` - ${Math.abs(c).toFixed(1)}z`;
                }
                
                // Add d term
                if (d >= 0) {
                    planeEqGeneral += ` + ${d.toFixed(1)}`;
                } else {
                    planeEqGeneral += ` - ${Math.abs(d).toFixed(1)}`;
                }
                
                planeEqGeneral += ` = 0`;
                
                const planeEqNormal = `(${a.toFixed(1)}, ${b.toFixed(1)}, ${c.toFixed(1)}) \\cdot ((x, y, z) - (${obj.point.x.toFixed(1)}, ${obj.point.y.toFixed(1)}, ${obj.point.z.toFixed(1)})) = 0`;
                
                const generalEl = container.querySelector('[data-eq-type="plane-general"]');
                const vectorEl = container.querySelector('[data-eq-type="plane-vector"]');
                
                if (generalEl) katex.render(planeEqGeneral, generalEl, { throwOnError: false });
                if (vectorEl) katex.render(planeEqNormal, vectorEl, { throwOnError: false });
                
                // Update point and normal coordinates in detail-value fields
                const detailRows = container.querySelectorAll('.detail-row');
                detailRows.forEach(row => {
                    const label = row.querySelector('.detail-label');
                    const value = row.querySelector('.detail-value');
                    if (label && value) {
                        if (label.textContent === 'Точка на плоскости:') {
                            value.textContent = `(${obj.point.x.toFixed(1)}, ${obj.point.y.toFixed(1)}, ${obj.point.z.toFixed(1)})`;
                        } else if (label.textContent === 'Нормальный вектор:') {
                            value.textContent = `(${obj.normal.x.toFixed(1)}, ${obj.normal.y.toFixed(1)}, ${obj.normal.z.toFixed(1)})`;
                        }
                    }
                });
            } else if (obj.type === 'vector') {
                // Calculate vector components
                const dx = obj.end.x - obj.start.x;
                const dy = obj.end.y - obj.start.y;
                const dz = obj.end.z - obj.start.z;
                const magnitude = Math.sqrt(dx*dx + dy*dy + dz*dz);
                
                // Render vector equation: AB = (dx, dy, dz)
                const vectorEq = `\\overrightarrow{${obj.name}} = (${dx.toFixed(1)}, ${dy.toFixed(1)}, ${dz.toFixed(1)})`;
                
                // Render magnitude equation: |AB| = magnitude
                const magnitudeEq = `|\\overrightarrow{${obj.name}}| = ${magnitude.toFixed(2)}`;
                
                const vectorEl = container.querySelector('[data-eq-type="vector-eq"]');
                const magnitudeEl = container.querySelector('[data-eq-type="vector-magnitude"]');
                
                if (vectorEl) katex.render(vectorEq, vectorEl, { throwOnError: false });
                if (magnitudeEl) katex.render(magnitudeEq, magnitudeEl, { throwOnError: false });
            }
        }

        // ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        // RESIZE HANDLER
        window.addEventListener('resize', () => {
            const container = canvas.parentElement;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        updateInfoPanel();

        // DEBUG: General click handler to see what's being clicked
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('viz-icon-btn')) {
                console.log('🎯 CLICK DETECTED on viz-icon-btn:', {
                    className: e.target.className,
                    dataset: e.target.dataset,
                    title: e.target.title,
                    parentElement: e.target.parentElement.className
                });
            }
        }, true); // Use capture phase
    </script>
