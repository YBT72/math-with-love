<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивные конические сечения</title>
    <!-- Basic styling to make the canvas fill the entire page -->
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #1a1a1a;
            color: white;
        }
        canvas {
            display: block;
        }
        /* UI container styling */
        .ui-container, .ui-container-top {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 20px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: center;
        }
        .ui-container {
            bottom: 20px;
        }
        .ui-container-top {
            top: 20px;
        }
        .ui-container-right {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 20px 15px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .ui-container-left {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            padding: 20px 15px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .ui-container label, .ui-container-right label, .ui-container-left label, .ui-container-top label {
            font-size: 16px;
            white-space: nowrap;
        }
        .ui-container input[type="range"], .ui-container-top input[type="range"] {
            width: 300px;
        }
        .ui-container-right input[type="range"], .ui-container-left input[type="range"] {
            -webkit-appearance: slider-vertical; /* For WebKit browsers */
            width: 8px;
            height: 300px;
        }
    </style>
</head>
<body>

    <!-- UI for controlling the angled plane's rotation -->
    <div class="ui-container-top">
       <label for="angledRotationSlider">Угол наклона:</label>
       <input type="range" id="angledRotationSlider" min="0" max="90" value="45" step="1">
       <span id="angledRotationValue">45°</span>
    </div>

    <!-- UI for controlling the slicing plane -->
    <div class="ui-container">
       <label for="planeSlider">Плоскость Z =</label>
       <input type="range" id="planeSlider" min="-9" max="9" value="0" step="0.1">
       <span id="sliderValue">0.0</span>
    </div>

    <!-- Vertical slider for the YZ plane -->
    <div class="ui-container-right">
       <label for="yzPlaneSlider">Плоскость X</label>
       <input type="range" id="yzPlaneSlider" min="-9" max="9" value="0" step="0.1" orient="vertical">
       <span id="yzSliderValue">0.0</span>
    </div>

    <!-- Vertical slider for the Angled plane -->
    <div class="ui-container-left">
       <label for="angledPlaneSlider">Наклонная пл.</label>
       <input type="range" id="angledPlaneSlider" min="-9" max="9" value="0" step="0.1" orient="vertical">
       <span id="angledSliderValue">0.0</span>
    </div>

    <!-- The 'importmap' allows us to use module imports directly in the browser -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.148.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // Import necessary modules from the Three.js library
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        // Declare variables
        let scene, camera, renderer, controls;
        let movingPlane, intersectionObject, yzPlane, yzIntersectionObject, angledPlane, angledIntersectionObject;
        const axisLength = 10;
        const angleDegrees = 25;
        const angleRadians = (angleDegrees * Math.PI) / 180;
        const tanAlpha = Math.tan(angleRadians);

        // State variables for the angled plane
        let angledPlaneXPos = 0;
        let angledPlaneYRotationDeg = 45;

        function init() {
            // --- SCENE AND CAMERA SETUP ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 10, 10);
            camera.lookAt(0, 0, 0);

            // --- RENDERER SETUP ---
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // --- CONTROLS ---
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // --- GRID ---
            const grid_size = 20;
            const grid_divisions = 20;
            const gridHelper = new THREE.GridHelper(grid_size, grid_divisions, 0x888888, 0x444444);
            scene.add(gridHelper);

            // --- YZ PLANE (User's coordinate system) ---
            const yzPlaneGeometry = new THREE.PlaneGeometry(axisLength * 2, axisLength * 2);
            const yzPlaneMaterial = new THREE.MeshBasicMaterial({
                color: 0xffff00, // Yellow for visibility
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.2
            });
            yzPlane = new THREE.Mesh(yzPlaneGeometry, yzPlaneMaterial);
            scene.add(yzPlane);

            // --- MOVING XY PLANE (White) ---
            const planeGeometry = new THREE.PlaneGeometry(grid_size, grid_size);
            const planeMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.15
            });
            movingPlane = new THREE.Mesh(planeGeometry, planeMaterial);
            movingPlane.rotation.x = -Math.PI / 2; // Make it horizontal
            scene.add(movingPlane);
            
            // --- ANGLED PLANE (Cyan) ---
            const angledPlaneGeometry = new THREE.PlaneGeometry(grid_size * 1.4, grid_size * 1.4);
            const angledPlaneMaterial = new THREE.MeshBasicMaterial({
                color: 0x00aaff, // A nice blue/cyan color
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.2
            });
            angledPlane = new THREE.Mesh(angledPlaneGeometry, angledPlaneMaterial);
            scene.add(angledPlane);

            // This group will hold the hyperbola intersection curve
            intersectionObject = new THREE.Group();
            scene.add(intersectionObject);

            // This group will hold the circle intersection curve
            yzIntersectionObject = new THREE.Group();
            scene.add(yzIntersectionObject);

            // This group will hold the angled intersection curve
            angledIntersectionObject = new THREE.Group();
            scene.add(angledIntersectionObject);

            // Create Axes (positive and negative)
            createAxes();

            // Create the Cone
            createCone();

            // Create Axes Labels
            createLabels();

            // --- UI SLIDER CONTROLS ---
            const slider = document.getElementById('planeSlider');
            const sliderValueDisplay = document.getElementById('sliderValue');
            const yzSlider = document.getElementById('yzPlaneSlider');
            const yzSliderValueDisplay = document.getElementById('yzSliderValue');
            const angledSlider = document.getElementById('angledPlaneSlider');
            const angledSliderValueDisplay = document.getElementById('angledSliderValue');
            const angledRotationSlider = document.getElementById('angledRotationSlider');
            const angledRotationValueDisplay = document.getElementById('angledRotationValue');

            slider.addEventListener('input', (event) => {
                const h = parseFloat(event.target.value);
                sliderValueDisplay.textContent = h.toFixed(1);
                updateIntersection(h);
            });
            
            yzSlider.addEventListener('input', (event) => {
                const x_pos = parseFloat(event.target.value);
                yzSliderValueDisplay.textContent = x_pos.toFixed(1);
                updateYzIntersection(x_pos);
            });
            
            angledSlider.addEventListener('input', (event) => {
                angledPlaneXPos = parseFloat(event.target.value);
                angledSliderValueDisplay.textContent = angledPlaneXPos.toFixed(1);
                updateAngledIntersection();
            });

            angledRotationSlider.addEventListener('input', (event) => {
                angledPlaneYRotationDeg = parseFloat(event.target.value);
                angledRotationValueDisplay.textContent = `${angledPlaneYRotationDeg}°`;
                updateAngledIntersection();
            });

            // Initial updates
            updateIntersection(parseFloat(slider.value));
            updateYzIntersection(parseFloat(yzSlider.value));
            updateAngledIntersection();

            // --- EVENT LISTENERS ---
            window.addEventListener('resize', onWindowResize, false);
        }
        
        function createAxes() {
            const origin = new THREE.Vector3(0, 0, 0);
            // Positive Axes (Arrows)
            scene.add(new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), origin, axisLength, 0x00ff00, 1.5, 0.7)); // Y (Green)
            scene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), origin, axisLength, 0x0000ff, 1.5, 0.7)); // Z (Blue)
            scene.add(new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), origin, axisLength, 0xff0000, 1.5, 0.7)); // X (Red)
            // Negative Axes (Lines)
            const lineMatY = new THREE.LineBasicMaterial({ color: 0x00ff00 });
            const lineMatZ = new THREE.LineBasicMaterial({ color: 0x0000ff });
            const lineMatX = new THREE.LineBasicMaterial({ color: 0xff0000 });
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([origin, new THREE.Vector3(-axisLength, 0, 0)]), lineMatY));
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([origin, new THREE.Vector3(0, -axisLength, 0)]), lineMatZ));
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([origin, new THREE.Vector3(0, 0, -axisLength)]), lineMatX));
        }

        function createCone() {
            const lineLength = axisLength;
            // The cone's axis of rotation is the User's X-axis (which is Three.js's Z-axis)
            const coneHeight = lineLength * Math.cos(angleRadians);
            const coneRadius = lineLength * Math.sin(angleRadians);
            const coneGeometry = new THREE.ConeGeometry(coneRadius, coneHeight, 64, 1, true);
            coneGeometry.translate(0, -coneHeight / 2, 0);
            const coneMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
            // Positive Cone
            const positiveCone = new THREE.Mesh(coneGeometry, coneMaterial);
            positiveCone.rotation.x = Math.PI / 2; // This rotates the cone's axis from Three.js's Y to Z
            scene.add(positiveCone);
            // Negative Cone
            const negativeCone = new THREE.Mesh(coneGeometry, coneMaterial);
            negativeCone.rotation.x = -Math.PI / 2; // Same rotation for the other half
            scene.add(negativeCone);
        }

        function updateIntersection(h) {
            // This function calculates the hyperbola
            movingPlane.position.y = h;

            // Clear previous intersection curve
            while (intersectionObject.children.length > 0) {
                intersectionObject.remove(intersectionObject.children[0]);
            }

            const intersectionMaterial = new THREE.MeshBasicMaterial({ color: 0xff00ff }); // Bright magenta 

            if (Math.abs(h) < 0.01) {
                // Degenerate case: two lines
                const path1 = new THREE.LineCurve3(
                    new THREE.Vector3(-axisLength, 0, -axisLength / tanAlpha),
                    new THREE.Vector3(axisLength, 0, axisLength / tanAlpha)
                );
                 const path2 = new THREE.LineCurve3(
                    new THREE.Vector3(axisLength, 0, -axisLength / tanAlpha),
                    new THREE.Vector3(-axisLength, 0, axisLength / tanAlpha)
                );
                const tubeGeo1 = new THREE.TubeGeometry(path1, 64, 0.05, 8, false);
                const tubeGeo2 = new THREE.TubeGeometry(path2, 64, 0.05, 8, false);
                intersectionObject.add(new THREE.Mesh(tubeGeo1, intersectionMaterial));
                intersectionObject.add(new THREE.Mesh(tubeGeo2, intersectionMaterial));
                intersectionObject.position.y = 0;
            } else {
                 // Hyperbola case
                const pointsPositiveX = [];
                const pointsNegativeX = [];
                const z_vertex = Math.abs(h / tanAlpha);
                const maxZ = axisLength; 

                if (z_vertex < maxZ) {
                    for (let z = z_vertex; z <= maxZ; z += 0.1) {
                        const expression = Math.pow(tanAlpha * z, 2) - h * h;
                        const x = Math.sqrt(Math.max(0, expression));
                        pointsPositiveX.push(new THREE.Vector3(x, 0, z));
                        pointsNegativeX.push(new THREE.Vector3(-x, 0, z));
                    }

                    if (pointsPositiveX.length > 1) {
                        const branchGroup = new THREE.Group();
                        
                        const curve1 = new THREE.CatmullRomCurve3(pointsPositiveX);
                        const curve2 = new THREE.CatmullRomCurve3(pointsNegativeX);
                        const tubeGeo1 = new THREE.TubeGeometry(curve1, 64, 0.05, 8, false);
                        const tubeGeo2 = new THREE.TubeGeometry(curve2, 64, 0.05, 8, false);
                        branchGroup.add(new THREE.Mesh(tubeGeo1, intersectionMaterial));
                        branchGroup.add(new THREE.Mesh(tubeGeo2, intersectionMaterial));

                        const secondBranchGroup = branchGroup.clone();
                        secondBranchGroup.rotation.y = Math.PI;

                        intersectionObject.add(branchGroup);
                        intersectionObject.add(secondBranchGroup);
                    }
                }
                intersectionObject.position.y = h;
            }
        }

        function updateYzIntersection(x_pos) {
            // Move the yellow plane. User's X-axis is Three.js's Z-axis.
            yzPlane.position.z = x_pos;

            // Clear the previous circle
            while (yzIntersectionObject.children.length > 0) {
                yzIntersectionObject.remove(yzIntersectionObject.children[0]);
            }

            // Calculate the radius of the circle at this position
            // r = |x| * tan(alpha)
            const radius = Math.abs(x_pos) * tanAlpha;

            // Only draw if the radius is significant
            if (radius > 0.01) {
                const intersectionMaterial = new THREE.MeshBasicMaterial({ color: 0xffa500, side: THREE.DoubleSide }); // Orange color
                const circleGeometry = new THREE.RingGeometry(radius - 0.05, radius + 0.05, 64);
                const circleMesh = new THREE.Mesh(circleGeometry, intersectionMaterial);
                
                // Position the circle at the same location as the plane
                circleMesh.position.z = x_pos;
                
                yzIntersectionObject.add(circleMesh);
            }
        }
        
        // UPDATED: Function now handles ellipse, parabola, and highlighting
        function updateAngledIntersection() {
            const x_pos = angledPlaneXPos;
            const angle_rad = (angledPlaneYRotationDeg * Math.PI) / 180;

            // Move and rotate the angled plane
            // The plane itself is defined in Three.js's XY plane, so we rotate it around the X-axis
            // to align with the user's Y-axis.
            angledPlane.rotation.x = -angle_rad;
            
            // We then create a group to hold the plane and the curve, and move this group.
            // This ensures the curve and plane move together.
            const transformGroup = new THREE.Group();
            transformGroup.position.z = x_pos; // User's X is Three's Z
            
            // Clear the previous intersection curve object and add the newly positioned plane
            while (angledIntersectionObject.children.length > 0) {
                angledIntersectionObject.remove(angledIntersectionObject.children[0]);
            }
            angledIntersectionObject.add(transformGroup);
            transformGroup.add(angledPlane);


            const tanAlphaSq = tanAlpha * tanAlpha;

            // Handle edge case where angle is 0 or 90
            if (Math.abs(Math.cos(angle_rad)) < 1e-6 || Math.abs(Math.sin(angle_rad)) < 1e-6) {
                return;
            }

            const cotAngle = 1 / Math.tan(angle_rad);
            const cotAngleSq = cotAngle * cotAngle;

            // Coefficients of the projected conic equation: x^2 + C*z'^2 + E*z' + F = 0 where z' is the local coord
            const C = cotAngleSq - tanAlphaSq;
            const E = -2 * x_pos * tanAlphaSq;
            const F = -x_pos * x_pos * tanAlphaSq;


            // --- Check for Parabola case and highlight ---
            const parabolaAngle = 90.0 - angleDegrees;
            const isParabola = Math.abs(angledPlaneYRotationDeg - parabolaAngle) < 0.5;
            angledPlane.material.color.set(isParabola ? 0xffd700 : 0x00aaff); // Gold for parabola, blue otherwise
            angledPlane.material.opacity = isParabola ? 0.35 : 0.2;


            // If C is very close to zero, we have a PARABOLA
            if (Math.abs(C) < 1e-5) {
                const intersectionMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700 }); // Gold
                
                if (Math.abs(x_pos) < 1e-5) {
                     // Degenerate case: a single line
                    const linePoints = [];
                    for (let z_prime = -axisLength; z_prime <= axisLength; z_prime += 0.5) {
                       linePoints.push(new THREE.Vector3(0, z_prime * cotAngle, z_prime));
                    }
                    const lineCurve = new THREE.CatmullRomCurve3(linePoints);
                    const tubeGeo = new THREE.TubeGeometry(lineCurve, 64, 0.05, 8, false);
                    transformGroup.add(new THREE.Mesh(tubeGeo, intersectionMaterial));
                } else {
                    // Normal parabola: y'^2 = 4*a*z' in local coordinates
                    const points = [];
                    const four_a = -2 * x_pos * tanAlphaSq / Math.sin(angle_rad);

                    const range = axisLength * 1.5;
                    const numPoints = 128;

                    for (let i = 0; i < numPoints; i++) {
                        const z_prime = -range/2 + (i / (numPoints-1)) * range;
                        const y_prime_sq = four_a * z_prime;

                        if (y_prime_sq < 0) continue;
                        const y_prime = Math.sqrt(y_prime_sq);
                        
                        // Convert local plane coordinates (y', z') to world coordinates (x, y, z)
                        const x_world = 0;
                        const y_world = y_prime * Math.cos(angle_rad) + z_prime * Math.sin(angle_rad);
                        const z_world = -y_prime * Math.sin(angle_rad) + z_prime * Math.cos(angle_rad);
                        
                        points.push(new THREE.Vector3(x_world, y_world, z_world));
                    }
                    
                    if (points.length > 1) {
                       const sortedPoints = points.sort((a,b) => a.z - b.z); // Sort by Z
                       const positive_y_points = sortedPoints.map(p => new THREE.Vector3(p.x, p.y, p.z));
                       const negative_y_points = sortedPoints.map(p => new THREE.Vector3(p.x, -p.y, p.z)).reverse();
                       
                       const allPoints = [...negative_y_points, ...positive_y_points];
                       const curve = new THREE.CatmullRomCurve3(allPoints);
                       const tubeGeo = new THREE.TubeGeometry(curve, 128, 0.05, 8, false);
                       transformGroup.add(new THREE.Mesh(tubeGeo, intersectionMaterial));
                    }
                }
            } 
            // If C is positive, we have an ELLIPSE
            else if (C > 0) {
                 const intersectionMaterial = new THREE.MeshBasicMaterial({ color: 0x00dddd });
                 const z_center = -E / (2 * C);
                 const right_hand_side = (E * E) / (4 * C) - F;

                 if (right_hand_side < 0) return;

                 const R_y_prime = Math.sqrt(right_hand_side); // y' radius in local coords
                 const R_z_prime = Math.sqrt(right_hand_side / C); // z' radius in local coords
                 const ellipsePoints = [];

                 const numPoints = 128;
                 for (let i = 0; i <= numPoints; i++) {
                     const theta = (i / numPoints) * 2 * Math.PI;
                     const y_prime = R_y_prime * Math.cos(theta);
                     const z_prime = z_center + R_z_prime * Math.sin(theta);
                     
                     // Convert local plane coords (y', z') to world coords (x,y,z)
                     const x_world = 0;
                     const y_world = y_prime * Math.cos(angle_rad) + z_prime * Math.sin(angle_rad);
                     const z_world = -y_prime * Math.sin(angle_rad) + z_prime * Math.cos(angle_rad);
                     
                     ellipsePoints.push(new THREE.Vector3(x_world, y_world, z_world));
                 }

                 if (ellipsePoints.length > 1) {
                     const curve = new THREE.CatmullRomCurve3(ellipsePoints);
                     const tubeGeo = new THREE.TubeGeometry(curve, 128, 0.05, 8, true);
                     transformGroup.add(new THREE.Mesh(tubeGeo, intersectionMaterial));
                 }
            }
            // If C is negative, we would have a HYPERBOLA (not implemented for angled plane yet)
            else {
                 return;
            }
        }

        function createLabels() {
            const loader = new FontLoader();
            loader.load('https://cdn.jsdelivr.net/npm/three@0.148.0/examples/fonts/helvetiker_regular.typeface.json', function (font) {
                const textMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const textParams = { font: font, size: 0.8, height: 0.1 };
                // Positive Labels
                const textY = new THREE.Mesh(new TextGeometry('Y', textParams), textMaterial);
                textY.position.set(axisLength + 0.5, 0, 0);
                scene.add(textY);
                const textZ = new THREE.Mesh(new TextGeometry('Z', textParams), textMaterial);
                textZ.position.set(0, axisLength + 0.5, 0);
                scene.add(textZ);
                const textX = new THREE.Mesh(new TextGeometry('X', textParams), textMaterial);
                textX.position.set(0, 0, axisLength + 0.5);
                scene.add(textX);
                // Negative Labels
                const textNegY = new THREE.Mesh(new TextGeometry('-Y', textParams), textMaterial);
                textNegY.position.set(-axisLength - 1.2, 0, 0);
                scene.add(textNegY);
                const textNegZ = new THREE.Mesh(new TextGeometry('-Z', textParams), textMaterial);
                textNegZ.position.set(0, -axisLength - 0.5, 0);
                scene.add(textNegZ);
                const textNegX = new THREE.Mesh(new TextGeometry('-X', textParams), textMaterial);
                textNegX.position.set(0, 0, -axisLength - 1.2);
                scene.add(textNegX);
            });
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();

    </script>
</body>
</html>
