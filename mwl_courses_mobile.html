<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MWL — Курсы (Mobile)</title>
<style>
/* ── Reset & base ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif}

/* ── Theme classes ── */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.d{background:#0f172a}.l{background:#f8fafc}
.d .t1{color:#f1f5f9}.l .t1{color:#0f172a}
.d .t2{color:#94a3b8}.l .t2{color:#64748b}
.d .t3{color:#475569}.l .t3{color:#94a3b8}
.d .p1{background:#1e293b;border-color:#334155}.l .p1{background:#ffffff;border-color:#e2e8f0}
.d .p2{background:#334155;border-color:#334155}.l .p2{background:#f1f5f9;border-color:#e2e8f0}
.d .bd{border-color:#334155!important}.l .bd{border-color:#e2e8f0!important}

/* ── Header ── */
.hdr{height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 12px;border-bottom:1px solid;flex-shrink:0;position:relative}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-center{display:flex;align-items:center;justify-content:center}
.hdr-right{display:flex;align-items:center;justify-content:flex-end;gap:5px}
.logo{width:26px;height:26px;border-radius:50%;background:#22D3EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand{font-size:13px;font-weight:500}.brand b{color:#22D3EE;font-weight:500}
.hico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid;flex-shrink:0;position:relative}

/* ── Globe-dropdown ── */
.lg-wrap{position:relative;flex-shrink:0}
.lg-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:80px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease}
.lg-dropdown.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .lg-dropdown{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.l .lg-dropdown{background:#ffffff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.lg-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;min-height:44px}
.lg-item.on{color:#22D3EE}
.d .lg-item:hover{background:#334155}.l .lg-item:hover{background:#f1f5f9}
.lg-check{width:12px;height:12px;flex-shrink:0;opacity:0}
.lg-item.on .lg-check{opacity:1}
.lg-overlay{position:fixed;inset:0;z-index:99;display:none}
.lg-overlay.open{display:block}
[dir="rtl"] .lg-dropdown{right:auto;left:0}

/* ── Avatar-dropdown ── */
.av-wrap{position:relative;flex-shrink:0}
.hav{width:28px;height:28px;border-radius:50%;background:#22D3EE;color:#0f172a;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;letter-spacing:0.02em}
.av-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:140px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease}
.av-dropdown.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .av-dropdown{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.l .av-dropdown{background:#ffffff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.av-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;min-height:44px}
.d .av-item{color:#cbd5e1}.l .av-item{color:#374151}
.d .av-item svg{stroke:#64748b}.l .av-item svg{stroke:#6b7280}
.d .av-item:hover{background:#334155}.l .av-item:hover{background:#f1f5f9}
.av-sep{height:1px;margin:2px 0}
.d .av-sep{background:#334155}.l .av-sep{background:#e2e8f0}
[dir="rtl"] .av-dropdown{right:auto;left:0}

/* Search expand overlay */
.srch-overlay{display:none;position:absolute;top:0;left:0;right:0;height:48px;align-items:center;padding:0 12px;gap:8px;z-index:10}
.d .srch-overlay{background:#1e293b}.l .srch-overlay{background:#ffffff}
.srch-overlay.open{display:flex}
.srch-overlay input{flex:1;border-radius:8px;padding:7px 10px;font-size:16px;outline:none;font-family:inherit;border:1px solid}
.d .srch-overlay input{background:#334155;border-color:#475569;color:#f1f5f9}
.l .srch-overlay input{background:#f1f5f9;border-color:#e2e8f0;color:#0f172a}
.srch-close{font-size:20px;cursor:pointer;line-height:1;padding:4px 4px;opacity:0.5;flex-shrink:0}



/* ── Body ── */
.body{display:flex;flex:1;min-height:0}

/* ── Main ── */
.main{flex:1;overflow-y:auto;padding:12px;padding-bottom:calc(68px + env(safe-area-inset-bottom));min-width:0}

/* ── Page header ── */
.pg-head{margin-bottom:14px}
.pg-title{font-size:17px;font-weight:500;margin-bottom:3px}
.pg-sub{font-size:11px}

/* ── Exam cards — single column ── */
.exam-grid{display:flex;flex-direction:column;gap:12px}

/* ── Exam card ── */
.exam-card{border-radius:12px;border:1px solid;padding:14px;display:flex;flex-direction:column;gap:11px}
.exam-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exam-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(34,211,238,0.12);color:#22D3EE;border:1px solid rgba(34,211,238,0.25);flex-shrink:0}

/* ── Progress bar ── */
.overall-prog{display:flex;flex-direction:column;gap:5px}
.prog-label-row{display:flex;justify-content:space-between;align-items:center}
.prog-label{font-size:11px}
.prog-val{font-size:11px;font-weight:500}
.prog-val .done{color:#22D3EE}
.prog-bar{height:4px;border-radius:2px;overflow:hidden}
.d .prog-bar{background:#334155}.l .prog-bar{background:#e2e8f0}
.prog-fill{height:100%;border-radius:2px;background:#22D3EE}

/* ── Divider ── */
.card-div{height:1px;margin:0 -14px}
.d .card-div{background:#334155}.l .card-div{background:#e2e8f0}

/* ── Theme list ── */
.theme-list{display:flex;flex-direction:column;gap:5px}
.theme-list-label{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px}
.d .theme-list-label{color:#475569}.l .theme-list-label{color:#94a3b8}

.theme-row{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:background 0.15s}
.d .theme-row:hover{background:#1e293b;border-color:#334155}
.l .theme-row:hover{background:#f1f5f9;border-color:#e2e8f0}
.theme-row.locked{cursor:default;opacity:0.45}
.d .theme-row.locked:hover{background:transparent;border-color:transparent}
.l .theme-row.locked:hover{background:transparent;border-color:transparent}

/* ── Theme icon ── */
.theme-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.theme-icon svg{display:block}
.theme-row.locked .theme-icon{opacity:0.35}
.d .theme-icon.ready-icon{background:rgba(34,211,238,0.1);color:#22D3EE}
.l .theme-icon.ready-icon{background:rgba(34,211,238,0.1);color:#0e7490}
.d .theme-icon.inwork-icon-bg{background:rgba(251,191,36,0.1);color:#FBBF24}
.l .theme-icon.inwork-icon-bg{background:rgba(251,191,36,0.1);color:#d97706}
.d .theme-icon.locked-icon{background:rgba(100,116,139,0.1);color:#475569}
.l .theme-icon.locked-icon{background:rgba(100,116,139,0.1);color:#94a3b8}

.theme-name{font-size:12.5px;font-weight:500;flex:1;min-width:0}
.theme-mods{font-size:11px;white-space:nowrap;flex-shrink:0}
.d .theme-mods .zero{color:#475569}.l .theme-mods .zero{color:#94a3b8}
.d-color{color:#4ade80}.total-color{color:#22D3EE}
.sep{color:#475569;margin:0 1px}
.lock-icon{display:flex;align-items:center;flex-shrink:0;opacity:0.5}

.theme-mini-bar{width:40px;height:3px;border-radius:2px;overflow:hidden;flex-shrink:0}
.d .theme-mini-bar{background:#334155}.l .theme-mini-bar{background:#e2e8f0}
.theme-mini-fill{height:100%;border-radius:2px;background:#22D3EE}

/* ── Bottom nav ── */
.bnav{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;
  border-top:1px solid;
  padding:5px 4px calc(5px + env(safe-area-inset-bottom));
  z-index:10
}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 2px;border-radius:8px;cursor:pointer;min-height:44px}
.bni svg{flex-shrink:0}
.d .bni svg{stroke:#475569}.l .bni svg{stroke:#94a3b8}
.bni.on svg{stroke:#22D3EE!important}
.bnl{font-size:9.5px;font-weight:500}
.d .bnl{color:#475569}.l .bnl{color:#64748b}
.bni.on .bnl{color:#22D3EE!important}

/* ── Popup overlay ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.18s}
.popup-overlay.open{opacity:1;pointer-events:all}

/* Mobile: popup slides up from bottom */
.popup{width:100%;max-width:520px;max-height:88vh;border-radius:16px 16px 0 0;border:1px solid;border-bottom:none;display:flex;flex-direction:column;box-shadow:0 -8px 32px rgba(0,0,0,0.4);overflow:hidden;transform:translateY(20px);transition:transform 0.2s}
.popup-overlay.open .popup{transform:translateY(0)}
.d .popup{background:#1e293b;border-color:#334155}.l .popup{background:#ffffff;border-color:#e2e8f0}

/* Drag handle */
.popup-handle{display:flex;justify-content:center;padding:10px 0 4px;flex-shrink:0}
.popup-handle-bar{width:36px;height:4px;border-radius:2px}
.d .popup-handle-bar{background:#334155}.l .popup-handle-bar{background:#e2e8f0}

.popup-head{padding:12px 16px 12px;border-bottom:1px solid;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
.d .popup-head{border-color:#334155}.l .popup-head{border-color:#e2e8f0}
.popup-head-info{display:flex;flex-direction:column;gap:3px}
.popup-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(34,211,238,0.12);color:#22D3EE;border:1px solid rgba(34,211,238,0.2);margin-bottom:2px;width:fit-content}
.popup-title{font-size:14px;font-weight:600}
.popup-subtitle{font-size:11px}
.popup-close{width:26px;height:26px;border-radius:7px;border:1px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:transparent;font-size:16px;line-height:1}
.d .popup-close{border-color:#334155;color:#64748b}.l .popup-close{border-color:#e2e8f0;color:#94a3b8}

.popup-body{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}

/* Syllabus */
.syl-module{margin-bottom:14px}
.syl-module:last-child{margin-bottom:0}
.syl-mod-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.syl-mod-num{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(34,211,238,0.1);color:#22D3EE;border:1px solid rgba(34,211,238,0.2);flex-shrink:0}
.syl-mod-name{font-size:12px;font-weight:600}
.syl-topics{display:flex;flex-direction:column;gap:4px;padding-inline-start:10px;border-inline-start:2px solid}
.d .syl-topics{border-color:#334155}.l .syl-topics{border-color:#e2e8f0}
.syl-topic{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:4px 0}
.syl-topic-name{font-size:11px}
.syl-counts{display:flex;align-items:center;gap:5px;flex-shrink:0}
.syl-count{display:flex;align-items:center;gap:2px;font-size:10px}
.d .syl-count{color:#64748b}.l .syl-count{color:#94a3b8}

.popup-foot{padding:10px 16px calc(10px + env(safe-area-inset-bottom));border-top:1px solid;display:flex;align-items:center;gap:8px;flex-shrink:0}
.d .popup-foot{border-color:#334155}.l .popup-foot{border-color:#e2e8f0}
.btn-cancel{padding:9px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid;background:transparent}
.d .btn-cancel{border-color:#334155;color:#94a3b8}.l .btn-cancel{border-color:#e2e8f0;color:#64748b}
.btn-primary{flex:1;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:none;background:#22D3EE;color:#0f172a;text-align:center}

/* In-work popup */
.inwork-body{padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.inwork-emoji{font-size:36px;line-height:1}
.inwork-title{font-size:14px;font-weight:600}
.inwork-desc{font-size:12px;line-height:1.6;max-width:280px}
</style>
</head>
<body>
<div class="shell d" id="shell">

  <!-- Header -->
  <div class="hdr p1 bd">
    <div class="hdr-left">
      <div class="logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 4.5v9L12 21l-9-4.5v-9z"/><path d="M12 3v18"/><path d="M3 7.5l9 4.5 9-4.5"/></svg>
      </div>
      <span class="brand t1"><b>Math</b> With Love</span>
    </div>
    <div class="hdr-center">
      <!-- Search icon -->
      <div class="hico p1 bd t2" onclick="toggleSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </div>
    <div class="hdr-right">
      <!-- Globe-dropdown -->
      <div class="lg-wrap">
        <div class="hico bd t2" id="lgBtn" onclick="toggleLangDD()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <div class="lg-dropdown p1 bd" id="lgDropdown">
          <div class="lg-item on" id="lgItemRu" onclick="setLang('ru');closeLangDD()">
            <span>RU</span>
            <svg class="lg-check" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="lg-item" id="lgItemHe" onclick="setLang('he');closeLangDD()">
            <span>HE</span>
            <svg class="lg-check" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
      </div>
      <div class="lg-overlay" id="lgOverlay" onclick="closeLangDD()"></div>
      <!-- Bell -->
      <div class="hico bd t2">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5a2 2 0 0 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3h-16a4 4 0 0 0 2-3v-3a7 7 0 0 1 4-6"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/></svg>
      </div>
      <!-- Avatar with dropdown -->
      <div class="av-wrap">
        <div class="hav" id="havBtn" onclick="toggleDropdown()">ИА</div>
        <div class="av-dropdown p1 bd" id="avDropdown">
          <div class="av-item" onclick="closeDropdown()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
            <span data-i18n="dropProfile">Профиль</span>
          </div>
          <div class="av-item" onclick="closeDropdown()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span data-i18n="dropSettings">Настройки</span>
          </div>
          <div class="av-sep"></div>
          <div class="av-item" onclick="closeDropdown()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span data-i18n="dropLogout">Выйти</span>
          </div>
        </div>
      </div>
    </div>
    <!-- Expandable search overlay -->
    <div class="srch-overlay p1 bd" id="srchOverlay">
      <input type="text" id="srchInput" placeholder="Поиск по курсам…">
      <span class="srch-close t2" onclick="toggleSearch()">×</span>
    </div>
  </div>



  <div class="body">
    <div class="main" id="main">
      <div class="pg-head">
        <div class="pg-title t1" data-i18n="pageTitle">Курсы</div>
        <div class="pg-sub t2" data-i18n="pageSubtitle">Программа подготовки к Багруту</div>
      </div>
      <div class="exam-grid" id="examGrid"></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bnav p1 bd">
    <div class="bni" id="bniHome" onclick="setActiveTab('bniHome')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9-9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/><path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6"/></svg>
      <span class="bnl" data-i18n="navHome">Главная</span>
    </div>
    <div class="bni on" id="bniCourses" onclick="setActiveTab('bniCourses')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l10 5-10 5L2 8z"/><path d="M7 11.5v4.5a5 5 0 0 0 10 0v-4.5"/><line x1="22" y1="8" x2="22" y2="14"/></svg>
      <span class="bnl" data-i18n="navCourses">Курсы</span>
    </div>
    <div class="bni" id="bniAchievements" onclick="setActiveTab('bniAchievements')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21l8 0"/><path d="M12 17l0 4"/><path d="M7 4l10 0"/><path d="M17 4v8a5 5 0 0 1-10 0v-8"/><path d="M5 9a2 2 0 0 1-2-2v-1a2 2 0 0 1 2-2"/><path d="M19 9a2 2 0 0 0 2-2v-1a2 2 0 0 0-2-2"/></svg>
      <span class="bnl" data-i18n="navAchievements">Достижения</span>
    </div>
    <div class="bni" id="bniLab" onclick="setActiveTab('bniLab')">

<script>

// ── Course data ──

    ]
  },
  {
    id: 572, code: '35572',
    themes: [
      {
        id:'vectors', name:{ru:'Векторы',he:'וקטורים'}, status:'ready', modules:6, done:2,
        icon:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9 5 19 5 19 15"/></svg>',
        syllabus:[
          { num:'0', name:{ru:'Стереометрия — введение',he:'סטריאומטריה — מבוא'}, topics:[
            {name:{ru:'Точка, прямая, плоскость',he:'נקודה, ישר, מישור'}, lessons:3,tests:3,exams:0},
            {name:{ru:'Куб, параллелепипед, пирамида',he:'קובייה, מקבילון, פירמידה'}, lessons:2,tests:2,exams:0}
          ]},
          { num:'1', name:{ru:'Основы векторов',he:'יסודות הוקטורים'}, topics:[
            {name:{ru:'Понятие вектора, длина, направление',he:'מושג הוקטור, אורך, כיוון'}, lessons:3,tests:3,exams:0},
            {name:{ru:'Координатная форма',he:'צורה קואורדינטית'}, lessons:2,tests:2,exams:0},
            {name:{ru:'Применение в стереометрии',he:'יישום בסטריאומטריה'}, lessons:2,tests:2,exams:1}
          ]},
          { num:'2', name:{ru:'Скалярное произведение',he:'מכפלה סקלרית'}, topics:[
            {name:{ru:'Геометрическое определение',he:'הגדרה גיאומטרית'}, lessons:2,tests:2,exams:0},
            {name:{ru:'Алгебраическое определение',he:'הגדרה אלגברית'}, lessons:2,tests:2,exams:0},
            {name:{ru:'Угол между векторами',he:'זווית בין וקטורים'}, lessons:2,tests:3,exams:1}
          ]},
          { num:'3', name:{ru:'Прямые и плоскости',he:'ישרים ומישורים'}, topics:[
            {name:{ru:'Уравнение прямой',he:'משוואת ישר'}, lessons:3,tests:3,exams:0},
            {name:{ru:'Уравнение плоскости',he:'משוואת מישור'}, lessons:3,tests:3,exams:1}
          ]},
          { num:'4', name:{ru:'Расстояния',he:'מרחקים'}, topics:[
            {name:{ru:'От точки до прямой/плоскости',he:'מנקודה לישר/מישור'}, lessons:3,tests:3,exams:1},
            {name:{ru:'Между параллельными объектами',he:'בין אובייקטים מקבילים'}, lessons:2,tests:2,exams:0}
          ]},
          { num:'5', name:{ru:'Углы',he:'זוויות'}, topics:[
            {name:{ru:'Угол между прямыми',he:'זווית בין ישרים'}, lessons:2,tests:2,exams:0},
            {name:{ru:'Угол между плоскостями',he:'זווית בין מישורים'}, lessons:2,tests:2,exams:0},
            {name:{ru:'Прямая и плоскость',he:'ישר ומישור'}, lessons:2,tests:3,exams:1}
          ]}
        ]
      },
      { id:'analytic', name:{ru:'Аналитическая геометрия',he:'גיאומטריה אנליטית'}, status:'in_work', modules:5, done:0, icon:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="3" x2="3" y2="21"/><line x1="3" y1="21" x2="21" y2="21"/><circle cx="10" cy="14" r="3"/><circle cx="17" cy="8" r="3"/></svg>', syllabus:[] },
      { id:'integral', name:{ru:'Интегральное исчисление',he:'חשבון אינטגרלי'}, status:'locked', modules:4, done:0, icon:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20c2-2 4-8 4-8s2 4 4 4 4-8 4-8 2 4 4 4"/><line x1="3" y1="20" x2="21" y2="20"/></svg>', syllabus:[] }
    ]
  }
];

// ── i18n ──
var TR = {
  ru:{ pageTitle:'Курсы', pageSubtitle:'Программа подготовки к Багруту', navHome:'Главная', navCourses:'Курсы', navAchievements:'Достижения', navLab:'Лаборатория', navSettings:'Настройки', examLabel:'Вопросник', overallProg:'Прогресс', themes:'Темы', modules:'мод.', btnStart:'Начать', btnContinue:'Продолжить', btnCancel:'Закрыть', dropProfile:'Профиль', dropSettings:'Настройки', dropLogout:'Выйти', inWorkTitle:'Тема в разработке', inWorkDesc:'Эта тема ещё не готова. Мы работаем над контентом — загляни позже!', lessons:'ур.', tests:'тест.', exams:'экз.' },
  he:{ pageTitle:'קורסים', pageSubtitle:'תוכנית הכנה לבגרות', navHome:'ראשי', navCourses:'קורסים', navAchievements:'הישגים', navLab:'מעבדה', navSettings:'הגדרות', examLabel:'שאלון', overallProg:'התקדמות', themes:'נושאים', modules:'מודולים', btnStart:'התחל', btnContinue:'המשך', btnCancel:'סגור', dropProfile:'פרופיל', dropSettings:'הגדרות', dropLogout:'יציאה', inWorkTitle:'נושא בפיתוח', inWorkDesc:'נושא זה עוד לא מוכן. אנחנו עובדים על תוכן — חזור בקרוב!', lessons:'שיעורים', tests:'בדיקות', exams:'בחינות' }
};
function t(k){ return (TR[LANG]&&TR[LANG][k])||TR.ru[k]||k; }

function renderAll(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){ el.textContent = t(el.getAttribute('data-i18n')); });
  var isRTL = LANG==='he';
  document.getElementById('shell').setAttribute('dir', isRTL?'rtl':'ltr');
  renderExamCards();
}

function renderExamCards(){
  var grid = document.getElementById('examGrid');
  var html = '';
  EXAMS.forEach(function(exam){
    var totalMods = exam.themes.reduce(function(s,th){return s+th.modules;},0);
    var doneMods  = exam.themes.reduce(function(s,th){return s+th.done;},0);
    var pct = totalMods>0 ? Math.round(doneMods/totalMods*100) : 0;

    html += '<div class="exam-card p1 bd">';
    html += '<div class="exam-card-head"><div class="exam-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3l8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>' + t('examLabel') + ' ' + exam.code + '</div></div>';
    html += '<div class="overall-prog"><div class="prog-label-row"><span class="prog-label t2">'+t('overallProg')+'</span><span class="prog-val t2"><span class="done">'+doneMods+'</span> / '+totalMods+' '+t('modules')+'</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>';
    html += '<div class="card-div"></div>';
    html += '<div class="theme-list"><div class="theme-list-label">'+t('themes')+'</div>';

    exam.themes.forEach(function(theme){
      var isLocked = theme.status==='locked';
      var isInWork = theme.status==='in_work';
      var isReady  = theme.status==='ready';
      var rowClass = 'theme-row'+(isLocked?' locked':isInWork?' in-work':'');
      var clickAttr = isLocked ? '' : 'onclick="openPopup(\''+exam.id+'\',\''+theme.id+'\')"';
      var statusClass = isLocked?'locked-icon':isInWork?'inwork-icon-bg':'ready-icon';

      html += '<div class="'+rowClass+'" '+clickAttr+'>';
      html += '<div class="theme-icon '+statusClass+'">'+theme.icon+'</div>';
      html += '<span class="theme-name t1">'+(theme.name[LANG]||theme.name.ru)+'</span>';
      if(isReady){
        var mp = theme.modules>0?Math.round(theme.done/theme.modules*100):0;
        html += '<div class="theme-mini-bar"><div class="theme-mini-fill" style="width:'+mp+'%"></div></div>';
        html += '<span class="theme-mods"><span class="'+(theme.done>0?'d-color':'zero')+'">'+theme.done+'</span><span class="sep">/</span><span class="total-color">'+theme.modules+'</span></span>';
      } else if(isInWork){
        html += '<span class="theme-mods t3" style="font-size:10px">🔧</span>';
      } else {
        html += '<span class="lock-icon t3"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>';
      }
      html += '</div>';
    });

    html += '</div></div>';
  });
  grid.innerHTML = html;
}

// ── Popup ──
function openPopup(examId, themeId){
  var exam  = EXAMS.find(function(e){return e.id===parseInt(examId);});
  var theme = exam.themes.find(function(th){return th.id===themeId;});
  var popup = document.getElementById('popup');
  popup.innerHTML = theme.status==='in_work' ? buildInWorkPopup(theme) : buildSyllabusPopup(exam,theme);
  document.getElementById('popupOverlay').classList.add('open');
}

function buildInWorkPopup(theme){
  var name = theme.name[LANG]||theme.name.ru;
  return '<div class="popup-handle"><div class="popup-handle-bar"></div></div>'
    +'<div class="popup-head"><div class="popup-head-info"><span class="popup-badge">'+name+'</span></div><button class="popup-close" onclick="closePopup()">×</button></div>'
    +'<div class="inwork-body"><div class="inwork-emoji">👷</div><div class="inwork-title t1">'+t('inWorkTitle')+'</div><div class="inwork-desc t2">'+t('inWorkDesc')+'</div></div>'
    +'<div class="popup-foot"><button class="btn-cancel" onclick="closePopup()">'+t('btnCancel')+'</button></div>';
}

function buildSyllabusPopup(exam, theme){
  var name = theme.name[LANG]||theme.name.ru;
  var btnLabel = theme.done>0 ? t('btnContinue') : t('btnStart');
  var sylHtml = '';
  (theme.syllabus||[]).forEach(function(mod){
    var modName = mod.name[LANG]||mod.name.ru;
    sylHtml += '<div class="syl-module"><div class="syl-mod-head"><span class="syl-mod-num">'+t('modules')+' '+mod.num+'</span><span class="syl-mod-name t1">'+modName+'</span></div><div class="syl-topics">';
    mod.topics.forEach(function(tp){
      var tpName = tp.name[LANG]||tp.name.ru;
      sylHtml += '<div class="syl-topic"><span class="syl-topic-name t2">'+tpName+'</span><div class="syl-counts">';
      sylHtml += '<span class="syl-count"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>'+tp.lessons+'</span>';
      sylHtml += '<span class="syl-count"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12l2 2 4-4"/></svg>'+tp.tests+'</span>';
      if(tp.exams>0) sylHtml += '<span class="syl-count"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 9l-10-4-10 4 10 4 10-4v6"/><path d="M6 10.6v5.4a6 3 0 0 0 12 0v-5.4"/></svg>'+tp.exams+'</span>';
      sylHtml += '</div></div>';
    });
    sylHtml += '</div></div>';
  });
  return '<div class="popup-handle"><div class="popup-handle-bar"></div></div>'
    +'<div class="popup-head"><div class="popup-head-info"><span class="popup-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3l8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg> '+t('examLabel')+' '+exam.code+'</span><div class="popup-title t1">'+name+'</div><div class="popup-subtitle t2">'+theme.modules+' '+t('modules')+' · '+theme.done+' '+(LANG==='ru'?'пройдено':'הושלמו')+'</div></div><button class="popup-close" onclick="closePopup()">×</button></div>'
    +'<div class="popup-body">'+sylHtml+'</div>'
    +'<div class="popup-foot"><button class="btn-cancel" onclick="closePopup()">'+t('btnCancel')+'</button><button class="btn-primary" onclick="closePopup()">'+btnLabel+' →</button></div>';
}

function closePopup(){ document.getElementById('popupOverlay').classList.remove('open'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('popupOverlay')) closePopup(); }
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closePopup(); });

// ── Search ──
function toggleSearch(){
  var o = document.getElementById('srchOverlay');
  var open = o.classList.toggle('open');
  if(open) document.getElementById('srchInput').focus();
}

// ── Globe-dropdown ──
function toggleLangDD(){
  var dd = document.getElementById('lgDropdown');
  var ov = document.getElementById('lgOverlay');
  var isOpen = dd.classList.contains('open');
  if(isOpen){ closeLangDD(); } else { dd.classList.add('open'); ov.classList.add('open'); }
}
function closeLangDD(){
  document.getElementById('lgDropdown').classList.remove('open');
  document.getElementById('lgOverlay').classList.remove('open');
}

// ── Language ──
function setLang(lang){
  LANG = lang;
  document.getElementById('lgItemRu').classList.toggle('on', lang === 'ru');
  document.getElementById('lgItemHe').classList.toggle('on', lang === 'he');
  renderAll();
}

// ── Avatar-dropdown ──
function toggleDropdown(){
  document.getElementById('avDropdown').classList.toggle('open');
}
function closeDropdown(){
  document.getElementById('avDropdown').classList.remove('open');
}
document.addEventListener('click', function(e){
  var dd = document.getElementById('avDropdown');
  var btn = document.getElementById('havBtn');
  if(dd && dd.classList.contains('open') && btn && !btn.parentElement.contains(e.target)){
    closeDropdown();
  }
});

// ── Bottom nav ──
var tabIds = ['bniHome','bniCourses','bniAchievements','bniLab','bniSettings'];
function setActiveTab(id){
  tabIds.forEach(function(tid){ var el=document.getElementById(tid); if(el) el.classList.remove('on'); });
  var a = document.getElementById(id); if(a) a.classList.add('on');
}

// ── Init ──
renderAll();
</script>
