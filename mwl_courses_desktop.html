<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MWL — Курсы</title>
<style>
/* ── Reset & base ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif}

/* ── Theme classes ── */
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.d{background:#0f172a}
.l{background:#f8fafc}
.d .t1{color:#f1f5f9}.l .t1{color:#0f172a}
.d .t2{color:#94a3b8}.l .t2{color:#64748b}
.d .t3{color:#475569}.l .t3{color:#94a3b8}
.d .p1{background:#1e293b;border-color:#334155}.l .p1{background:#ffffff;border-color:#e2e8f0}
.d .p2{background:#334155;border-color:#334155}.l .p2{background:#f1f5f9;border-color:#e2e8f0}
.d .bd{border-color:#334155!important}.l .bd{border-color:#e2e8f0!important}
.d .mbg{background:#0f172a}.l .mbg{background:#f1f5f9}

/* ── Header ── */
.hdr{height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 14px;border-bottom:1px solid;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-center{display:flex;align-items:center;justify-content:center}
.hdr-right{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.logo{width:26px;height:26px;border-radius:50%;background:#22D3EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand{font-size:13px;font-weight:500}.brand b{color:#22D3EE;font-weight:500}
.srch{width:280px;position:relative}
.srch input{width:100%;border-radius:8px;padding:6px 28px 6px 10px;font-size:12px;outline:none;font-family:inherit;border:1px solid}
.d .srch input{background:#334155;border-color:#475569;color:#f1f5f9}
.l .srch input{background:#f1f5f9;border-color:#e2e8f0;color:#0f172a}
.si2{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.hico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid}

/* ── Globe-dropdown ── */
.lg-wrap{position:relative;flex-shrink:0}
.lg-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:80px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease}
.lg-dropdown.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .lg-dropdown{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.l .lg-dropdown{background:#ffffff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.lg-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;min-height:44px}
.d .lg-item{color:#94a3b8}.l .lg-item{color:#64748b}
.lg-item.on{color:#22D3EE}
.d .lg-item:hover{background:#334155}.l .lg-item:hover{background:#f1f5f9}
.lg-check{width:12px;height:12px;flex-shrink:0;opacity:0}
.lg-item.on .lg-check{opacity:1}
.lg-overlay{position:fixed;inset:0;z-index:99;display:none}
.lg-overlay.open{display:block}
[dir="rtl"] .lg-dropdown{right:auto;left:0}

/* ── Avatar-dropdown ── */
.hav-wrap{position:relative;flex-shrink:0}
.av-drop{position:absolute;top:calc(100% + 8px);inset-inline-end:0;width:140px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease}
.av-drop.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .av-drop{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.l .av-drop{background:#ffffff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.av-drop-user{padding:10px 14px 8px}
.av-drop-name{font-size:12px;font-weight:600}
.d .av-drop-name{color:#f1f5f9}.l .av-drop-name{color:#0f172a}
.av-drop-email{font-size:11px;margin-top:1px}
.d .av-drop-email{color:#64748b}.l .av-drop-email{color:#94a3b8}
.av-drop-divider{height:1px;margin:2px 0}
.d .av-drop-divider{background:#334155}.l .av-drop-divider{background:#e2e8f0}
.av-drop-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;width:100%;border:0;background:transparent;font-family:inherit;text-align:start}
.d .av-drop-item{color:#e2e8f0}.l .av-drop-item{color:#0f172a}
.d .av-drop-item:hover{background:#334155}.l .av-drop-item:hover{background:#f1f5f9}
.av-drop-item svg{flex-shrink:0;opacity:0.7}
.d .av-drop-item svg{stroke:#94a3b8}.l .av-drop-item svg{stroke:#64748b}
.av-drop-item.danger{color:#f87171}
.av-drop-item.danger svg{stroke:#f87171;opacity:1}
.overlay{position:fixed;inset:0;z-index:99;display:none}
.overlay.open{display:block}
.hav{width:28px;height:28px;border-radius:50%;background:#22D3EE;color:#0f172a;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;letter-spacing:0.02em}
.av-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:140px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s ease,transform .15s ease}
.av-dropdown.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .av-dropdown{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.l .av-dropdown{background:#ffffff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.av-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s;min-height:44px}
.d .av-item{color:#cbd5e1}.l .av-item{color:#374151}
.d .av-item svg{stroke:#64748b}.l .av-item svg{stroke:#6b7280}
.d .av-item:hover{background:#334155}.l .av-item:hover{background:#f1f5f9}
.av-sep{height:1px;margin:2px 0}
.d .av-sep{background:#334155}.l .av-sep{background:#e2e8f0}
[dir="rtl"] .av-dropdown{right:auto;left:0}

/* ── Body layout ── */
.body{display:flex;flex:1;min-height:0}

/* ── Sidebar ── */
.sb{width:46px;display:flex;flex-direction:column;padding:8px 0;border-inline-end:1px solid;transition:width 0.2s ease;overflow:hidden;flex-shrink:0}
.sb.open{width:164px}
.sbt{display:flex;align-items:center;justify-content:center;width:46px;height:38px;margin:0 0 8px 0;border-radius:8px;cursor:pointer;border:0;background:transparent;flex-shrink:0}
.sbt svg{flex-shrink:0}
.d .sbt svg{stroke:#475569}.l .sbt svg{stroke:#94a3b8}
.sbt:hover svg{stroke:#94a3b8!important}
.sg,.sbm,.sbb{display:flex;flex-direction:column;gap:2px}
.sbm{margin-top:auto;margin-bottom:auto}
.ni{display:flex;align-items:center;width:46px;height:38px;border-radius:8px;cursor:pointer;white-space:nowrap;overflow:hidden;border:0;background:transparent;flex-shrink:0}
.sb.open .ni{width:100%;border-radius:6px}
.ni:hover svg{stroke:#94a3b8!important}
.ni:hover .nl{color:#94a3b8!important}
.ni .icon-wrap{width:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni svg{flex-shrink:0;transition:stroke 0.15s;display:block}
.d .ni svg{stroke:#475569}.l .ni svg{stroke:#64748b}
.ni.on svg{stroke:#22D3EE!important}
.nl{font-size:12px;font-weight:500;opacity:0;transition:opacity 0.15s,color 0.15s;white-space:nowrap;margin-inline-start:8px}
.d .nl{color:#475569}.l .nl{color:#64748b}
.ni.on .nl{color:#22D3EE!important}
.sb.open .nl{opacity:1}
.nav-sub{display:none;flex-direction:column;gap:1px;padding-inline-start:14px;margin-top:2px;margin-bottom:4px}
.ni-sub{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:6px 8px;border-radius:6px;cursor:pointer;white-space:nowrap}
.ni-sub svg{flex-shrink:0}
.d .ni-sub{color:#64748b}.l .ni-sub{color:#94a3b8}
.d .ni-sub svg{stroke:#475569}.l .ni-sub svg{stroke:#94a3b8}
.d .ni-sub:hover{background:#334155;color:#cbd5e1}.l .ni-sub:hover{background:#f1f5f9;color:#475569}
.ni-sub.on{color:#22D3EE!important;font-weight:600}
.ni-sub.on svg{stroke:#22D3EE!important}

/* ── Main content ── */
.main{flex:1;overflow-y:auto;padding:20px 24px;min-width:0}

/* ── Page header ── */
.pg-head{margin-bottom:20px}
.pg-title{font-size:20px;font-weight:500;margin-bottom:4px}
.pg-sub{font-size:12px}

/* ── Exam cards grid ── */
.exam-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── Exam card ── */
.exam-card{border-radius:14px;border:1px solid;padding:18px;display:flex;flex-direction:column;gap:14px}

.exam-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.exam-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(34,211,238,0.12);color:#22D3EE;border:1px solid rgba(34,211,238,0.25);flex-shrink:0}
.exam-title{font-size:16px;font-weight:600;line-height:1.3}
.exam-desc{font-size:11.5px;line-height:1.5;margin-top:3px}

/* ── Overall progress bar ── */
.overall-prog{display:flex;flex-direction:column;gap:5px}
.prog-label-row{display:flex;justify-content:space-between;align-items:center}
.prog-label{font-size:11px}
.prog-val{font-size:11px;font-weight:500}
.prog-val .done{color:#22D3EE}
.prog-bar{height:4px;border-radius:2px;overflow:hidden}
.d .prog-bar{background:#334155}.l .prog-bar{background:#e2e8f0}
.prog-fill{height:100%;border-radius:2px;background:#22D3EE;transition:width 0.3s}

/* ── Divider ── */
.card-div{height:1px;margin:0 -18px}
.d .card-div{background:#334155}.l .card-div{background:#e2e8f0}

/* ── Theme list ── */
.theme-list{display:flex;flex-direction:column;gap:6px}
.theme-list-label{font-size:10px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px}
.d .theme-list-label{color:#475569}.l .theme-list-label{color:#94a3b8}

.theme-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:background 0.15s,border-color 0.15s;position:relative}
.d .theme-row:hover{background:#1e293b;border-color:#334155}
.l .theme-row:hover{background:#f1f5f9;border-color:#e2e8f0}

/* locked theme */
.theme-row.locked{cursor:default;opacity:0.45}
.d .theme-row.locked:hover{background:transparent;border-color:transparent}
.l .theme-row.locked:hover{background:transparent;border-color:transparent}

/* in-work theme */
.theme-row.in-work{cursor:pointer}

/* ── Theme icon (replaces dot) ── */
.theme-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.theme-icon svg{display:block}
/* locked: greyed */
.theme-row.locked .theme-icon{opacity:0.35}
/* ready: cyan tint */
.d .theme-icon.ready-icon{background:rgba(34,211,238,0.1);color:#22D3EE}
.l .theme-icon.ready-icon{background:rgba(34,211,238,0.1);color:#0e7490}
/* in_work: amber tint */
.d .theme-icon.inwork-icon-bg{background:rgba(251,191,36,0.1);color:#FBBF24}
.l .theme-icon.inwork-icon-bg{background:rgba(251,191,36,0.1);color:#d97706}
/* locked: neutral */
.d .theme-icon.locked-icon{background:rgba(100,116,139,0.1);color:#475569}
.l .theme-icon.locked-icon{background:rgba(100,116,139,0.1);color:#94a3b8}
.theme-name{font-size:12.5px;font-weight:500;flex:1;min-width:0}
.theme-mods{font-size:11px;white-space:nowrap;flex-shrink:0}
.theme-mods .done{color:#4ade80;font-weight:600}
.theme-mods .d-color{color:#4ade80}
.theme-mods .sep{color:#475569;margin:0 1px}
.theme-mods .total{color:#22D3EE}
.theme-mods .total-color{color:#22D3EE}
.d .theme-mods .zero{color:#475569}.l .theme-mods .zero{color:#94a3b8}

.lock-icon{display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0.5}
.inwork-icon{display:flex;align-items:center;flex-shrink:0}

/* ── Module mini progress inside theme row ── */
.theme-mini-bar{width:48px;height:3px;border-radius:2px;overflow:hidden;flex-shrink:0}
.d .theme-mini-bar{background:#334155}.l .theme-mini-bar{background:#e2e8f0}
.theme-mini-fill{height:100%;border-radius:2px;background:#22D3EE}

/* ── Popup overlay ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.18s}
.popup-overlay.open{opacity:1;pointer-events:all}

.popup{width:520px;max-width:92vw;max-height:82vh;border-radius:14px;border:1px solid;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.45);overflow:hidden;transform:translateY(8px);transition:transform 0.18s}
.popup-overlay.open .popup{transform:translateY(0)}
.d .popup{background:#1e293b;border-color:#334155}.l .popup{background:#ffffff;border-color:#e2e8f0}

.popup-head{padding:16px 18px 14px;border-bottom:1px solid;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0}
.d .popup-head{border-color:#334155}.l .popup-head{border-color:#e2e8f0}
.popup-head-info{display:flex;flex-direction:column;gap:3px}
.popup-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(34,211,238,0.12);color:#22D3EE;border:1px solid rgba(34,211,238,0.2);margin-bottom:2px;width:fit-content}
.popup-title{font-size:15px;font-weight:600}
.popup-subtitle{font-size:11.5px}
.popup-close{width:28px;height:28px;border-radius:7px;border:1px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:transparent;font-size:16px;line-height:1;transition:background 0.15s}
.d .popup-close{border-color:#334155;color:#64748b}.l .popup-close{border-color:#e2e8f0;color:#94a3b8}
.d .popup-close:hover{background:#334155;color:#f1f5f9}.l .popup-close:hover{background:#f1f5f9;color:#0f172a}

.popup-body{flex:1;overflow-y:auto;padding:14px 18px}

/* Syllabus module list */
.syl-module{margin-bottom:14px}
.syl-module:last-child{margin-bottom:0}
.syl-mod-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.syl-mod-num{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(34,211,238,0.1);color:#22D3EE;border:1px solid rgba(34,211,238,0.2);flex-shrink:0}
.syl-mod-name{font-size:12.5px;font-weight:600}
.syl-mod-name.d-color{color:#f1f5f9}.syl-mod-name.l-color{color:#0f172a}
.syl-topics{display:flex;flex-direction:column;gap:4px;padding-inline-start:12px;border-inline-start:2px solid}
.d .syl-topics{border-color:#334155}.l .syl-topics{border-color:#e2e8f0}
.syl-topic{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0}
.syl-topic-name{font-size:11.5px}
.syl-counts{display:flex;align-items:center;gap:6px;flex-shrink:0}
.syl-count{display:flex;align-items:center;gap:3px;font-size:10px}
.d .syl-count{color:#64748b}.l .syl-count{color:#94a3b8}
.syl-count svg{flex-shrink:0}

.popup-foot{padding:12px 18px;border-top:1px solid;display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0}
.d .popup-foot{border-color:#334155}.l .popup-foot{border-color:#e2e8f0}
.btn-cancel{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid;background:transparent;transition:background 0.15s}
.d .btn-cancel{border-color:#334155;color:#94a3b8}.l .btn-cancel{border-color:#e2e8f0;color:#64748b}
.d .btn-cancel:hover{background:#334155}.l .btn-cancel:hover{background:#f1f5f9}
.btn-primary{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:none;background:#22D3EE;color:#0f172a;transition:filter 0.15s}
.btn-primary:hover{filter:brightness(1.1)}

/* In-work popup */
.inwork-body{padding:28px 18px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.inwork-emoji{font-size:40px;line-height:1}
.inwork-title{font-size:14px;font-weight:600}
.inwork-desc{font-size:12px;line-height:1.6;max-width:320px}
</style>
</head>
<body>
<div class="shell d" id="shell">

  <!-- Header -->
  <div class="hdr p1 bd">
    <div class="hdr-left">
      <div class="logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 4.5v9L12 21l-9-4.5v-9z"/><path d="M12 3v18"/><path d="M3 7.5l9 4.5 9-4.5"/></svg>
      </div>
      <span class="brand t1"><b>Math</b> With Love</span>
    </div>
    <div class="hdr-center">
      <div class="srch">
        <input type="text" placeholder="Поиск по курсам…" id="searchInput">
        <span class="si2 t3">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
      </div>
    </div>
    <div class="hdr-right">
      <!-- Globe-dropdown -->
      <div class="lg-wrap">
        <div class="hico bd t2" id="lgBtn" onclick="toggleLangDD()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <div class="lg-dropdown p1 bd" id="lgDropdown">
          <div class="lg-item on" id="lgItemRu" onclick="setLang('ru');closeLangDD()">
            <span>RU</span>
            <svg class="lg-check" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="lg-item" id="lgItemHe" onclick="setLang('he');closeLangDD()">
            <span>HE</span>
            <svg class="lg-check" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
      </div>
      <div class="lg-overlay" id="lgOverlay" onclick="closeLangDD()"></div>
      <!-- Bell -->
      <div class="hico bd t2">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 5a2 2 0 0 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3h-16a4 4 0 0 0 2-3v-3a7 7 0 0 1 4-6"/><path d="M9 17v1a3 3 0 0 0 6 0v-1"/></svg>
      </div>
      <!-- Avatar with dropdown -->
      <div class="hav-wrap">
        <div class="hav" id="havBtn" onclick="toggleDrop()">ИГ</div>
        <div class="av-drop p1 bd" id="avDrop">
          <div class="av-drop-user">
            <div class="av-drop-name" id="avName">Игаль</div>
            <div class="av-drop-email" id="avEmail">user@example.com</div>
          </div>
          <div class="av-drop-divider"></div>
          <button class="av-drop-item" onclick="closeDrop()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
            <span data-i18n="dropProfile">Профиль</span>

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  var isRTL = LANG === 'he';
  document.getElementById('shell').setAttribute('dir', isRTL ? 'rtl' : 'ltr');
}

function renderExamCards(){
  var grid = document.getElementById('examGrid');
  var html = '';
  EXAMS.forEach(function(exam){
    var totalMods = exam.themes.reduce(function(s,th){ return s + th.modules; }, 0);
    var doneMods  = exam.themes.reduce(function(s,th){ return s + th.done; }, 0);
    var pct = totalMods > 0 ? Math.round(doneMods / totalMods * 100) : 0;

    html += '<div class="exam-card p1 bd">';
    // Head
    html += '<div class="exam-card-head">';
    html += '<div>';
    html += '<div class="exam-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3l8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>' + t('examLabel') + ' ' + exam.code + '</div>';
    html += '</div>';
    html += '</div>';

    // Overall progress
    html += '<div class="overall-prog">';
    html += '<div class="prog-label-row">';
    html += '<span class="prog-label t2">' + t('overallProg') + '</span>';
    html += '<span class="prog-val t2"><span class="done">' + doneMods + '</span> / ' + totalMods + ' ' + t('modules') + '</span>';
    html += '</div>';
    html += '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>';
    html += '</div>';

    // Divider
    html += '<div class="card-div"></div>';

    // Theme list
    html += '<div class="theme-list">';
    html += '<div class="theme-list-label">' + t('themes') + '</div>';

    exam.themes.forEach(function(theme){
      var isLocked   = theme.status === 'locked';
      var isInWork   = theme.status === 'in_work';
      var isReady    = theme.status === 'ready';
      var rowClass   = 'theme-row' + (isLocked ? ' locked' : isInWork ? ' in-work' : '');
      var clickAttr  = isLocked ? '' : 'onclick="openPopup(\'' + exam.id + '\',\'' + theme.id + '\')"';

      html += '<div class="' + rowClass + '" ' + clickAttr + '>';

      // Icon
      var statusClass = isLocked ? 'locked-icon' : isInWork ? 'inwork-icon-bg' : 'ready-icon';
      if(theme.icon && theme.icon.val){
        html += '<div class="theme-icon ' + statusClass + '">' + theme.icon.val + '</div>';
      } else {
        html += '<div style="width:8px;height:8px;border-radius:50%;background:' + theme.dot + ';flex-shrink:0"></div>';
      }

      // Name
      html += '<span class="theme-name t1">' + (theme.name[LANG] || theme.name.ru) + '</span>';

      // Mini progress bar (only if any progress)
      if(isReady){
        var mp = theme.modules > 0 ? Math.round(theme.done / theme.modules * 100) : 0;
        html += '<div class="theme-mini-bar"><div class="theme-mini-fill" style="width:' + mp + '%"></div></div>';
      }

      // Counts
      if(isLocked){
        html += '<span class="lock-icon t3"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></span>';
      } else if(isInWork){
        html += '<span class="theme-mods t2" style="font-size:10px">🔧</span>';
      } else {
        var doneCol = theme.done > 0 ? ' d-color' : ' zero';
        html += '<span class="theme-mods"><span class="' + (theme.done>0?'d-color':'zero') + '">' + theme.done + '</span><span class="sep">/</span><span class="total-color">' + theme.modules + '</span></span>';
      }

      html += '</div>'; // .theme-row
    });

    html += '</div>'; // .theme-list
    html += '</div>'; // .exam-card
  });

  grid.innerHTML = html;
}

// ── Popup ──
function openPopup(examId, themeId){
  var exam   = EXAMS.find(function(e){ return e.id === parseInt(examId); });
  var theme  = exam.themes.find(function(th){ return th.id === themeId; });
  var popup  = document.getElementById('popup');
  var overlay= document.getElementById('popupOverlay');

  if(theme.status === 'in_work'){
    popup.innerHTML = buildInWorkPopup(theme);
  } else {
    popup.innerHTML = buildSyllabusPopup(exam, theme);
  }

  overlay.classList.add('open');
}

function buildInWorkPopup(theme){
  var name = theme.name[LANG] || theme.name.ru;
  return ''
    + '<div class="popup-head">'
    +   '<div class="popup-head-info">'
    +     '<span class="popup-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' + name + '</span>'
    +   '</div>'
    +   '<button class="popup-close" onclick="closePopup()">×</button>'
    + '</div>'
    + '<div class="inwork-body">'
    +   '<div class="inwork-emoji">👷</div>'
    +   '<div class="inwork-title t1">' + t('inWorkTitle') + '</div>'
    +   '<div class="inwork-desc t2">' + t('inWorkDesc') + '</div>'
    + '</div>'
    + '<div class="popup-foot">'
    +   '<button class="btn-cancel" onclick="closePopup()">' + t('btnCancel') + '</button>'
    + '</div>';
}

function buildSyllabusPopup(exam, theme){
  var name = theme.name[LANG] || theme.name.ru;
  var hasProgress = theme.done > 0;
  var btnLabel = hasProgress ? t('btnContinue') : t('btnStart');

  var sylHtml = '';
  theme.syllabus.forEach(function(mod){
    var modName = mod.name[LANG] || mod.name.ru;
    sylHtml += '<div class="syl-module">';
    sylHtml += '<div class="syl-mod-head"><span class="syl-mod-num">' + t('modules') + ' ' + mod.num + '</span><span class="syl-mod-name t1">' + modName + '</span></div>';
    sylHtml += '<div class="syl-topics">';
    mod.topics.forEach(function(tp){
      var tpName = tp.name[LANG] || tp.name.ru;
      sylHtml += '<div class="syl-topic">';
      sylHtml += '<span class="syl-topic-name t2">' + tpName + '</span>';
      sylHtml += '<div class="syl-counts">';
      // Lessons
      sylHtml += '<span class="syl-count"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>' + tp.lessons + '</span>';
      // Tests
      sylHtml += '<span class="syl-count"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="M9 12l2 2 4-4"/></svg>' + tp.tests + '</span>';
      // Exams (if any)
      if(tp.exams > 0){
        sylHtml += '<span class="syl-count"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 9l-10-4-10 4 10 4 10-4v6"/><path d="M6 10.6v5.4a6 3 0 0 0 12 0v-5.4"/></svg>' + tp.exams + '</span>';
      }
      sylHtml += '</div>';
      sylHtml += '</div>';
    });
    sylHtml += '</div>'; // .syl-topics
    sylHtml += '</div>'; // .syl-module
  });

  return ''
    + '<div class="popup-head">'
    +   '<div class="popup-head-info">'
    +     '<span class="popup-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3l8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>' + t('examLabel') + ' ' + exam.code + '</span>'
    +     '<div class="popup-title t1">' + name + '</div>'
    +     '<div class="popup-subtitle t2">' + theme.modules + ' ' + t('modules') + ' · ' + theme.done + ' ' + t('modules') + ' ' + (LANG==='ru'?'пройдено':'הושלמו') + '</div>'
    +   '</div>'
    +   '<button class="popup-close" onclick="closePopup()">×</button>'
    + '</div>'
    + '<div class="popup-body">' + sylHtml + '</div>'
    + '<div class="popup-foot">'
    +   '<button class="btn-cancel" onclick="closePopup()">' + t('btnCancel') + '</button>'
    +   '<button class="btn-primary" onclick="closePopup()">' + btnLabel + ' →</button>'
    + '</div>';
}

function closePopup(){
  document.getElementById('popupOverlay').classList.remove('open');
}

function handleOverlayClick(e){
  if(e.target === document.getElementById('popupOverlay')) closePopup();
}

// ── Keyboard ESC ──
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closePopup();
});

// ── Sidebar ──
function toggleSb(){
  sbOpen = !sbOpen;
  document.getElementById('sb').className = 'sb p1 bd' + (sbOpen ? ' open' : '');
}

var topNavIds = ['niDashboard','niCourses','niAchievements','niContent'];
function setActiveNav(id){
  topNavIds.forEach(function(nid){
    var el = document.getElementById(nid);
    if(el) el.classList.remove('on');
  });
  var sub = document.getElementById('contentSubmenu');
  if(id !== 'niContent' && sub) sub.style.display = 'none';
  var active = document.getElementById(id);
  if(active) active.classList.add('on');
  if(id === 'niContent'){
    if(sub) sub.style.display = 'flex';
    if(!sbOpen) toggleSb();
  }
}

// ── Globe-dropdown ──
function toggleLangDD(){
  var dd = document.getElementById('lgDropdown');
  var ov = document.getElementById('lgOverlay');
  var isOpen = dd.classList.contains('open');
  if(isOpen){ closeLangDD(); } else { dd.classList.add('open'); ov.classList.add('open'); }
}

// ── Avatar dropdown ───────────────────────────────────────────────────
function openDrop(){
  document.getElementById('avDrop').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeDrop(){
  document.getElementById('avDrop').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function toggleDrop(){
  var d = document.getElementById('avDrop');
  if(typeof closeLangDD==='function') closeLangDD();
  d.classList.contains('open') ? closeDrop() : openDrop();
}
function closeLangDD(){
  document.getElementById('lgDropdown').classList.remove('open');
  document.getElementById('lgOverlay').classList.remove('open');
}

// ── Language ──
function setLang(lang){
  LANG = lang;
  document.getElementById('lgItemRu').classList.toggle('on', lang === 'ru');
  document.getElementById('lgItemHe').classList.toggle('on', lang === 'he');
  renderAll();
}

document.addEventListener('click', function(e){

renderAll();
</script>
