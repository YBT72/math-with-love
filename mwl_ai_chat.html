
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0a0f1a; padding: 10px; }
.ctrls { display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:10px; }
.ctrl { padding:5px 13px;font-size:12px;font-weight:500;cursor:pointer;border-radius:6px;font-family:sans-serif; }
.page-sim { max-width:480px;margin:0 auto;border-radius:10px;overflow:hidden;position:relative;min-height:480px; }
.overlay { position:absolute;inset:0;background:rgba(0,0,0,0.5);opacity:0;pointer-events:none;transition:opacity 0.3s;border-radius:10px; }
.overlay.open { opacity:1;pointer-events:all; }
.drawer { position:absolute;left:0;right:0;bottom:0;border-radius:12px 12px 0 0;display:flex;flex-direction:column;max-height:90%;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1); }
.drawer.open { transform:translateY(0); }
.msgs { flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px;min-height:0; }
.msg-row { display:flex;align-items:flex-end;gap:7px; }
.msg-row.yosi { align-self:flex-start;max-width:85%; }
.msg-row.user { align-self:flex-end;max-width:85%;flex-direction:row-reverse; }
.msgs.rtl .msg-row.yosi { align-self:flex-end;flex-direction:row-reverse; }
.msgs.rtl .msg-row.user { align-self:flex-start;flex-direction:row; }
.typing { display:none;align-items:center;gap:7px;padding:4px 14px 6px; }
.typing.show { display:flex; }
.dot { width:6px;height:6px;border-radius:50%;background:#FBBF24;animation:bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:0.2s;}.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-5px);opacity:1;}}
.rec-bar { display:none;margin-top:6px;align-items:center;gap:8px;padding:0 2px; }
.rec-bar.show { display:flex; }
.rec-dot { width:7px;height:7px;border-radius:50%;background:#f87171;animation:blink 1s infinite;flex-shrink:0; }
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
.rec-wave { flex:1;height:18px;display:flex;align-items:center;gap:2px; }
.rw { width:3px;border-radius:2px;background:#f87171;animation:rwv 0.7s infinite ease-in-out; }
.rw:nth-child(1){height:5px;}.rw:nth-child(2){height:11px;animation-delay:0.1s;}.rw:nth-child(3){height:17px;animation-delay:0.2s;}.rw:nth-child(4){height:13px;animation-delay:0.1s;}.rw:nth-child(5){height:8px;animation-delay:0.15s;}.rw:nth-child(6){height:15px;animation-delay:0.05s;}.rw:nth-child(7){height:9px;animation-delay:0.25s;}
@keyframes rwv{0%,100%{transform:scaleY(0.4);}50%{transform:scaleY(1.2);}}
.mic-btn-rec { animation:mic-pulse 1s infinite; }
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 #f8717155;}50%{box-shadow:0 0 0 6px #f8717100;}}
</style>

<div class="ctrls">
  <button class="ctrl" id="btn-dark"  onclick="setTh('dark')"  style="background:#22D3EE;border:1px solid #22D3EE;color:#0a3540;box-shadow:0 0 0 2px #22D3EE33;">🌙 Тёмная</button>
  <button class="ctrl" id="btn-light" onclick="setTh('light')" style="background:#e8f4f8;border:1px solid #b0cdd8;color:#445566;">☀️ Светлая</button>
  <div style="width:1px;background:#223;margin:0 2px;"></div>
  <button class="ctrl" onclick="openDrawer()" style="background:#FBBF2422;border:1px solid #FBBF2466;color:#FBBF24;">🧑‍🏫 Открыть Йоси</button>
</div>

<div class="page-sim" id="page" style="background:#0b1622;border:1px solid #1e3040;">
  <div id="page-bg" style="padding:20px;min-height:480px;background:#0b1622;">
    <div id="page-ttl" style="font-size:14px;font-weight:500;margin-bottom:8px;color:#d0dde8;">Урок — Пирамида SABC</div>
    <div id="page-body" style="font-size:13px;line-height:1.7;margin-bottom:16px;color:#7a9ab0;">Решаете пункт Б: найдите координаты C и S.</div>
    <button id="yosi-trigger" onclick="openDrawer()"
      style="display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:24px;cursor:pointer;font-size:13px;font-weight:500;font-family:sans-serif;background:#FBBF2418;border:1.5px solid #FBBF2455;color:#FBBF24;">
      <span>🧑‍🏫</span><span id="btn-chat-txt">Спросить Йоси</span>
    </button>
  </div>
  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>

  <div class="drawer" id="drawer" style="background:#0f1e2e;border:1px solid #1e3040;border-bottom:none;">

    <!-- handle -->
    <div style="width:36px;height:4px;border-radius:2px;margin:10px auto 0;flex-shrink:0;background:#334a5a;"></div>

    <!-- header -->
    <div id="dheader" style="display:flex;align-items:center;padding:10px 14px 8px;flex-shrink:0;gap:8px;">
      <div id="yosi-av-d" style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:#FBBF2418;border:1px solid #FBBF2444;">🧑‍🏫</div>
      <div style="flex:1;">
        <div id="dtitle" style="font-size:14px;font-weight:600;color:#d0dde8;">Профессор Йоси</div>
        <div id="dsub" style="font-size:11px;margin-top:1px;color:#556677;">Помощник по уроку</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div id="lang-tog" style="display:flex;border-radius:6px;overflow:hidden;border:1px solid #334a5a;">
          <button id="lru" onclick="setLang('ru')" style="padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:sans-serif;border:none;background:#22D3EE;color:#0a3540;">RU</button>
          <button id="lhe" onclick="setLang('he')" style="padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:sans-serif;border:none;background:#1a3a4e;color:#7a9ab0;">HE</button>
        </div>
        <button onclick="closeDrawer()" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;border:none;font-family:sans-serif;background:#1a3a4e;border:1px solid #334a5a;color:#556677;">✕</button>
      </div>
    </div>

    <!-- ctx strip -->
    <div id="ctx-strip" style="margin:0 14px 4px;padding:7px 10px;border-radius:7px;flex-shrink:0;background:#0b1622;border:1px solid #1e3040;">
      <div id="ctx-lbl" style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;color:#334a5a;">Текущая задача</div>
      <div id="ctx-txt" style="font-size:11px;color:#7a9ab0;">Пирамида SABC, пункт Б — координаты C и S.</div>
      <div id="ctx-badge" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:10px;margin-top:4px;background:#22D3EE18;color:#22D3EE;border:1px solid #22D3EE44;">📖 Урок · Векторы</div>
    </div>
    <div id="ddiv" style="height:1px;margin:0 14px;background:#1e3040;flex-shrink:0;"></div>

    <div class="msgs" id="msgs"></div>
    <div class="typing" id="typing">
      <div style="width:26px;height:26px;border-radius:50%;background:#FBBF2418;border:1px solid #FBBF2444;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">🧑‍🏫</div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <!-- INPUT WRAP -->
    <div id="input-wrap" style="padding:10px 14px 14px;flex-shrink:0;border-top:1px solid #1e3040;">

      <!-- Поле ввода — всё inline как у координат -->
      <div id="input-box"
        style="display:flex;align-items:flex-end;gap:0;border-radius:16px;padding:10px 8px 8px 14px;border:1.5px solid #334a5a;background:#0b1622;transition:border-color 0.2s;">

        <textarea id="chat-inp" rows="1"
          onkeydown="onKey(event)"
          oninput="onInp(this)"
          style="flex:1;border:none;background:transparent;font-size:13px;font-family:sans-serif;outline:none;resize:none;line-height:1.5;min-height:20px;max-height:120px;overflow-y:auto;padding:0;color:#d0dde8;"
          placeholder="Задайте вопрос Йоси..."></textarea>

        <!-- МИК + SEND справа вместе -->
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:8px;align-self:flex-end;padding-bottom:1px;">
          <button id="mic-btn" onclick="toggleMic()"
            style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;border:none;background:transparent;color:#7a9ab0;transition:all 0.2s;flex-shrink:0;">🎤</button>
          <button id="send-btn" onclick="trySend()"
            style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;cursor:not-allowed;border:none;background:#334a5a;color:#556677;opacity:0.5;transition:all 0.2s;font-family:sans-serif;flex-shrink:0;">↑</button>
        </div>
      </div>

      <!-- счётчик символов -->
      <div id="char-count" style="font-size:10px;text-align:right;margin-top:3px;height:14px;color:#445566;"></div>

      <!-- индикатор записи -->
      <div class="rec-bar" id="rec-bar">
        <div class="rec-dot"></div>
        <div class="rec-wave">
          <div class="rw"></div><div class="rw"></div><div class="rw"></div>
          <div class="rw"></div><div class="rw"></div><div class="rw"></div><div class="rw"></div>
        </div>
        <span id="rec-time" style="font-size:11px;font-family:monospace;font-weight:600;color:#f87171;flex-shrink:0;">0:00</span>
        <span id="rec-cancel" onclick="cancelMic()" style="font-size:11px;cursor:pointer;text-decoration:underline;color:#f87171;flex-shrink:0;padding:2px 4px;">✕ отмена</span>
      </div>
    </div>
  </div>
</div>

<script>
var th='dark', lang='ru', msgs=[], micOn=false;
var recognition=null, recTimer=null, recSec=0;
var MAX_CHARS=500;

var TX={
  ru:{title:'Профессор Йоси',sub:'Помощник по уроку',ctxLbl:'Текущая задача',ctxTxt:'Пирамида SABC, пункт Б — координаты C и S.',badge:'📖 Урок · Векторы',placeholder:'Задайте вопрос Йоси...',btnChat:'Спросить Йоси',cancel:'✕ отмена',firstMsg:'Привет! Вижу, вы работаете над пирамидой SABC. Что вызывает затруднение — точка C или S?',replies:['Найдите E как середину BC. Какие координаты у B?','Условие u⊥v: скалярное произведение = 0. Распишите u·v через координаты.','S прямо над E. Если E=(8,4,0) и высота 16 — какой будет z?','C на оси x: y=0, z=0. Осталось найти x.']},
  he:{title:'פרופסור יוסי',sub:'עוזר בשיעור',ctxLbl:'המשימה הנוכחית',ctxTxt:'פירמידה SABC, סעיף ב — קואורדינטות C ו-S.',badge:'📖 שיעור · וקטורים',placeholder:'שאל את יוסי...',btnChat:'שאל את יוסי',cancel:'✕ ביטול',firstMsg:'שלום! אני רואה שאתם עובדים על הפירמידה SABC. מה מקשה עליכם — נקודה C או S?',replies:['מצאו את E כאמצע BC. מהן הקואורדינטות של B?','התנאי u⊥v: מכפלה סקלרית = 0.','S מעל E. אם E=(8,4,0) וגובה 16 — מה יהיה z?','C על ציר x: y=0, z=0.']}
};
function tx(k){return TX[lang][k];}

function openDrawer(){
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  if(msgs.length===0) setTimeout(function(){addMsg('yosi',tx('firstMsg'));},400);
  setTimeout(function(){document.getElementById('chat-inp').focus();},400);
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  cancelMic();
}

function onInp(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  updateSendBtn();
  updateCharCount(el.value.length);
}
function updateCharCount(len){
  var el=document.getElementById('char-count');
  var d=th==='dark';
  if(len>200){
    var rem=MAX_CHARS-len;
    el.textContent=rem>=0?rem+' / '+MAX_CHARS:'Превышен лимит';
    el.style.color=rem<50?(rem<0?'#f87171':'#FBBF24'):(d?'#445566':'#99aabb');
  } else { el.textContent=''; }
}
function updateSendBtn(){
  var d=th==='dark';
  var inp=document.getElementById('chat-inp').value.trim();
  var btn=document.getElementById('send-btn');
  var ok=inp.length>0&&!micOn&&inp.length<=MAX_CHARS;
  if(ok){
    btn.style.background='#FBBF24';btn.style.color='#0a0a00';
    btn.style.cursor='pointer';btn.style.opacity='1';
  } else {
    btn.style.background=d?'#334a5a':'#d0dde8';
    btn.style.color=d?'#556677':'#99aabb';
    btn.style.cursor='not-allowed';btn.style.opacity='0.5';
  }
}
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();trySend();} }
function trySend(){
  var inp=document.getElementById('chat-inp').value.trim();
  if(!micOn&&inp.length>0&&inp.length<=MAX_CHARS) doSend();
}
function resetInput(){
  var inp=document.getElementById('chat-inp');
  inp.value='';inp.style.height='auto';
  updateSendBtn();updateCharCount(0);
}

/* MIC */
function toggleMic(){if(micOn)stopRec(true);else startRec();}
function startRec(){
  micOn=true;applyMicUI();
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();
  recognition.lang=lang==='he'?'he-IL':'ru-RU';
  recognition.continuous=false;recognition.interimResults=true;
  recognition.onresult=function(e){
    var final='',interim='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    var t2=final||interim;
    var inp=document.getElementById('chat-inp');inp.value=t2;onInp(inp);
    if(final){stopRec(false);setTimeout(doSend,200);}
  };
  recognition.onerror=function(){stopRec(false);};
  recognition.start();
}
function applyMicUI(){
  var d=th==='dark';
  var mb=document.getElementById('mic-btn');
  var rb=document.getElementById('rec-bar');
  if(micOn){
    mb.textContent='🔴';
    mb.style.background='#f8717122';mb.style.border='1.5px solid #f87171';
    mb.classList.add('mic-btn-rec');
    updateSendBtn(); // заблокировать send
    rb.classList.add('show');
    document.getElementById('rec-cancel').textContent=tx('cancel');
    recSec=0;
    recTimer=setInterval(function(){
      recSec++;
      var m=Math.floor(recSec/60),s=recSec%60;
      document.getElementById('rec-time').textContent=m+':'+(s<10?'0':'')+s;
    },1000);
  } else {
    mb.textContent='🎤';
    mb.style.background='transparent';mb.style.border='none';
    mb.classList.remove('mic-btn-rec');
    mb.style.color=d?'#7a9ab0':'#556677';
    clearInterval(recTimer);recTimer=null;recSec=0;
    document.getElementById('rec-time').textContent='0:00';
    rb.classList.remove('show');
    updateSendBtn();
  }
}
function stopRec(doCancel){
  micOn=false;
  if(recognition){try{recognition.stop();}catch(e){}recognition=null;}
  if(doCancel)resetInput();
  applyMicUI();
}
function cancelMic(){stopRec(true);}

/* MESSAGES */
function addMsg(who,text){msgs.push({who:who,text:text});renderMsgs();}
function renderMsgs(){
  var d=th==='dark',rtl=lang==='he';
  var cont=document.getElementById('msgs');
  cont.className='msgs'+(rtl?' rtl':'');cont.innerHTML='';
  msgs.forEach(function(m){
    var row=document.createElement('div');row.className='msg-row '+m.who;
    var av=document.createElement('div');
    if(m.who==='yosi'){
      av.textContent='🧑‍🏫';
      av.style.cssText='width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:'+(d?'#FBBF2418':'#FEF9EC')+';border:1px solid '+(d?'#FBBF2444':'#FBBF2466')+';';
    } else {
      av.textContent='👤';
      av.style.cssText='width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:'+(d?'#1e3040':'#e2e8f0')+';border:1px solid '+(d?'#334a5a':'#b0c8d8')+';color:'+(d?'#7a9ab0':'#445566')+';';
    }
    var bubble=document.createElement('div');
    if(rtl)bubble.setAttribute('dir','rtl');
    bubble.textContent=m.text;
    if(m.who==='yosi'){
      bubble.style.cssText='padding:8px 12px;font-size:13px;line-height:1.6;max-width:100%;background:'+(d?'#2a1e0a':'#fffbeb')+';border:1px solid '+(d?'#FBBF2433':'#FBBF2466')+';color:'+(d?'#e8d5a0':'#78350f')+';border-radius:'+(rtl?'10px 3px 10px 10px':'3px 10px 10px 10px')+';';
    } else {
      bubble.style.cssText='padding:8px 12px;font-size:13px;line-height:1.6;max-width:100%;background:'+(d?'#1e3040':'#f0f4f8')+';border:1px solid '+(d?'#334a5a':'#c0ccd8')+';color:'+(d?'#94a3b8':'#475569')+';border-radius:'+(rtl?'3px 10px 10px 10px':'10px 3px 10px 10px')+';';
    }
    row.appendChild(av);row.appendChild(bubble);cont.appendChild(row);
  });
  cont.scrollTop=cont.scrollHeight;
}
function doSend(){
  var inp=document.getElementById('chat-inp'),text=inp.value.trim();
  if(!text||micOn||text.length>MAX_CHARS)return;
  resetInput();addMsg('user',text);
  var tp=document.getElementById('typing');
  tp.className='typing show'+(lang==='he'?' rtl':'');
  setTimeout(function(){
    tp.className='typing'+(lang==='he'?' rtl':'');
    addMsg('yosi',TX[lang].replies[Math.floor(Math.random()*TX[lang].replies.length)]);
  },900+Math.random()*600);
}

/* LANG */
function setLang(l){
  lang=l;var d=th==='dark',rtl=l==='he';
  document.getElementById('drawer').setAttribute('dir',rtl?'rtl':'ltr');
  var ib=document.getElementById('input-box');
  ib.style.padding=rtl?'10px 14px 8px 8px':'10px 8px 8px 14px';
  var inp=document.getElementById('chat-inp');
  inp.setAttribute('dir',rtl?'rtl':'ltr');inp.placeholder=tx('placeholder');
  // в RTL: переставляем группу кнопок перед textarea
  var actions=ib.querySelector('div[style*="margin-left"]')||ib.lastElementChild;
  if(rtl){ib.insertBefore(actions,inp);actions.style.marginLeft='0';actions.style.marginRight='8px';}
  else{ib.appendChild(actions);actions.style.marginLeft='8px';actions.style.marginRight='0';}
  document.getElementById('ctx-strip').setAttribute('dir',rtl?'rtl':'ltr');
  document.getElementById('dtitle').textContent=tx('title');
  document.getElementById('dsub').textContent=tx('sub');
  document.getElementById('ctx-lbl').textContent=tx('ctxLbl');
  document.getElementById('ctx-txt').textContent=tx('ctxTxt');
  document.getElementById('ctx-badge').textContent=tx('badge');
  document.getElementById('btn-chat-txt').textContent=tx('btnChat');
  if(micOn)document.getElementById('rec-cancel').textContent=tx('cancel');
  document.getElementById('lru').style.background=l==='ru'?'#22D3EE':(d?'#1a3a4e':'#f0f4f8');
  document.getElementById('lru').style.color=l==='ru'?'#0a3540':(d?'#7a9ab0':'#445566');
  document.getElementById('lhe').style.background=l==='he'?'#22D3EE':(d?'#1a3a4e':'#f0f4f8');
  document.getElementById('lhe').style.color=l==='he'?'#0a3540':(d?'#7a9ab0':'#445566');
  renderMsgs();
}

/* THEME */
function setTh(t2){
  th=t2;var d=t2==='dark';
  // page
  document.getElementById('page').style.background=d?'#0b1622':'#ffffff';
  document.getElementById('page').style.border='1px solid '+(d?'#1e3040':'#d0dde8');
  document.getElementById('page-bg').style.background=d?'#0b1622':'#ffffff';
  document.getElementById('page-ttl').style.color=d?'#d0dde8':'#1a2533';
  document.getElementById('page-body').style.color=d?'#7a9ab0':'#556677';
  var yt=document.getElementById('yosi-trigger');
  yt.style.background=d?'#FBBF2418':'#FEF9EC';
  yt.style.border='1.5px solid '+(d?'#FBBF2455':'#FBBF2488');
  yt.style.color=d?'#FBBF24':'#92400e';
  // drawer
  var dr=document.getElementById('drawer');
  dr.style.background=d?'#0f1e2e':'#ffffff';
  dr.style.border='1px solid '+(d?'#1e3040':'#d0dde8');
  document.getElementById('dheader').style.borderBottom='1px solid '+(d?'#1e3040':'#d0dde8');
  document.getElementById('dtitle').style.color=d?'#d0dde8':'#1a2533';
  document.getElementById('dsub').style.color=d?'#556677':'#99aabb';
  document.getElementById('yosi-av-d').style.background=d?'#FBBF2418':'#FEF9EC';
  document.getElementById('yosi-av-d').style.border='1px solid '+(d?'#FBBF2444':'#FBBF2466');
