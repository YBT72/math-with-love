<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MWL — Примеры вопросников</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
body{font-family:system-ui,sans-serif}
.shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.d{background:#0f172a}.l{background:#f8fafc}
.d .t1{color:#f1f5f9}.l .t1{color:#0f172a}
.d .t2{color:#94a3b8}.l .t2{color:#64748b}
.d .t3{color:#475569}.l .t3{color:#94a3b8}
.d .p1{background:#1e293b;border-color:#334155}.l .p1{background:#ffffff;border-color:#e2e8f0}
.d .p2{background:#334155;border-color:#334155}.l .p2{background:#f1f5f9;border-color:#e2e8f0}
.d .bd{border-color:#334155!important}.l .bd{border-color:#e2e8f0!important}

/* Header */
.hdr{height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 14px;border-bottom:1px solid;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-center{display:flex;align-items:center;justify-content:center}
.hdr-right{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.logo{width:26px;height:26px;border-radius:50%;background:#22D3EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{stroke:#0f172a}
.brand{font-size:13px;font-weight:500}.brand b{color:#22D3EE;font-weight:500}
.srch{width:100%;max-width:320px;position:relative}
.srch input{width:100%;border-radius:8px;padding:6px 28px 6px 10px;font-size:12px;outline:none;font-family:inherit;border:1px solid}
.d .srch input{background:#334155;border-color:#475569;color:#f1f5f9}
.l .srch input{background:#f1f5f9;border-color:#e2e8f0;color:#0f172a}
.srch-ic{position:absolute;inset-inline-end:8px;top:50%;transform:translateY(-50%);pointer-events:none}
.lb.on{background:#22D3EE;color:#0f172a;font-weight:500}
.hico{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid}
.lg-wrap{position:relative;flex-shrink:0}
.lg-dropdown{position:absolute;top:calc(100% + 8px);right:0;min-width:80px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s,transform .15s}
.lg-dropdown.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .lg-dropdown{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.l .lg-dropdown{background:#fff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.lg-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s}
.d .lg-item{color:#94a3b8}.l .lg-item{color:#64748b}
.d .lg-item:hover{background:#334155}.l .lg-item:hover{background:#f1f5f9}
.lg-item.on{color:#22D3EE}
.lg-check{width:12px;height:12px;flex-shrink:0;opacity:0}
.lg-item.on .lg-check{opacity:1}
.lg-overlay{position:fixed;inset:0;z-index:99;display:none}
.lg-overlay.open{display:block}
.av-wrap{position:relative;flex-shrink:0}
.hav{width:28px;height:28px;min-width:28px;min-height:28px;border-radius:50%;background:#22D3EE;color:#0f172a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;border:2px solid #22D3EE;flex-shrink:0}
.av-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:200px;border-radius:10px;border:1px solid;overflow:hidden;z-index:100;opacity:0;transform:translateY(-6px);pointer-events:none;transition:opacity .15s,transform .15s}
.av-drop-user{padding:10px 14px 8px;display:flex;flex-direction:column;gap:2px}
.av-drop-name{font-size:12px;font-weight:600}
.d .av-drop-name{color:#f1f5f9}.l .av-drop-name{color:#0f172a}
.av-drop-email{font-size:11px;word-break:break-all}
.d .av-drop-email{color:#94a3b8}.l .av-drop-email{color:#64748b}
.av-dropdown.open{opacity:1;transform:translateY(0);pointer-events:auto}
.d .av-dropdown{background:#1e293b;border-color:#334155;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.l .av-dropdown{background:#fff;border-color:#e2e8f0;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.av-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s}
.d .av-item{color:#e2e8f0}.l .av-item{color:#0f172a}
.d .av-item:hover{background:#334155}.l .av-item:hover{background:#f1f5f9}
.av-item svg{flex-shrink:0;opacity:.7}
.d .av-item svg{stroke:#94a3b8}.l .av-item svg{stroke:#64748b}
.av-item.danger{color:#f87171}
.av-item.danger svg{stroke:#f87171;opacity:1}
.av-divider{height:1px;margin:2px 0}
.d .av-divider{background:#334155}.l .av-divider{background:#e2e8f0}
.av-overlay{position:fixed;inset:0;z-index:99;display:none}
.av-overlay.open{display:block}
[dir="rtl"] .lg-dropdown{right:auto;left:0}
[dir="rtl"] .av-dropdown{right:auto;left:0}

/* Body / sidebar */
.body{display:flex;flex:1;min-height:0}
.sb{width:46px;display:flex;flex-direction:column;padding:8px 0;border-inline-end:1px solid;overflow:hidden;flex-shrink:0;transition:width .2s ease}
.sb.open{width:164px}
.sbt{display:flex;align-items:center;justify-content:center;width:46px;height:38px;margin:0 0 8px 0;border-radius:8px;cursor:pointer;border:0;background:transparent;flex-shrink:0}
.sbt svg{flex-shrink:0}
.d .sbt svg{stroke:#475569}.l .sbt svg{stroke:#94a3b8}
.sbt:hover svg{stroke:#94a3b8!important}
.sb-g{display:flex;flex-direction:column;gap:2px}
.sb-mid{margin:auto 0;display:flex;flex-direction:column;gap:2px}
.sb-bot{display:flex;flex-direction:column;gap:2px}
.sb-sep{height:1px;margin:6px 4px}
.d .sb-sep{background:#1e293b}.l .sb-sep{background:#e2e8f0}
.ni{display:flex;align-items:center;width:46px;height:38px;border-radius:8px;cursor:pointer;white-space:nowrap;overflow:hidden;border:0;background:transparent;flex-shrink:0;transition:background .15s}
.sb.open .ni{width:100%;border-radius:6px}
.d .ni:hover{background:#1e293b}.l .ni:hover{background:#f1f5f9}
.ni .icon-wrap{width:46px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ni svg{flex-shrink:0;transition:stroke .15s;display:block}
.d .ni svg{stroke:#475569}.l .ni svg{stroke:#64748b}
.ni.on svg{stroke:#22D3EE!important}
.nl{font-size:12px;font-weight:500;opacity:0;transition:opacity .15s,color .15s;white-space:nowrap;margin-inline-start:0}
.d .nl{color:#475569}.l .nl{color:#64748b}
.ni.on .nl{color:#22D3EE!important}
.sb.open .nl{opacity:1}

/* Ctrl bar */
.ctrl{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid;align-items:center;flex-wrap:wrap;flex-shrink:0}
.l .ctrl{background:#c5e3eb!important}
.tcb{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid;background:transparent}
.d .tcb{color:#94a3b8;border-color:#334155}.l .tcb{color:#64748b;border-color:#e2e8f0}
.tcb.on{background:#22D3EE!important;color:#0f172a!important;border-color:#22D3EE!important}
.d .tcb-act{border-color:#475569}.l .tcb-act{border-color:#94a3b8}
.div1{width:1px;height:16px;margin:0 2px}
.d .div1{background:#334155}.l .div1{background:#e2e8f0}

/* Main column */
.es-col{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
.es-main{flex:1;display:flex;min-height:0}

/* Shalonot list (left panel) */
/* ES-LIST — sidebar style: overflow hidden + width transition */
.es-list{width:260px;flex-shrink:0;display:flex;flex-direction:column;border-inline-end:1px solid;overflow:hidden;transition:width .2s ease}
.d .es-list{background:#13233a}.l .es-list{background:#f3fbfc}
.es-list.closed{width:56px}
.es-list.closed .es-title-label{display:none}
.es-list.closed .es-lbl{opacity:0;width:0;overflow:hidden}
.es-list.closed .es-cnt{display:none}
.es-list.closed .es-chev{display:none}
.es-list.closed .sn-acts{display:none!important}
.es-list.closed .es-children{display:none!important}
.es-list.closed .gr-add-row{display:none}

/* Header row: toggle + title */
.es-list-hdr{display:flex;align-items:center;height:38px;margin-bottom:2px;white-space:nowrap}
.es-toggle{display:flex;align-items:center;justify-content:center;width:56px;height:38px;flex-shrink:0;border-radius:8px;cursor:pointer;border:0;background:transparent}
.d .es-toggle svg{stroke:#94a3b8}.l .es-toggle svg{stroke:#475569}
.es-toggle:hover svg{stroke:#94a3b8!important}
.es-title-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.d .es-title-label{color:#94a3b8}.l .es-title-label{color:#475569}
/* Scrollable content */
.es-body{width:204px;flex-shrink:0;overflow-y:auto;padding:0 8px 8px 8px;transition:width .2s ease,opacity .15s ease,padding .2s ease}
.es-list.closed .es-body{width:0;opacity:0;overflow:hidden;padding:0}
/* es-node: shalon row — num badge fixed at 46px like sidebar icon-wrap */
.es-nums-strip{width:56px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;padding-top:4px}
.es-list:not(.closed) .es-nums-strip{display:none}
.es-node-num{width:56px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.es-num-badge{height:22px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 6px}
.d .es-num-badge{background:transparent;color:#64748b}.l .es-num-badge{background:transparent;color:#0891b2}
.es-node.active .es-num-badge{background:transparent;color:#22D3EE}

.es-list.closed .es-num-badge{display:flex}
.d .es-list{background:#13233a}.l .es-list{background:#f3fbfc}
.es-title-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;white-space:nowrap}
.es-title-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px}
.d .es-title-label{color:#94a3b8}.l .es-title-label{color:#475569}

.d .es-toggle svg{stroke:#94a3b8}.l .es-toggle svg{stroke:#475569}
.es-toggle:hover svg{stroke:#94a3b8!important}
.es-tree-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;margin:4px 4px 10px}
.d .es-title-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;white-space:nowrap}
.es-title-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px}
.d .es-title-label{color:#94a3b8}.l .es-title-label{color:#475569}

.es-toggle:hover svg{stroke:#94a3b8!important}

.es-title-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px}
.d .es-title-label{color:#94a3b8}.l .es-title-label{color:#475569}

.d .es-toggle svg{stroke:#94a3b8}.l .es-toggle svg{stroke:#475569}
.es-toggle:hover svg{stroke:#94a3b8!important}
.es-tree-title{color:#94a3b8}
/* Drag-and-drop for shalon rows */
.es-node.drag-source{opacity:.4}
.es-node.drag-over{outline:2px solid #22D3EE;border-radius:7px;background:rgba(34,211,238,0.08)!important}
.es-node[draggable]{cursor:grab}
.es-node[draggable]:active{cursor:grabbing}
.es-node{display:flex;align-items:center;gap:0;padding:4px 0;border-radius:7px;cursor:pointer;font-size:12.5px;position:relative;transition:background .1s}
.es-node-spacer{width:56px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.d .es-node{color:#cbd5e1}.l .es-node{color:#334155}
.d .es-node:hover{background:#1e3040}.l .es-node:hover{background:#ddf0f7}
.es-node.active .es-lbl{color:#22D3EE!important;font-weight:500}
.es-node.active .es-chev svg{stroke:#22D3EE}
.es-node .es-chev{width:14px;height:14px;flex-shrink:0;transition:transform .15s}
.es-node .es-chev.open{transform:rotate(90deg)}
.es-node .es-chev.empty{visibility:hidden}
.es-node .es-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-inline-end:6px}
.es-node .es-cnt{font-size:10px;flex-shrink:0}
.d .es-node .es-cnt{color:#475569}.l .es-node .es-cnt{color:#94a3b8}
.es-node .sn-acts{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-inline-start:auto;padding:0 6px}
.es-node .sn-acts .sa,.es-node .sn-acts .sa-add{display:none}
.es-node:hover .sn-acts .sa,.es-node:hover .sn-acts .sa-add{display:flex}
.es-node .sn-acts .es-chev{display:flex;flex-shrink:0}
.es-children{padding-inline-start:20px;display:none}
.es-children.open{display:block}
.es-sess{display:flex;align-items:center;gap:6px;padding:4px 0 4px 56px;border-radius:7px;cursor:pointer;font-size:12px;position:relative;transition:background .1s}
.d .es-sess{color:#94a3b8}.l .es-sess{color:#64748b}
.d .es-sess:hover{background:#1e3040}.l .es-sess:hover{background:#ddf0f7}
.es-sess.active .es-lbl{color:#22D3EE!important;font-weight:500}
.es-sess .es-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.es-sess .sn-acts{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-inline-start:auto;padding-inline-end:6px}
.es-sess .sn-acts .sa{display:none}
.es-sess:hover .sn-acts .sa{display:flex}
.sa{width:18px;height:18px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.d .sa{color:#94a3b8}.l .sa{color:#94a3b8}
.d .sa:hover{background:#334155;color:#22D3EE}.l .sa:hover{background:#c8e8f0;color:#0891b2}
.sa-add{width:18px;height:18px;border-radius:4px;border:1px solid;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-size:14px;line-height:1}
.d .sa-add{color:#94a3b8;border-color:#64748b}.l .sa-add{color:#94a3b8;border-color:#94a3b8}
.d .sa-add:hover{border-color:#22D3EE;color:#22D3EE}.l .sa-add:hover{border-color:#0891b2;color:#0891b2}
.gr-add-row{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;margin-top:2px}
.d .gr-add-row{color:#64748b}.l .gr-add-row{color:#94a3b8}
.d .gr-add-row:hover{background:#1e3040;color:#cbd5e1}.l .gr-add-row:hover{background:#ddf0f7;color:#475569}
#tip{position:fixed;z-index:600;padding:4px 8px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;transform:translateX(-50%)}
#tip.show{opacity:1}
.d #tip{background:#1e293b;color:#e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.l #tip{background:#334155;color:#f1f5f9;box-shadow:0 2px 8px rgba(0,0,0,.2)}

/* Editor / Preview panel */
.es-editor{flex:1;overflow-y:auto;padding:20px 24px}
.d .es-editor{background:#0b1322}.l .es-editor{background:#e2f3f7}

/* Meta card */
.meta-card{border-radius:12px;border:1px solid;padding:16px;margin-bottom:20px}
.d .meta-card{background:#1e293b;border-color:#334155}.l .meta-card{background:#ffffff;border-color:#e2e8f0}
.meta-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-top:12px}
.meta-field label{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.d .meta-field label{color:#475569}.l .meta-field label{color:#94a3b8}
.meta-input{width:100%;border-radius:7px;padding:7px 10px;font-size:13px;outline:none;font-family:inherit;border:1px solid}
.d .meta-input{background:#0f172a;border-color:#334155;color:#f1f5f9}
.l .meta-input{background:#f8fafc;border-color:#e2e8f0;color:#0f172a}
.meta-input:focus{border-color:#22D3EE}

/* פרק card */
.prek-card{border-radius:12px;border:1px solid;margin-bottom:14px;overflow:hidden}
.d .prek-card{background:#1e293b;border-color:#334155}.l .prek-card{background:#ffffff;border-color:#e2e8f0}
.prek-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.d .prek-header:hover{background:#273449}.l .prek-header:hover{background:#f8fafc}
.prek-chevron{transition:transform .15s;flex-shrink:0}
.d .prek-chevron svg{stroke:#94a3b8}.l .prek-chevron svg{stroke:#475569}
.prek-chevron.open{transform:rotate(90deg)}
.prek-badge{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:#22D3EE;background:rgba(34,211,238,0.12)}
.prek-name{flex:1}

/* Question rows */

.q-pts-badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:rgba(251,191,36,0.12);color:#FBBF24;border:1px solid rgba(251,191,36,0.3)}

/* Atom editor exact: rtbtn = insert button, rmbtn = ⋮ menu button */
.rtbtn{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:6px;font-size:10.5px;font-weight:500;cursor:pointer;border:none;background:transparent}

.rmbtn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;cursor:pointer;border:none;background:transparent;font-size:13px}
.d .rmbtn{color:#cbd5e1}.l .rmbtn{color:#64748b}
.rmbtn:hover{background:rgba(34,211,238,0.12);color:#22D3EE}
.q-tb-btn.danger{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;cursor:pointer;border:none;background:transparent;font-size:12px}

.q-tb-btn.danger:hover{color:#f87171;background:rgba(248,113,113,.12)}
.q-content{
  min-height:60px;padding:8px 10px;font-size:12.5px;line-height:1.7;outline:none;
  border-radius:0 0 8px 8px;border-top:1px solid;cursor:text;
}
.d .q-content{color:#e2e8f0;background:#0f172a;border-top-color:#334155}
.l .q-content{color:#0f172a;background:#f8fafc;border-top-color:#e2e8f0}

.d .q-content:empty::before{color:#475569}.l .q-content:empty::before{color:#94a3b8}

.q-body.has-image .q-content{flex:0 0 66.666%;border-inline-end:1px solid;border-radius:0 0 0 8px}
.d .q-body.has-image .q-content{border-color:#334155}
.l .q-body.has-image .q-content{border-color:#e2e8f0}

.q-image-wrap{flex:0 0 33.333%;padding:8px;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:flex-start;border-radius:0 0 8px 0}
.q-image-thumb{position:relative;display:block;width:100%}
.q-image-thumb img{width:100%;border-radius:6px;border:1px solid;object-fit:contain;max-height:180px}
.d .q-image-thumb img{border-color:#475569}.l .q-image-thumb img{border-color:#e2e8f0}
.q-img-del{position:absolute;top:-6px;inset-inline-end:-6px;width:18px;height:18px;border-radius:50%;background:#f87171;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-family:inherit}
.q-save-indicator{font-size:10px;padding:2px 7px;border-radius:12px;opacity:0;transition:opacity .3s;pointer-events:none;flex-shrink:0}
.q-save-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;cursor:pointer;border:none;background:transparent;padding:0}
.d .q-save-btn{color:#cbd5e1}.l .q-save-btn{color:#64748b}
.d .q-save-btn:hover{background:rgba(34,211,238,0.12);color:#22D3EE}.l .q-save-btn:hover{background:rgba(34,211,238,0.12);color:#0891b2}

/* Add פרק btn */
.add-prek-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;font-size:12.5px;font-weight:500;cursor:pointer;border:1.5px dashed;width:100%;margin-bottom:16px}

.d .add-prek-btn:hover{background:#1e293b;color:#cbd5e1}.l .add-prek-btn:hover{background:#e8f5f8;color:#475569}

/* Selection rules */
.rules-card{border-radius:12px;border:1px solid;padding:16px;margin-bottom:16px}
.d .rules-card{background:#1e293b;border-color:#334155}.l .rules-card{background:#ffffff;border-color:#e2e8f0}
.rules-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.d .rules-title{color:#475569}.l .rules-title{color:#94a3b8}
.rules-main-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.rules-label{font-size:13px}
.d .rules-label{color:#cbd5e1}.l .rules-label{color:#334155}
.rules-num{width:48px;border-radius:7px;padding:5px 8px;font-size:13px;font-weight:600;text-align:center;outline:none;font-family:inherit;border:1px solid;color:#22D3EE}

.constraint-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.constraint-row{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;flex-wrap:wrap}

.l .c-chip{background:#e2e8f0;color:#475569;border-color:#cbd5e1}
.c-chip.sel{background:rgba(34,211,238,0.15);color:#22D3EE;border-color:#22D3EE}
.or-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.3)}
.add-or-btn{font-size:10.5px;cursor:pointer;padding:3px 7px;border-radius:6px;border:1px dashed}
.d .add-or-btn{color:#64748b;border-color:#475569}.l .add-or-btn{color:#94a3b8;border-color:#cbd5e1}
.add-or-btn:hover{color:#22D3EE;border-color:#22D3EE}
.del-constraint{margin-inline-start:auto;cursor:pointer;font-size:12px;color:#f87171;opacity:.7}
.del-constraint:hover{opacity:1}
.add-constraint-btn{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:7px 10px;border-radius:8px;border:1.5px dashed;width:fit-content}
.d .add-constraint-btn{color:#64748b;border-color:#475569}.l .add-constraint-btn{color:#94a3b8;border-color:#cbd5e1}
.add-constraint-btn:hover{color:#22D3EE;border-color:#22D3EE}

/* Student preview */
.preview-wrap{max-width:700px;margin:0 auto}
.preview-header{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid}
.d .preview-header{border-color:#334155}.l .preview-header{border-color:#334155}
.preview-ministry{font-size:11px;margin-bottom:8px}
.d .preview-ministry{color:#64748b}.l .preview-ministry{color:#64748b}
.preview-title{font-size:22px;font-weight:700;margin-bottom:4px}
.d .preview-title{color:#f1f5f9}.l .preview-title{color:#0f172a}
.preview-subtitle{font-size:15px;font-weight:500;margin-bottom:16px;color:#22D3EE}

.d .preview-meta{color:#94a3b8}.l .preview-meta{color:#64748b}

.d .preview-instruction{background:#1e293b;border-color:#334155;color:#cbd5e1}
.l .preview-instruction{background:#ffffff;border-color:#e2e8f0;color:#334155}
.preview-prek{margin-bottom:18px}

.d .preview-prek-topics{color:#64748b}.l .preview-prek-topics{color:#94a3b8}
.preview-q-item{display:flex;align-items:baseline;gap:10px;padding:6px 8px;border-radius:6px;font-size:12.5px}
.d .preview-q-item{color:#94a3b8}.l .preview-q-item{color:#475569}
.preview-q-num{font-weight:700;color:#22D3EE;flex-shrink:0}
.preview-pts-badge{font-size:10px;padding:2px 7px;border-radius:12px;background:rgba(251,191,36,0.12);color:#FBBF24;border:1px solid rgba(251,191,36,0.25);flex-shrink:0}

.preview-rules-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:#22D3EE;margin-bottom:8px}
.preview-rule-item{font-size:12px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.d .preview-rule-item{color:#94a3b8}.l .preview-rule-item{color:#475569}

/* Inline math field */
math-field.imf{display:inline-block;vertical-align:middle;border:1px solid #22D3EE40;border-radius:4px;padding:0 4px;background:rgba(34,211,238,0.06);font-size:1em;min-width:20px;line-height:1.4}
math-field.imf:focus-within{border-color:#22D3EE;outline:none}
math-field.imf::part(virtual-keyboard-toggle),math-field.imf::part(menu-toggle){display:none!important}
math-field.imf::part(virtual-keyboard-toggle){width:0!important;height:0!important;overflow:hidden!important;padding:0!important;margin:0!important}
/* MathLive injects a .ML__virtual-keyboard-toggle span — hide it too */
math-field.imf .ML__virtual-keyboard-toggle{display:none!important}
.d math-field.imf{--caret-color:#22D3EE;color:#f1f5f9}
.l math-field.imf{color:#0f172a}

/* RTL fixes */
[dir="rtl"] .srch input{text-align:right}
[dir="rtl"] .meta-input,[dir="rtl"] .topics-input{text-align:right}
[dir="rtl"] .prek-name-input{text-align:right}
[dir="rtl"] .q-content{text-align:right}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{width:380px;border-radius:14px;border:1px solid;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.d .modal{background:#1e293b;border-color:#334155}.l .modal{background:#ffffff;border-color:#e2e8f0}
.modal-title{font-size:14px;font-weight:600;margin-bottom:14px}
.d .modal-title{color:#f1f5f9}.l .modal-title{color:#0f172a}
.modal-field{width:100%;border-radius:8px;padding:9px 10px;font-size:12.5px;outline:none;font-family:inherit;border:1px solid;margin-bottom:10px}
.d .modal-field{background:#0f172a;border-color:#334155;color:#f1f5f9}
.l .modal-field{background:#f8fafc;border-color:#e2e8f0;color:#0f172a}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.m-btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid}
.d .m-btn{background:#334155;border-color:#475569;color:#e2e8f0}.l .m-btn{background:#f1f5f9;border-color:#e2e8f0;color:#0f172a}
.m-btn.primary{background:#22D3EE;border-color:#22D3EE;color:#0f172a}

/* Translate modal */
.tr-progress-label{font-size:12px;color:#22D3EE;margin-bottom:6px;min-height:16px}
.tr-bar-wrap{height:5px;border-radius:3px;overflow:hidden;margin-bottom:10px;display:none}
.d .tr-bar-wrap{background:#0f172a}.l .tr-bar-wrap{background:#e2e8f0}
.tr-bar-fill{height:100%;background:#22D3EE;border-radius:3px;width:0;transition:width .4s}
.tr-error{font-size:12px;color:#f87171;min-height:18px;margin-bottom:10px}
.tr-modal-body{font-size:13px;margin-bottom:16px;line-height:1.6}

/* Formula symbol panel */
.fmenu{position:fixed;display:none;flex-direction:column;gap:2px;padding:6px;border-radius:8px;border:1px solid;z-index:200;width:224px;box-shadow:0 8px 24px rgba(0,0,0,0.35)}
.fmenu.open{display:flex}
.d .fmenu{background:#1e293b;border-color:#334155}.l .fmenu{background:#ffffff;border-color:#e2e8f0}
.fmenu-label{font-size:9.5px;font-weight:500;padding:2px 4px 4px}
.d .fmenu-label{color:#64748b}.l .fmenu-label{color:#94a3b8}
.fmenu-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.fmenu-item{display:flex;align-items:center;justify-content:center;padding:7px 2px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:14px;font-family:'Cambria Math',Georgia,serif;direction:ltr}
.d .fmenu-item{color:#f1f5f9}.l .fmenu-item{color:#0f172a}
.fmenu-item:hover{background:rgba(34,211,238,0.14);color:#22D3EE}

/* RTL: in closed state, toggle stays visually consistent */
[dir="rtl"] .es-list{border-inline-end:1px solid}
</style>

// Helper lookups
var selectedTypeId = 'st572';
var esExpanded = {}; // tracks expanded state per shalon type, independent of selection
var selectedSessionId = 's572_2026a';
var previewMode = false;
function togglePreview(){
  // Flush all meta inputs to model before preview
  var sess = sessionById(selectedSessionId);
  if(sess){
    document.querySelectorAll('.meta-input').forEach(function(el){
      var k = el.getAttribute('data-key');
      var v = parseFloat(el.value);
      if(isNaN(v)) return;
      if(k==='durationMin') sess.durationMin = v;
      else if(k==='extraTime') sess.extraTime = v;
      else if(k==='totalQ') sess.totalQOverride = v;
      else if(k==='answerK') sess.rules.totalAnswer = v;
    });
  }
  previewMode = !previewMode;
  renderEditor();
}
var listOpen = true;
var _translateResult = null;  // starts open, closes after selecting a session

function toggleList(){
  listOpen = !listOpen;
  document.getElementById('esList').classList.toggle('closed', !listOpen);
  // icon doesn't change — the panel itself is the visual indicator
}

function updateAddBtn(){
  // Context-aware like groups constructor:
  // type selected but no session yet → "Новый срок"
  // type selected and session selected  → "Новый срок" (add to current type)
  // nothing/ambiguous → "Вопросник"
  var t = TR[currentLang];
  var label = document.getElementById('addCtxLabel'); if(!label) return;
  if(selectedTypeId){
    label.textContent = t.addSession || (currentLang==='he'?'מועד חדש':'Новый срок');
  } else {
    label.textContent = t.addShalon || (currentLang==='he'?'שאלון חדש':'Новый вопросник');
  }
}

function addContextual(){
  // If a type is selected → add session inside it (same as groups: selected folder → create subfolder)
  // If no type selected → add new shalon type (top-level)
  if(selectedTypeId){
    addSession(selectedTypeId);
  } else {
    addShalon();
  }
}

function typeById(id){ return shalonTypes.find(function(t){ return t.id===id; }); }
function sessionById(id){
  for(var i=0;i<shalonTypes.length;i++){
    var s=shalonTypes[i].sessions.find(function(s){ return s.id===id; });
    if(s) return s;
  }
  return null;
}
function prekById(sess,id){ return sess.prakim.find(function(p){ return p.id===id; }); }
function sessionLabel(sess,lang){
  // Use free-form label set by author; fall back to generic placeholder
  if(sess.label && sess.label.trim()) return sess.label.trim();
  return lang==='he' ? 'ללא שם' : 'Без названия';
}
function moedRU(he){
  if(he==='מועד א') return 'Срок А';
  if(he==='מועד ב') return 'Срок Б';
  if(he==='מועד ג') return 'Срок В';
  return he;
}
function seasonRU(he){
  if(he==='קיץ') return 'Лето';
  if(he==='חורף') return 'Зима';
  if(he==='אביב') return 'Весна';
  return he;
}

function renderEditor(){
  var sess = sessionById(selectedSessionId);
  if(!sess){ document.getElementById('editorPanel').innerHTML=''; return; }
  if(previewMode){ renderPreview(sess); return; }

  var t = TR[currentLang];
  var totalQActual = sess.prakim.reduce(function(s,p){ return s+p.questions.length; },0);
  var totalQ = sess.totalQOverride || totalQActual;
  var html = '';

  // Session header
  var st = shalonTypes.find(function(s){ return s.id===selectedTypeId; });
  html += '<div class="meta-card">';
  html += '<div style="display:flex;align-items:center;margin-bottom:10px">';
  html += '<span style="font-size:14px;font-weight:700;color:#22D3EE;flex:1">'+(st?st.number+' · ':'')+sessionLabel(sess,currentLang)+'</span>';
  html += '<button onclick="togglePreview()" style="display:inline-flex;align-items:center;gap:5px;background:transparent;border:1px solid #334155;cursor:pointer;font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;color:#64748b;font-family:inherit;flex-shrink:0;transition:color .15s,border-color .15s" onmouseover="this.style.color=\'#22D3EE\';this.style.borderColor=\'#22D3EE\'" onmouseout="this.style.color=\'#64748b\';this.style.borderColor=\'#334155\'">'
  + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
  + '<span data-i18n="previewBtn">'+t.previewBtn+'</span></button>';
  html += '</div>';
  html += '<div class="meta-grid">';
  html += metaField('examDuration',sess.durationMin,t,'durationMin');
  html += metaField('examExtraTime',sess.extraTime||0,t,'extraTime');
  html += '</div>';
  // Global Σ = Σ(pk.requiredQ × pk.pointsPerQ) must equal 100
  var gSum = sess.prakim.reduce(function(s,pk){ return s+((pk.requiredQ||0)*(pk.pointsPerQ||0)); },0);
  var gOk = Math.abs(gSum-100)<0.01;
  html += '<div id="pts-sum-indicator" style="font-size:11px;margin-top:8px;color:'+(gOk?'#22D3EE':'#f87171')+'">';
  html += (gOk?'✓ ':'⚠ ')+'Σ = '+gSum.toFixed(1)+(gOk?' = 100 ✓':' ≠ 100');
  html += '</div></div>';

  // Instructions field
  html += '<div class="meta-card" style="margin-bottom:14px">';
  html += '<div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px" class="t3">'+t.instructionsLabel+'</div>';
  html += '<textarea class="topics-input" rows="3" style="margin:0;font-style:normal" placeholder="'+t.instructionsPlh+'" oninput="onInstructionsChange(this.value)">'+((sess.instructions||''))+'</textarea>';
  html += '</div>';

  // Selection rules — before prakim (critical info)
  html += renderRules(sess, t);

  // פרקים
  html += '<div style="font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:4px" class="t3">'+t.prakim+'</div>';

  sess.prakim.forEach(function(pk,pi){
    html += '<div class="prek-card" id="prek_'+pk.id+'">';
    html += '<div class="prek-header" onclick="togglePrek(\''+pk.id+'\')">';
    html += '<span class="prek-chevron'+(pk.open?' open':'')+'">';
    html += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></span>';
    html += '<span class="prek-badge">'+(currentLang==='he'?'פ':'Р')+(pi+1)+'</span>';
    html += '<span class="prek-name"><input class="prek-name-input t1" value="'+(currentLang==='he'?pk.nameHE:pk.nameRU)+'" oninput="onPrekNameChange(\''+pk.id+'\',this.value)"></span>';
    var pReq = (pk.requiredQ !== undefined) ? pk.requiredQ : pk.questions.length;
    var pPts = pk.pointsPerQ || 0;
    var pSum = pReq * pPts;
    var reqLbl = currentLang==='he' ? 'לפתור' : 'решить';
    html += '<span style="font-size:11px;color:#64748b">' + pk.questions.length + ' ' + t.questionsCount + ',&nbsp;</span>';
    html += '<span style="font-size:11px;color:#94a3b8">' + reqLbl + '&nbsp;</span>';
    html += '<input type="number" value="' + pReq + '" min="1" max="' + pk.questions.length + '" onclick="event.stopPropagation()" oninput="onPrekReqChange(\'' + pk.id + '\',this.value)" style="width:28px;text-align:center;font-size:11px;font-weight:600;color:#22D3EE;background:transparent;border:0;border-bottom:1px solid #475569;outline:none">';
    html += '<span style="font-size:11px;color:#64748b">&nbsp;×&nbsp;</span>';
    html += '<input type="number" value="' + pPts + '" min="0" onclick="event.stopPropagation()" oninput="onPrekPtsChange(\'' + pk.id + '\',this.value)" style="width:34px;text-align:center;font-size:11px;font-weight:600;color:#FBBF24;background:transparent;border:0;border-bottom:1px solid #475569;outline:none">';
    html += '<span style="font-size:11px;color:#64748b">&nbsp;=&nbsp;</span>';
    var ptsWord = currentLang==='he' ? 'נקודות' : ptsBallRU(pSum);
    html += '<span style="font-size:11px;font-weight:600;color:' + (pSum > 0 ? '#22D3EE' : '#475569') + ';margin-inline-start:4px;margin-inline-end:8px">' + pSum.toFixed(0) + '&nbsp;' + ptsWord + '</span>';
    html += '<span class="q-tb-btn danger" onclick="event.stopPropagation();deletePrek(\'' + pk.id + '\')" title="' + t.deletePrek + '">✕</span>';
    html += '</div>';
    if(pk.open){
      html += '<div class="prek-body">';
      html += '<textarea class="topics-input" rows="2" placeholder="'+t.topicsPlaceholder+'" oninput="onTopicsChange(\''+pk.id+'\',this.value)">'+(currentLang==='he'?pk.topicsHE:pk.topicsRU)+'</textarea>';
      html += '<div class="q-list" id="qlist_'+pk.id+'">';
      pk.questions.forEach(function(q){
        html += renderQRow(q,pk.id,sess,t);
      });
      html += '</div>';
      html += '<div class="add-q-btn" onclick="addQuestion(\''+pk.id+'\')">';
      html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> '+t.addQuestion;
      html += '</div>';
      html += '</div>';
    }
    html += '</div>';

// Russian numeral agreement for «балл»:
// 1 → балл, 2-4 → балла, 5-20 and teens → баллов, 21 → балл, 22-24 → балла ...
function ptsBallRU(n){
  var abs = Math.abs(Math.round(n));
  var mod100 = abs % 100;
  var mod10  = abs % 10;
  if(mod100 >= 11 && mod100 <= 19) return 'баллов';
  if(mod10 === 1) return 'балл';
  if(mod10 >= 2 && mod10 <= 4) return 'балла';
  return 'баллов';
}

function onMetaChange(el){
  var sess = sessionById(selectedSessionId);
  if(!sess) return;
  var k = el.getAttribute('data-key');
  var v = parseFloat(el.value)||0;
  if(k==='durationMin') sess.durationMin = v;
  else if(k==='answerK') sess.rules.totalAnswer = v;
  else if(k==='totalQ') sess.totalQOverride = v;
  else if(k==='extraTime') sess.extraTime = v;
  else if(k==='ptsPerQ'){
    sess.pointsPerQ = v;
    // Validate sum
    var totalQ = sess.prakim.reduce(function(s,p){ return s+p.questions.length; },0);
    var indicator = document.getElementById('pts-sum-indicator');
    if(indicator && totalQ > 0){
      var sum = v * totalQ;
      var ok = Math.abs(sum - 100) < 0.01;
      indicator.textContent = (ok?'✓ ':'⚠ ')+sum.toFixed(2)+(ok?' = 100':' ≠ 100');
      indicator.style.color = ok ? '#22D3EE' : '#f87171';
    }
  }
}

// ===================== Formula symbol panel =====================
var fmenu = document.getElementById('fmenu');
var fmenuTargetBtn = null;
var lastFocusedMathField = null;

// Track last focused math-field globally
document.addEventListener('focusin', function(e){
  if(e.target && e.target.tagName === 'MATH-FIELD'){
    lastFocusedMathField = e.target;
    // Ensure virtual keyboard stays off regardless of browser/MathLive version
    e.target.virtualKeyboardMode = 'off';
    e.target.menuItems = [];
  }
});

function toggleFormulaMenu(btn){
  if(fmenu.classList.contains('open') && fmenuTargetBtn === btn){
    closeFormulaMenu(); return;
  }
  fmenuTargetBtn = btn;
  var r = btn.getBoundingClientRect();
  fmenu.style.top  = (r.bottom + 6) + 'px';
  var left = r.left;
  if(left + 224 > window.innerWidth - 8) left = window.innerWidth - 232;
  fmenu.style.left = Math.max(8, left) + 'px';
  fmenu.classList.add('open');
}
function closeFormulaMenu(){
  fmenu.classList.remove('open');
  fmenuTargetBtn = null;
}
document.addEventListener('mousedown', function(e){
  if(fmenu.classList.contains('open') && !fmenu.contains(e.target) && e.target !== fmenuTargetBtn)
    closeFormulaMenu();
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeFormulaMenu();
});
// Prevent fmenu clicks from stealing focus from active math-field
fmenu.addEventListener('mousedown', function(e){ e.preventDefault(); });
fmenu.querySelectorAll('.fmenu-item').forEach(function(item){
  item.addEventListener('click', function(){
    var mf = lastFocusedMathField;
    if(!mf){ closeFormulaMenu(); return; }
    var latex = item.getAttribute('data-ins');
    mf.focus();
    mf.insert(latex, {insertionMode:'insertAfter', selectionMode:'placeholder'});
    closeFormulaMenu();
  });
});

function onSigmaClick(qId, btn){
  // Panel already open for this button → just close
  if(fmenu.classList.contains('open') && fmenuTargetBtn===btn){
    closeFormulaMenu(); return;
  }
  var field = document.getElementById('qcontent_'+qId);
  var hasFocusedMF = lastFocusedMathField && field && field.contains(lastFocusedMathField);
  if(hasFocusedMF){
    // Formula already active → just open panel, no new field
    toggleFormulaMenu(btn);
  } else {
    // No active formula → insert new field, then open panel after mount
    insertFormulaInQ(qId);
    setTimeout(function(){ toggleFormulaMenu(btn); }, 50);
  }
}

// ===================== Tab → indent in question content fields =====================
// Use event delegation on the editor panel so it works after every re-render
document.getElementById('editorPanel').addEventListener('keydown', function(e){
  if(e.key === 'Tab' && e.target.classList.contains('q-content')){
    e.preventDefault();
    // Insert 4 non-breaking spaces as indent
    var sel = window.getSelection();
    if(!sel.rangeCount) return;
    var range = sel.getRangeAt(0);
    range.deleteContents();
    var spaces = document.createTextNode('\u00A0\u00A0\u00A0\u00A0');
    range.insertNode(spaces);
    range.setStartAfter(spaces);
    range.setEndAfter(spaces);
    sel.removeAllRanges();
    sel.addRange(range);
  }
});

// ===================== Formula insertion =====================
var MFO = '<bdi style="unicode-bidi:isolate;direction:ltr"><math-field class="imf" virtual-keyboard-mode="off">';
var MFC = '</math-field></bdi>';

function insertFormulaInQ(qId){
  var field = document.getElementById('qcontent_'+qId);
  if(!field) return;
  var bdi = document.createElement('bdi');
  bdi.style.unicodeBidi='isolate'; bdi.style.direction='ltr';
  var mf = document.createElement('math-field');
  mf.className='imf'; mf.setAttribute('virtual-keyboard-mode','off');
  bdi.appendChild(mf);
  var anchor = document.createTextNode('\u200B');
  var frag = document.createDocumentFragment();
  frag.appendChild(bdi); frag.appendChild(anchor);
  var sel = window.getSelection();
  if(sel.rangeCount&&field.contains(sel.anchorNode)){
    var range=sel.getRangeAt(0); range.deleteContents(); range.insertNode(frag);
  } else { field.appendChild(frag); }
  var r=document.createRange(); r.setStart(anchor,1); r.setEnd(anchor,1);
  sel.removeAllRanges(); sel.addRange(r);
  field.focus();
  setTimeout(function(){ mf.focus(); },0);
  mf.addEventListener('blur',function(){
    var r2=document.createRange(); r2.setStart(anchor,1); r2.setEnd(anchor,1);
    var s=window.getSelection(); s.removeAllRanges(); s.addRange(r2);
  });
  mf.addEventListener('keydown',function(e){
    if((e.key==='Backspace'||e.key==='Delete') && mf.getValue('latex').trim()===''){
      e.preventDefault();
      var parent = bdi.parentNode;
      if(parent){
        // place cursor where the bdi was before removing it
        var r3=document.createRange();
        r3.setStartBefore(bdi); r3.collapse(true);
        var s=window.getSelection(); s.removeAllRanges(); s.addRange(r3);
        parent.removeChild(bdi);
        if(anchor.parentNode) anchor.parentNode.removeChild(anchor);
      }
    }
  });
}

function confirmShalonModal(){
  var num = document.getElementById('shalonNumInput').value.trim();
  // name is already read in the session/shalon branch below
  var modal = document.getElementById('shalonModal');
  var name = document.getElementById('shalonNameInput').value.trim();
  if(modal._editingSession){
    var st = typeById(modal._editingSession.typeId);
    var sess = st && st.sessions.find(function(s){ return s.id===modal._editingSession.sessId; });
    if(sess) sess.label = name;
    modal._editingSession = null;
  } else if(modal._editingType){
    // editing existing shalon type
    var st = typeById(modal._editingType);
    if(st){ st.number = num||st.number; st.name = name; }
    modal._editingType = null;
  } else if(modal._addingSession){
    // new session inside existing type — name only, no date fields
    var st = typeById(modal._addingSession);
    var sessId = 'sess_'+Date.now();
    var newSess = {
      id:sessId, label:name,
      durationMin:150, pointsPerQ:33.33, prakim:[],
      rules:{totalAnswer:3,constraints:[]}
    };
    st.sessions.push(newSess);
    selectedTypeId = st.id;
    selectedSessionId = sessId;
  } else {
    // adding new shalon type
    var typeId = 'st_'+Date.now();
    shalonTypes.push({id:typeId, number:num, titleHE:name||num, titleRU:name||num, sessions:[]});
    selectedTypeId = typeId;
  }
  closeShalonModal();
  renderShalonList(); renderEditor();
}

function openTranslateModal(){

  var fromWord = fromRU ? 'русского' : 'иврита';

      ? 'לתרגם את כל שמות הפרקים והנושאים מ<b>'+fromWordHE+'</b> ל<b>'+toWordHE+'</b>?<br>תרגומים קיימים יוחלפו.'
      : 'Перевести все названия разделов и темы с <b>'+fromWord+'</b> на <b>'+toWord+'</b>?<br>Существующие переводы будут перезаписаны.';
  document.getElementById('translateProgress').textContent = '';
  document.getElementById('translateError').textContent = '';
  var barWrap = document.getElementById('translateBarWrap');

  _translateResult = null;
  document.getElementById('translateModalOverlay').classList.add('show');
}

function closeTranslateModal(){
  document.getElementById('translateModalOverlay').classList.remove('show');
}

function onTranslateOk(){
  if(_translateResult){
    _translateResult._items.forEach(function(it,i){
      var text = _translateResult[i];
      if(!text) return;
      var sess = sessionById(selectedSessionId);
      var pk = sess ? prekById(sess, it.id) : null;
      if(!pk) return;
      if(_translateResult._fromRU){ if(it.type==='name') pk.nameHE=text; else pk.topicsHE=text; }
      else { if(it.type==='name') pk.nameRU=text; else pk.topicsRU=text; }
    });
    _translateResult = null;
  }
  closeTranslateModal();
  renderEditor();
}

async function runTranslation(){
  var sess = sessionById(selectedSessionId);
  if(!sess) return;
  var fromRU = currentLang==='ru';
  var items = [];
  sess.prakim.forEach(function(pk){
    items.push({type:'name',   id:pk.id, text:fromRU?pk.nameRU:(pk.nameHE||pk.nameRU)});
    items.push({type:'topics', id:pk.id, text:fromRU?pk.topicsRU:(pk.topicsHE||pk.topicsRU)});
  });
  if(!items.length){
    document.getElementById('translateError').textContent = currentLang==='ru'?'Нет текста для перевода':'אין טקסט לתרגום';
    return;
  }
  var srcLines = items.map(function(it,i){ return (i+1)+'. '+it.text; }).join('\n');
  var progress   = document.getElementById('translateProgress');
  var barWrap    = document.getElementById('translateBarWrap');
  var barFill    = document.getElementById('translateBarFill');
  var errEl      = document.getElementById('translateError');
  var confirmBtn = document.getElementById('translateConfirmBtn');
  var okBtn      = document.getElementById('translateOkBtn');
  progress.textContent = (currentLang==='ru'?'Отправка запроса... (':'שולח בקשה... (')+items.length+(currentLang==='ru'?' элементов)':' פריטים)');
  barWrap.style.display = 'block';
  barFill.style.width = '10%';
  errEl.textContent = '';
  confirmBtn.style.display = 'none';
  okBtn.style.display = 'none';
  var barTimer = setInterval(function(){
    var cur=parseFloat(barFill.style.width)||0;
    if(cur<80) barFill.style.width=Math.min(cur+6,80)+'%';
  },350);
  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:2000,
        messages:[{role:'user',content:'You are a mathematics educator translator. Translate each numbered item from '+(fromRU?'Russian':'Hebrew')+' to '+(fromRU?'Hebrew':'Russian')+'. Return ONLY a JSON array of strings in the same order. No markdown. Input:\n'+srcLines}]
      })
    });
    clearInterval(barTimer);
    barFill.style.width = '90%';
    var data = await resp.json();
    var raw = (data.content||[]).map(function(c){ return c.text||''; }).join('');
    var clean = raw.replace(/```[^`]*```/g,'').replace(/```/g,'').trim();
    var translated = JSON.parse(clean);
    if(!Array.isArray(translated)||translated.length!==items.length) throw new Error('length mismatch');
    translated._items = items;
    translated._fromRU = fromRU;
    _translateResult = translated;
    barFill.style.width = '100%';
    progress.textContent = (currentLang==='ru'?'Готово! Переведено ':'הושלם! תורגמו ')+items.length+(currentLang==='ru'?' элементов.':' פריטים.');
    okBtn.style.display = '';
  } catch(err){
    clearInterval(barTimer);
    barFill.style.width = '100%';
    barFill.style.background = '#f87171';
    errEl.textContent = (currentLang==='ru'?'Ошибка: ':'שגיאה: ')+err.message;
    confirmBtn.style.display = '';
    progress.textContent = '';
  }
}

// ===================== Drag-and-drop for shalon types =====================
var esDragId = null;

function esAttachDrag(row, st){
  row.setAttribute('draggable', 'true');

  row.addEventListener('dragstart', function(e){
    esDragId = st.id;
    setTimeout(function(){ row.classList.add('drag-source'); }, 0);
    e.dataTransfer.effectAllowed = 'move';
  });

  row.addEventListener('dragend', function(){
    row.classList.remove('drag-source');
    document.querySelectorAll('.es-node.drag-over').forEach(function(el){
      el.classList.remove('drag-over');
    });
    esDragId = null;
  });

  row.addEventListener('dragover', function(e){
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if(esDragId && esDragId !== st.id){
      document.querySelectorAll('.es-node.drag-over').forEach(function(el){
        el.classList.remove('drag-over');
      });
      row.classList.add('drag-over');
    }
  });

  row.addEventListener('dragleave', function(){
    row.classList.remove('drag-over');
  });

  row.addEventListener('drop', function(e){
    e.preventDefault();
    row.classList.remove('drag-over');
    if(!esDragId || esDragId === st.id) return;
    // Reorder shalonTypes
    var fromIdx = shalonTypes.findIndex(function(x){ return x.id===esDragId; });
    var toIdx   = shalonTypes.findIndex(function(x){ return x.id===st.id; });
    if(fromIdx === -1 || toIdx === -1) return;
    var moved = shalonTypes.splice(fromIdx, 1)[0];
    shalonTypes.splice(toIdx, 0, moved);
    esDragId = null;
    renderShalonList();
  });
}

// ===================== Prek requiredQ / pointsPerQ handlers =====================
function onPrekReqChange(pkId, val){
  var sess = sessionById(selectedSessionId);
  if(!sess) return;
  var pk = prekById(sess, pkId);
  if(!pk) return;
  pk.requiredQ = Math.max(1, parseInt(val)||1);
  updateSumIndicator(sess);
  // Refresh prek header only (avoid full re-render that loses focus)
  renderEditor();
}
function onPrekPtsChange(pkId, val){
  var sess = sessionById(selectedSessionId);
  if(!sess) return;
  var pk = prekById(sess, pkId);
  if(!pk) return;
  pk.pointsPerQ = parseFloat(val)||0;
  updateSumIndicator(sess);
  renderEditor();
}
function updateSumIndicator(sess){
  var ind = document.getElementById('pts-sum-indicator');
  if(!ind) return;
  var gSum = sess.prakim.reduce(function(s,pk){ return s+((pk.requiredQ||0)*(pk.pointsPerQ||0)); },0);
  var gOk = Math.abs(gSum-100)<0.01;
  ind.textContent = (gOk?'✓ ':'⚠ ')+'Σ = '+gSum.toFixed(1)+(gOk?' = 100 ✓':' ≠ 100');
  ind.style.color = gOk ? '#22D3EE' : '#f87171';
}
